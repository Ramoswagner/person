<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Iron Man Interativo</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #controles { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; }
        kbd { background: #444; padding: 2px 5px; border-radius: 3px; border: 1px solid #888; }
    </style>
</head>
<body>

    <div id="controles">
        <p><kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> - Mover</p>
        <p><kbd>Espaço</kbd> - Pular</p>
        <p><kbd>T</kbd> - Acenar (Hello)</p>
        <p><kbd>F</kbd> - Empurrar (Punch/Push)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // 1. Configuração Básica
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x222222);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // 2. Luzes
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(5, 10, 5);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // 3. Chão (para o personagem não flutuar no nada)
        const plane = new THREE.Mesh(
            new THREE.PlaneGeometry(100, 100),
            new THREE.MeshStandardMaterial({ color: 0x333333 })
        );
        plane.rotation.x = -Math.PI / 2;
        plane.receiveShadow = true;
        scene.add(plane);

        // 4. Variáveis do Personagem
        let model, mixer, animations = {};
        const keys = {};

        // 5. Carregar Iron Man
        const loader = new GLTFLoader();
        loader.load('IronMan.glb', (gltf) => {
            model = gltf.scene;
            model.traverse(n => { if (n.isMesh) n.castShadow = true; });
            scene.add(model);

            // Mixer para gerenciar animações
            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach((clip) => {
                animations[clip.name.toLowerCase()] = mixer.clipAction(clip);
            });

            animate();
        });

        // 6. Controles
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);

            if (model) {
                // Movimento básico e Rotação
                if (keys['KeyW']) { model.translateZ(0.1); model.rotation.y = Math.PI; }
                if (keys['KeyS']) { model.translateZ(0.1); model.rotation.y = 0; }
                if (keys['KeyA']) { model.rotation.y += 0.05; }
                if (keys['KeyD']) { model.rotation.y -= 0.05; }

                // Gatilhos de Animação (Supondo que os nomes existam no seu GLB)
                if (keys['Space']) playAnim('jump');
                if (keys['KeyT']) playAnim('wave');
                if (keys['KeyF']) playAnim('push');
            }

            renderer.render(scene, camera);
        }

        function playAnim(name) {
            if (animations[name]) {
                animations[name].reset().fadeIn(0.2).play();
                // Para a animação após uma execução se não for loop
                animations[name].setLoop(THREE.LoopOnce);
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
