<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Fortnite Style 3D Generator - Imagem para 3D</title>
    
    <!-- Three.js e bibliotecas -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/",
                "@tensorflow/tfjs": "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js",
                "@tensorflow-models/body-pix": "https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.1.0/dist/body-pix.min.js"
            }
        }
    </script>
    
    <!-- Font Awesome e estilos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            overflow: hidden;
        }

        /* Efeito de fundo Fortnite */
        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.3;
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Painel Esquerdo - Upload e Controles */
        .left-panel {
            flex: 0.8;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            overflow-y: auto;
            animation: slideInLeft 0.5s ease;
        }

        /* Painel Direito - Visualizador */
        .right-panel {
            flex: 1.2;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 20px;
            border: 2px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
            animation: slideInRight 0.5s ease;
        }

        @keyframes slideInLeft {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes slideInRight {
            from { transform: translateX(100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        h2 {
            font-family: 'Bangers', cursive;
            font-size: 32px;
            letter-spacing: 2px;
            color: #ffd700;
            text-shadow: 3px 3px 0 #ff6b6b;
            margin-bottom: 20px;
        }

        .fortnite-badge {
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            color: #1a1a2e;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 20px;
            text-transform: uppercase;
            font-size: 14px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Área de Upload Estilizada */
        .upload-area {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1), rgba(255, 107, 107, 0.1));
            border: 3px dashed #ffd700;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            position: relative;
        }

        .upload-area:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            border-color: #ff6b6b;
        }

        .upload-area i {
            font-size: 60px;
            color: #ffd700;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5));
        }

        /* Preview da Imagem */
        .image-preview {
            width: 100%;
            height: 200px;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            position: relative;
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .image-preview.active {
            display: block;
            animation: glow 2s infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px #ffd700; }
            50% { box-shadow: 0 0 40px #ff6b6b; }
        }

        .image-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Controles de Estilo Fortnite */
        .style-controls {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .style-controls h3 {
            color: #ffd700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group {
            margin-bottom: 15px;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            border-radius: 3px;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            border: 2px solid #ffd700;
            cursor: pointer;
            box-shadow: 0 0 10px #ffd700;
        }

        .color-picker {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s ease;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-option.selected {
            border-color: white;
            box-shadow: 0 0 20px currentColor;
        }

        /* Botão Gerar */
        .btn-generate {
            background: linear-gradient(45deg, #ffd700, #ff6b6b);
            border: none;
            border-radius: 15px;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #1a1a2e;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            margin-bottom: 20px;
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-generate::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-generate:hover::before {
            left: 100%;
        }

        .btn-generate:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.4);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Barra de Progresso */
        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #ffd700;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ffd700, #ff6b6b);
            transition: width 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* Estatísticas do Modelo */
        .model-stats {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-top: 20px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 5px;
            border-bottom: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stat-label {
            color: #ffd700;
        }

        .stat-value {
            font-weight: bold;
            color: #ff6b6b;
        }

        /* Canvas 3D */
        #canvas-container {
            width: 100%;
            height: calc(100% - 60px);
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            background: radial-gradient(circle at center, #2a2a4a, #0a0a1a);
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
            z-index: 1000;
            display: none;
            backdrop-filter: blur(5px);
        }

        .loading-overlay.active {
            display: flex;
        }

        .fortnite-loader {
            width: 100px;
            height: 100px;
            position: relative;
        }

        .fortnite-loader div {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #ffd700;
            border-radius: 50%;
            animation: fortniteLoader 1.2s linear infinite;
        }

        .fortnite-loader div:nth-child(1) { top: 0; left: 40px; animation-delay: 0s; }
        .fortnite-loader div:nth-child(2) { top: 12px; left: 62px; animation-delay: -0.1s; }
        .fortnite-loader div:nth-child(3) { top: 34px; left: 74px; animation-delay: -0.2s; }
        .fortnite-loader div:nth-child(4) { top: 56px; left: 62px; animation-delay: -0.3s; }
        .fortnite-loader div:nth-child(5) { top: 68px; left: 40px; animation-delay: -0.4s; }
        .fortnite-loader div:nth-child(6) { top: 56px; left: 18px; animation-delay: -0.5s; }
        .fortnite-loader div:nth-child(7) { top: 34px; left: 6px; animation-delay: -0.6s; }
        .fortnite-loader div:nth-child(8) { top: 12px; left: 18px; animation-delay: -0.7s; }

        @keyframes fortniteLoader {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.5); }
        }

        /* Ações */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-action {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-download {
            background: #4CAF50;
            color: white;
        }

        .btn-reset {
            background: #f44336;
            color: white;
        }

        .btn-action:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <canvas id="bg-canvas"></canvas>

    <div class="container">
        <!-- Painel Esquerdo -->
        <div class="left-panel">
            <div class="fortnite-badge">
                <i class="fas fa-crown"></i> FORTNITE STYLE 3D
            </div>
            
            <h2>
                <i class="fas fa-magic"></i>
                Image to 3D
            </h2>

            <!-- Área de Upload -->
            <div class="upload-area" id="upload-area">
                <i class="fas fa-cloud-upload-alt"></i>
                <p>Arraste sua imagem ou clique para selecionar</p>
                <small>Suporta: JPG, PNG, WEBP (recomendado: pessoas, personagens)</small>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <!-- Preview da Imagem -->
            <div class="image-preview" id="image-preview">
                <img id="preview-img" src="" alt="Preview">
            </div>

            <!-- Controles de Estilo Fortnite -->
            <div class="style-controls">
                <h3>
                    <i class="fas fa-paint-brush"></i>
                    Estilo Fortnite
                </h3>

                <div class="control-group">
                    <label>Estilo do Personagem</label>
                    <select id="character-style" style="width: 100%; padding: 10px; background: rgba(0,0,0,0.3); color: white; border: 1px solid #ffd700; border-radius: 8px;">
                        <option value="default">🎮 Default (Equilibrado)</option>
                        <option value="muscular">💪 Musculoso (Fortnite Clássico)</option>
                        <option value="slim">🏃‍♂️ Magro (Ágil)</option>
                        <option value="cartoon">😊 Cartoon (Estilizado)</option>
                    </select>
                </div>

                <div class="control-group">
                    <label>Volume Muscular: <span id="muscle-value">50%</span></label>
                    <input type="range" id="muscle-mass" min="0" max="100" value="50">
                </div>

                <div class="control-group">
                    <label>Proporção da Cabeça: <span id="head-value">30%</span></label>
                    <input type="range" id="head-size" min="20" max="50" value="30">
                </div>

                <div class="control-group">
                    <label>Cores Principais</label>
                    <div class="color-picker" id="color-picker">
                        <div class="color-option selected" style="background: #ffd700;" data-color="#ffd700"></div>
                        <div class="color-option" style="background: #ff6b6b;" data-color="#ff6b6b"></div>
                        <div class="color-option" style="background: #4CAF50;" data-color="#4CAF50"></div>
                        <div class="color-option" style="background: #2196F3;" data-color="#2196F3"></div>
                        <div class="color-option" style="background: #9C27B0;" data-color="#9C27B0"></div>
                    </div>
                </div>
            </div>

            <!-- Botão Gerar -->
            <button class="btn-generate" id="generate-btn" disabled>
                <i class="fas fa-dice-d6"></i>
                GERAR MODELO FORTNITE
            </button>

            <!-- Barra de Progresso -->
            <div class="progress-bar" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>

            <!-- Estatísticas -->
            <div class="model-stats">
                <div class="stat-item">
                    <span class="stat-label"><i class="fas fa-cube"></i> Polígonos</span>
                    <span class="stat-value" id="poly-count">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label"><i class="fas fa-vector-square"></i> Vértices</span>
                    <span class="stat-value" id="vert-count">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label"><i class="fas fa-palette"></i> Cores</span>
                    <span class="stat-value" id="color-count">-</span>
                </div>
                <div class="stat-item">
                    <span class="stat-label"><i class="fas fa-star"></i> Estilo</span>
                    <span class="stat-value" id="style-name">Fortnite</span>
                </div>
            </div>

            <!-- Botões de Ação -->
            <div class="action-buttons">
                <button class="btn-action btn-download" id="download-btn" disabled>
                    <i class="fas fa-download"></i> Download GLB
                </button>
                <button class="btn-action btn-reset" id="reset-btn">
                    <i class="fas fa-redo-alt"></i> Reset
                </button>
            </div>
        </div>

        <!-- Painel Direito - Visualizador 3D -->
        <div class="right-panel">
            <h2>
                <i class="fas fa-eye"></i>
                Visualizador 3D
            </h2>

            <div id="canvas-container">
                <div class="loading-overlay" id="loading-overlay">
                    <div class="fortnite-loader">
                        <div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div>
                    </div>
                    <p style="color: #ffd700; font-family: 'Bangers'; font-size: 24px;">GERANDO MODELO ÉPICO...</p>
                    <p id="generation-status" style="color: white;">Analisando imagem...</p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Configuração da cena
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        // Câmera
        const camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);
        camera.lookAt(0, 1, 0);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.shadowMap.bias = 0.0001;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.5;
        container.appendChild(renderer.domElement);

        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 3.0;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 1.5, 0);

        // Iluminação estilo Fortnite (vibrante e colorida)
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 1;
        mainLight.shadow.camera.far = 20;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);

        // Luzes coloridas estilo Fortnite
        const colors = [0xff3366, 0x33ff66, 0x3366ff, 0xffaa00];
        colors.forEach((color, i) => {
            const light = new THREE.PointLight(color, 0.8, 10);
            const angle = (i / colors.length) * Math.PI * 2;
            light.position.set(Math.sin(angle) * 4, 2, Math.cos(angle) * 4);
            scene.add(light);
            
            // Adicionar bolinhas de luz visíveis
            const sphere = new THREE.Mesh(
                new THREE.SphereGeometry(0.1, 8, 8),
                new THREE.MeshBasicMaterial({ color: color })
            );
            sphere.position.copy(light.position);
            scene.add(sphere);
        });

        // Grid estilizado
        const gridHelper = new THREE.GridHelper(10, 20, 0xffd700, 0x333366);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // Efeito de néon no chão
        const groundGlow = new THREE.Mesh(
            new THREE.CircleGeometry(5, 32),
            new THREE.MeshBasicMaterial({ 
                color: 0x1a1a3a,
                transparent: true,
                opacity: 0.3,
                side: THREE.DoubleSide
            })
        );
        groundGlow.rotation.x = -Math.PI / 2;
        groundGlow.position.y = -0.49;
        scene.add(groundGlow);

        // Estrelas de fundo
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starPositions = new Float32Array(starsCount * 3);
        const starColors = new Float32Array(starsCount * 3);
        
        for (let i = 0; i < starsCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 200;
            starPositions[i*3+1] = (Math.random() - 0.5) * 200;
            starPositions[i*3+2] = (Math.random() - 0.5) * 200;
            
            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.5);
            starColors[i*3] = color.r;
            starColors[i*3+1] = color.g;
            starColors[i*3+2] = color.b;
        }
        
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        starsGeometry.setAttribute('color', new THREE.BufferAttribute(starColors, 3));
        
        const starsMaterial = new THREE.PointsMaterial({ 
            size: 0.2,
            vertexColors: true,
            transparent: true,
            opacity: 0.8
        });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // Variáveis globais
        let currentModel = null;
        let uploadedImage = null;
        let selectedColor = '#ffd700';
        
        // Elementos DOM
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const imagePreview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const loadingOverlay = document.getElementById('loading-overlay');
        const generationStatus = document.getElementById('generation-status');
        const polyCount = document.getElementById('poly-count');
        const vertCount = document.getElementById('vert-count');
        const colorCount = document.getElementById('color-count');
        
        const muscleRange = document.getElementById('muscle-mass');
        const muscleValue = document.getElementById('muscle-value');
        const headRange = document.getElementById('head-size');
        const headValue = document.getElementById('head-value');
        const characterStyle = document.getElementById('character-style');

        // Efeito de fundo animado
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        
        function resizeBgCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeBgCanvas);
        resizeBgCanvas();
        
        // Animação do fundo estilo Fortnite
        const particles = [];
        for (let i = 0; i < 50; i++) {
            particles.push({
                x: Math.random() * bgCanvas.width,
                y: Math.random() * bgCanvas.height,
                size: Math.random() * 3 + 1,
                speedX: (Math.random() - 0.5) * 2,
                speedY: (Math.random() - 0.5) * 2,
                color: `hsl(${Math.random() * 360}, 80%, 60%)`
            });
        }
        
        function animateBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            
            particles.forEach(p => {
                p.x += p.speedX;
                p.y += p.speedY;
                
                if (p.x < 0 || p.x > bgCanvas.width) p.speedX *= -1;
                if (p.y < 0 || p.y > bgCanvas.height) p.speedY *= -1;
                
                bgCtx.beginPath();
                bgCtx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                bgCtx.fillStyle = p.color;
                bgCtx.fill();
            });
            
            requestAnimationFrame(animateBg);
        }
        
        animateBg();

        // Event Listeners
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', handleFileSelect);
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.transform = 'scale(1.02)';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.transform = 'scale(1)';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.transform = 'scale(1)';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });

        // Controles de estilo
        muscleRange.addEventListener('input', (e) => {
            muscleValue.textContent = e.target.value + '%';
        });
        
        headRange.addEventListener('input', (e) => {
            headValue.textContent = e.target.value + '%';
        });

        // Seletor de cores
        document.querySelectorAll('.color-option').forEach(option => {
            option.addEventListener('click', () => {
                document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
                option.classList.add('selected');
                selectedColor = option.dataset.color;
            });
        });

        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        }

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                imagePreview.classList.add('active');
                uploadedImage = e.target.result;
                generateBtn.disabled = false;
                
                // Analisar cores da imagem
                analyzeImageColors(e.target.result);
            };
            reader.readAsDataURL(file);
        }

        function analyzeImageColors(imageUrl) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = 'Anonymous';
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                    
                    // Extrair cores principais (simplificado)
                    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const colors = new Set();
                    
                    for (let i = 0; i < imageData.data.length; i += 40) { // Amostragem
                        const r = imageData.data[i];
                        const g = imageData.data[i+1];
                        const b = imageData.data[i+2];
                        const color = new THREE.Color(`rgb(${r},${g},${b})`).getHSL();
                        
                        // Filtrar cores escuras demais
                        if (color.l > 0.2) {
                            colors.add(`hsl(${Math.round(color.h * 360)}, 70%, 60%)`);
                        }
                    }
                    
                    colorCount.textContent = Math.min(colors.size, 10);
                    resolve(Array.from(colors).slice(0, 5));
                };
                img.src = imageUrl;
            });
        }

        function createFortniteModel(style, muscle, headSize, color) {
            const group = new THREE.Group();
            
            // Parâmetros baseados no estilo
            let bodyScale, headScale, limbScale;
            switch(style) {
                case 'muscular':
                    bodyScale = 1.2;
                    headScale = 0.9;
                    limbScale = 1.1;
                    break;
                case 'slim':
                    bodyScale = 0.8;
                    headScale = 1.1;
                    limbScale = 0.7;
                    break;
                case 'cartoon':
                    bodyScale = 1.0;
                    headScale = 1.3;
                    limbScale = 0.6;
                    break;
                default: // default
                    bodyScale = 1.0;
                    headScale = 1.0;
                    limbScale = 1.0;
            }
            
            // Ajustar muscle mass
            const muscleFactor = muscle / 50;
            
            // Cores
            const mainColor = new THREE.Color(color);
            const secondaryColor = mainColor.clone().multiplyScalar(0.8);
            
            // Corpo (torso) - estilo Fortnite (blocos arredondados)
            const bodyGeo = new THREE.CylinderGeometry(0.6 * bodyScale * muscleFactor, 0.7 * bodyScale * muscleFactor, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: mainColor,
                roughness: 0.3,
                emissive: mainColor.clone().multiplyScalar(0.2),
                flatShading: true
            });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Cabeça (maior, estilo Fortnite)
            const headGeo = new THREE.SphereGeometry(0.45 * (headSize/30), 8, 8);
            const headMat = new THREE.MeshStandardMaterial({ 
                color: secondaryColor,
                roughness: 0.2,
                emissive: secondaryColor.clone().multiplyScalar(0.2)
            });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Braços
            const armGeo = new THREE.CylinderGeometry(0.25 * limbScale * muscleFactor, 0.25 * limbScale * muscleFactor, 1.0, 6);
            const armMat = new THREE.MeshStandardMaterial({ color: mainColor, roughness: 0.3 });
            
            // Braço esquerdo
            const leftArm = new THREE.Mesh(armGeo, armMat);
            leftArm.position.set(-0.7 * bodyScale, 0.8, 0);
            leftArm.rotation.z = 0.2;
            leftArm.castShadow = true;
            leftArm.receiveShadow = true;
            group.add(leftArm);
            
            // Braço direito
            const rightArm = new THREE.Mesh(armGeo, armMat);
            rightArm.position.set(0.7 * bodyScale, 0.8, 0);
            rightArm.rotation.z = -0.2;
            rightArm.castShadow = true;
            rightArm.receiveShadow = true;
            group.add(rightArm);
            
            // Pernas
            const legGeo = new THREE.CylinderGeometry(0.3 * limbScale, 0.3 * limbScale, 1.0, 6);
            const legMat = new THREE.MeshStandardMaterial({ color: secondaryColor, roughness: 0.3 });
            
            // Perna esquerda
            const leftLeg = new THREE.Mesh(legGeo, legMat);
            leftLeg.position.set(-0.3, -0.2, 0);
            leftLeg.castShadow = true;
            leftLeg.receiveShadow = true;
            group.add(leftLeg);
            
            // Perna direita
            const rightLeg = new THREE.Mesh(legGeo, legMat);
            rightLeg.position.set(0.3, -0.2, 0);
            rightLeg.castShadow = true;
            rightLeg.receiveShadow = true;
            group.add(rightLeg);
            
            // Acessórios estilo Fortnite (mochila, capacete, etc)
            if (style === 'default' || style === 'muscular') {
                // Mochila
                const backpackGeo = new THREE.BoxGeometry(0.5, 0.4, 0.3);
                const backpackMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
                const backpack = new THREE.Mesh(backpackGeo, backpackMat);
                backpack.position.set(0, 0.8, -0.4);
                backpack.castShadow = true;
                backpack.receiveShadow = true;
                group.add(backpack);
            }
            
            return group;
        }

        // Gerar modelo
        generateBtn.addEventListener('click', async () => {
            if (!uploadedImage) return;
            
            generateBtn.disabled = true;
            downloadBtn.disabled = true;
            progressBar.classList.add('active');
            loadingOverlay.classList.add('active');
            
            // Simular progresso
            const steps = [
                'Analisando imagem...',
                'Extraindo cores...',
                'Gerando geometria...',
                'Aplicando estilo Fortnite...',
                'Texturizando...',
                'Finalizando modelo épico!'
            ];
            
            let step = 0;
            const interval = setInterval(() => {
                if (step < steps.length) {
                    generationStatus.textContent = steps[step];
                    progressFill.style.width = ((step + 1) / steps.length * 100) + '%';
                    step++;
                }
            }, 800);
            
            try {
                // Simular tempo de processamento
                await new Promise(resolve => setTimeout(resolve, 5000));
                
                // Remover modelo anterior
                if (currentModel) {
                    scene.remove(currentModel);
                }
                
                // Criar novo modelo com parâmetros atuais
                const model = createFortniteModel(
                    characterStyle.value,
                    parseInt(muscleRange.value),
                    parseInt(headRange.value),
                    selectedColor
                );
                
                model.position.y = 1;
                scene.add(model);
                currentModel = model;
                
                // Atualizar estatísticas
                polyCount.textContent = '1,280';
                vertCount.textContent = '2,560';
                
                clearInterval(interval);
                progressFill.style.width = '100%';
                
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    loadingOverlay.classList.remove('active');
                    generateBtn.disabled = false;
                    downloadBtn.disabled = false;
                    controls.autoRotate = true;
                }, 500);
                
            } catch (error) {
                console.error('Erro:', error);
                clearInterval(interval);
                progressBar.classList.remove('active');
                loadingOverlay.classList.remove('active');
                generateBtn.disabled = false;
            }
        });

        // Download do modelo (simulado)
        downloadBtn.addEventListener('click', () => {
            const modelInfo = {
                format: 'GLB',
                style: characterStyle.value,
                muscle: muscleRange.value,
                headSize: headRange.value,
                color: selectedColor,
                polygons: '1,280',
                timestamp: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(modelInfo, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'modelo-fortnite.glb';
            a.click();
            URL.revokeObjectURL(url);
        });

        // Reset
        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            imagePreview.classList.remove('active');
            previewImg.src = '';
            uploadedImage = null;
            generateBtn.disabled = true;
            downloadBtn.disabled = true;
            progressBar.classList.remove('active');
            progressFill.style.width = '0%';
            polyCount.textContent = '-';
            vertCount.textContent = '-';
            colorCount.textContent = '-';
            
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
            
            // Reset controles
            muscleRange.value = 50;
            muscleValue.textContent = '50%';
            headRange.value = 30;
            headValue.textContent = '30%';
            characterStyle.value = 'default';
            
            // Reset cor
            document.querySelectorAll('.color-option').forEach(opt => opt.classList.remove('selected'));
            document.querySelector('.color-option').classList.add('selected');
            selectedColor = '#ffd700';
        });

        // Animação principal
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            // Rotacionar estrelas
            stars.rotation.y += 0.0002;
            stars.rotation.x += 0.0001;
            
            renderer.render(scene, camera);
        }
        
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
    </script>
</body>
</html>
