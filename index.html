<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar - Controle WASD</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #111122; }

        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 10px 20px; border-radius: 8px;
            pointer-events: none; z-index: 10;
            backdrop-filter: blur(5px);
            border-left: 4px solid #ff3366;
        }
        #info h1 { margin: 0; font-size: 1.1rem; font-weight: 500; }
        #info p  { margin: 4px 0 0; font-size: 0.8rem; opacity: 0.7; }

        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 1.1rem;
            background: rgba(0,0,0,0.7); padding: 15px 30px;
            border-radius: 50px; z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: opacity 0.5s;
        }
        #loading.hidden { opacity: 0; pointer-events: none; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HUD teclas */
        #hud {
            position: absolute; bottom: 28px; left: 50%;
            transform: translateX(-50%);
            display: flex; flex-direction: column; align-items: center; gap: 8px;
            pointer-events: none; z-index: 20;
        }
        .hud-hint { font-family: monospace; font-size: 10px; letter-spacing: 2px; color: rgba(255,51,102,0.6); text-transform: uppercase; }
        .keys-row { display: flex; gap: 6px; }
        .key {
            width: 42px; height: 42px;
            border: 1px solid rgba(255,51,102,0.3); border-radius: 8px;
            background: rgba(20,10,20,0.7); backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            font-family: monospace; font-size: 14px; font-weight: bold;
            color: rgba(255,150,150,0.4); transition: all 0.08s;
        }
        .key.on { border-color: #ff3366; color: #fff; background: rgba(255,51,102,0.2); box-shadow: 0 0 14px rgba(255,51,102,0.5); }
        .key.empty { visibility: hidden; }

        /* status animação */
        #anim-status {
            position: absolute; bottom: 130px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7); background: rgba(0,0,0,0.5);
            padding: 4px 14px; border-radius: 20px; font-size: 0.78rem;
            backdrop-filter: blur(5px); z-index: 15; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="info">
    <h1>🚶 Avatar — Controle WASD</h1>
    <p>W/S andar &nbsp;|&nbsp; A/D girar &nbsp;|&nbsp; E abrir &nbsp;|&nbsp; Mouse orbitar</p>
</div>

<div id="loading"><span class="spinner"></span> Carregando modelo...</div>
<div id="anim-status">⚡ idle</div>

<div id="hud">
    <div class="hud-hint">movimento</div>
    <div class="keys-row">
        <div class="key empty">·</div>
        <div class="key" id="k-w">W</div>
        <div class="key empty">·</div>
    </div>
    <div class="keys-row">
        <div class="key" id="k-a">A</div>
        <div class="key" id="k-s">S</div>
        <div class="key" id="k-d">D</div>
    </div>
    <div class="hud-hint" style="margin-top:2px">E — opening</div>
</div>

<script type="importmap">
{
    "imports": {
        "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
    }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';

// ── Cena ──────────────────────────────────────────────────────────────────
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x111122);
scene.fog        = new THREE.FogExp2(0x111122, 0.03);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0, 2, 6);
camera.lookAt(0, 1, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping   = THREE.ACESFilmicToneMapping;
document.body.appendChild(renderer.domElement);

// ── Orbit Controls (mouse) ────────────────────────────────────────────────
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping    = true;
controls.dampingFactor    = 0.06;
controls.screenSpacePanning = true;
controls.maxPolarAngle    = Math.PI / 2;
controls.minDistance      = 2;
controls.maxDistance      = 20;
controls.target.set(0, 1, 0);

// ── Luzes ─────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x606080, 1.0));

const dir = new THREE.DirectionalLight(0xffffff, 1.5);
dir.position.set(5, 10, 7);
dir.castShadow = true;
dir.shadow.mapSize.set(1024, 1024);
dir.shadow.camera.near = 0.5;
dir.shadow.camera.far  = 30;
dir.shadow.camera.left = dir.shadow.camera.bottom = -8;
dir.shadow.camera.right = dir.shadow.camera.top  =  8;
scene.add(dir);

scene.add(Object.assign(new THREE.PointLight(0xff3366, 0.5), { position: new THREE.Vector3( 4, 2, 4) }));
scene.add(Object.assign(new THREE.PointLight(0x33ccff, 0.4), { position: new THREE.Vector3(-4, 2,-4) }));

// ── Chão ──────────────────────────────────────────────────────────────────
const grid = new THREE.GridHelper(30, 30, 0xff3366, 0x333355);
scene.add(grid);

const floor = new THREE.Mesh(
    new THREE.PlaneGeometry(30, 30),
    new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.9 })
);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// Anel sob o avatar
const ringMat = new THREE.MeshBasicMaterial({ color: 0xff3366, side: THREE.DoubleSide, transparent: true, opacity: 0.4 });
const ring    = new THREE.Mesh(new THREE.RingGeometry(0.35, 0.45, 48), ringMat);
ring.rotation.x = -Math.PI/2;
ring.position.y = 0.01;
scene.add(ring);

// Estrelas
const starPos = new Float32Array(2000*3).map(() => (Math.random()-.5)*300);
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x888888, size: 0.15 })));

// ── Teclado ───────────────────────────────────────────────────────────────
const keys = {};
const keyMap = { KeyW:'k-w', KeyA:'k-a', KeyS:'k-s', KeyD:'k-d' };

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['KeyW','KeyS','KeyA','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code))
        e.preventDefault();
    Object.entries(keyMap).forEach(([c,id]) =>
        document.getElementById(id).classList.toggle('on', !!keys[c])
    );
});
window.addEventListener('keyup', e => {
    keys[e.code] = false;
    Object.entries(keyMap).forEach(([c,id]) =>
        document.getElementById(id).classList.toggle('on', !!keys[c])
    );
});

// ── Modelo ────────────────────────────────────────────────────────────────
let model = null, mixer = null, acaoAtual = null, acoes = {}, baseY = 0;
const loadingEl  = document.getElementById('loading');
const animStatus = document.getElementById('anim-status');

new GLTFLoader().load(
    'novo.glb',
    gltf => {
        model = gltf.scene;
        model.traverse(c => {
            if (c.isMesh) {
                c.castShadow = c.receiveShadow = true;
                // preserva material original, só ajusta sombra
            }
        });

        // ── Escala automática ─────────────────────────────────────────
        model.scale.set(1, 1, 1);                          // reset
        let box = new THREE.Box3().setFromObject(model);
        const sz = box.getSize(new THREE.Vector3());
        const escala = 1.75 / sz.y;                        // normaliza para 1.75m
        model.scale.setScalar(escala);

        // Centraliza pés no chão
        box = new THREE.Box3().setFromObject(model);
        const ctr = box.getCenter(new THREE.Vector3());
        baseY = -box.min.y;
        model.position.set(-ctr.x, baseY, -ctr.z);
        scene.add(model);

        // Câmera e orbit focam no centro do avatar
        const topo = baseY + 1.75;
        const meio = baseY + 1.75 / 2;
        controls.target.set(0, meio, 0);
        camera.position.set(0, meio + 0.5, 4);
        camera.lookAt(0, meio, 0);

        // ── Animações ─────────────────────────────────────────────────
        if (gltf.animations?.length) {
            mixer = new THREE.AnimationMixer(model);
            gltf.animations.forEach(clip => {
                const n = clip.name.toLowerCase();
                acoes[n] = mixer.clipAction(clip);
                console.log('anim:', n);
            });
            // toca walking ou primeira disponível como idle
            const idle = acoes['walking'] || Object.values(acoes)[0];
            if (idle) { acaoAtual = idle; acaoAtual.play(); }
        }

        loadingEl.classList.add('hidden');
    },
    xhr => {
        if (xhr.lengthComputable)
            loadingEl.innerHTML = `<span class="spinner"></span> ${Math.round(xhr.loaded/xhr.total*100)}%`;
    },
    err => {
        loadingEl.innerHTML = '❌ novo.glb não encontrado na pasta';
        console.error(err);
    }
);

// ── Troca de animação ─────────────────────────────────────────────────────
function ir(nome, loop = true) {
    const chave = Object.keys(acoes).find(k => k.includes(nome));
    if (!chave) return;
    const prox = acoes[chave];
    if (prox === acaoAtual) return;
    prox.reset();
    prox.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce);
    prox.clampWhenFinished = true;
    prox.play();
    if (acaoAtual) acaoAtual.crossFadeTo(prox, 0.2, true);
    acaoAtual = prox;
    animStatus.textContent = '⚡ ' + chave;
}

// ── Loop ──────────────────────────────────────────────────────────────────
const clock = new THREE.Clock();
const VEL = 3.0, ROT = 2.0;

function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.05);
    if (mixer) mixer.update(dt);

    if (model) {
        let mv = false;

        if (keys['KeyW'] || keys['ArrowUp'])    { model.translateZ(-VEL * dt); mv = true; }
        if (keys['KeyS'] || keys['ArrowDown'])  { model.translateZ( VEL * dt * 0.6); mv = true; }
        if (keys['KeyA'] || keys['ArrowLeft'])  { model.rotation.y += ROT * dt; mv = true; }
        if (keys['KeyD'] || keys['ArrowRight']) { model.rotation.y -= ROT * dt; mv = true; }

        // mantém no chão
        model.position.x = Math.max(-14, Math.min(14, model.position.x));
        model.position.z = Math.max(-14, Math.min(14, model.position.z));
        model.position.y = baseY;

        // anel acompanha
        ring.position.x = model.position.x;
        ring.position.z = model.position.z;
        ringMat.opacity = mv ? 0.6 : 0.2 + 0.2 * Math.abs(Math.sin(Date.now() * 0.003));

        // câmera segue avatar (orbit target)
        controls.target.lerp(
            new THREE.Vector3(model.position.x, baseY + 1.75/2, model.position.z),
            0.08
        );

        // animações
        if (Object.keys(acoes).length > 0) {
            if (keys['KeyE'])  ir('opening', false);
            else if (mv)       ir('walking', true);
            else               ir(Object.keys(acoes)[0], true);
        }
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
