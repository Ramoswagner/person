<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Walker - Estilo Zelda (Câmera em Terceira Pessoa)</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border-left: 4px solid #4CAF50;
            pointer-events: none;
        }

        #controls-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border-right: 4px solid #4CAF50;
            font-size: 0.9rem;
            line-height: 1.8;
            pointer-events: none;
        }

        #controls-hint span {
            color: #4CAF50;
            font-weight: bold;
            display: inline-block;
            width: 25px;
        }

        #status {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            z-index: 15;
            border-left: 3px solid #4CAF50;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 60px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid #4CAF50;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(76, 175, 80, 0.3);
            border-radius: 50%;
            border-top-color: #4CAF50;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .control-btn {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            border: 2px solid #4CAF50;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: all 0.2s ease;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #4CAF50;
            transform: scale(1.1);
        }

        #speed-control {
            position: absolute;
            bottom: 100px;
            right: 30px;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 15px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
            border: 1px solid #4CAF50;
            z-index: 20;
            width: 200px;
        }

        #speed-control input {
            width: 100%;
            margin: 5px 0;
            accent-color: #4CAF50;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🎮 Estilo Zelda - Câmera em Terceira Pessoa</h2>
        <p>Modelo: novo.glb | Andando continuamente enquanto pressiona</p>
    </div>

    <div id="controls-hint">
        <div><span>W</span> Frente</div>
        <div><span>S</span> Trás</div>
        <div><span>A</span> Esquerda</div>
        <div><span>D</span> Direita</div>
        <div><span>Q</span> Rotacionar Esquerda</div>
        <div><span>E</span> Rotacionar Direita</div>
        <div><span>Shift</span> Correr</div>
        <div style="margin-top: 10px; color: #4CAF50;">⬤ Solte as teclas para parar</div>
    </div>

    <div id="status">
        🚶 Parado | Posição: 0, 0
    </div>

    <div id="speed-control">
        <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
            <span>🐢</span>
            <span id="speed-value">Velocidade: 2.0x</span>
            <span>🐇</span>
        </div>
        <input type="range" id="speed-slider" min="0.5" max="4" step="0.1" value="2.0">
    </div>

    <button class="control-btn" id="reset-pos" title="Resetar Posição">⟲</button>

    <div id="loading">
        <span class="spinner"></span> Carregando modelo...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Configuração inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 15, 40);

        // Câmera em estilo Zelda (terceira pessoa fixa atrás do personagem)
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 4, 8); // Posição inicial da câmera

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- Iluminação ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal (sol)
        const sunLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        sunLight.position.set(10, 20, 5);
        sunLight.castShadow = true;
        sunLight.receiveShadow = true;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        sunLight.shadow.camera.near = 0.5;
        sunLight.shadow.camera.far = 50;
        sunLight.shadow.camera.left = -15;
        sunLight.shadow.camera.right = 15;
        sunLight.shadow.camera.top = 15;
        sunLight.shadow.camera.bottom = -15;
        scene.add(sunLight);

        // Luz de preenchimento
        const fillLight = new THREE.PointLight(0x4466aa, 0.6);
        fillLight.position.set(-5, 5, 10);
        scene.add(fillLight);

        // Luz de fundo
        const backLight = new THREE.PointLight(0xaa66ff, 0.3);
        backLight.position.set(0, 3, -10);
        scene.add(backLight);

        // --- Cenário com referências visuais ---
        
        // Chão com grama (textura procedural)
        const groundGeometry = new THREE.CircleGeometry(30, 64);
        const groundMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x2a2a3a,
            roughness: 0.8,
            metalness: 0.1
        });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grade decorativa
        const gridHelper = new THREE.GridHelper(30, 20, 0x4CAF50, 0x335533);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Círculos concêntricos para referência de distância
        const ringMaterial = new THREE.LineBasicMaterial({ color: 0x4CAF50, opacity: 0.3, transparent: true });
        for (let i = 1; i <= 4; i++) {
            const points = [];
            const radius = i * 3;
            for (let angle = 0; angle <= Math.PI * 2; angle += 0.1) {
                points.push(new THREE.Vector3(Math.cos(angle) * radius, 0.02, Math.sin(angle) * radius));
            }
            const ringGeometry = new THREE.BufferGeometry().setFromPoints(points);
            const ringLine = new THREE.LineLoop(ringGeometry, ringMaterial);
            scene.add(ringLine);
        }

        // Pequenos marcadores de direção
        const markerMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
        for (let i = -4; i <= 4; i++) {
            for (let j = -4; j <= 4; j++) {
                if (i === 0 && j === 0) continue;
                const marker = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2), markerMat);
                marker.position.set(i * 2, 0.1, j * 2);
                marker.castShadow = true;
                marker.receiveShadow = true;
                scene.add(marker);
            }
        }

        // Árvores simples para referência
        const treeTrunkGeo = new THREE.CylinderGeometry(0.3, 0.4, 2);
        const treeTopGeo = new THREE.ConeGeometry(0.8, 1.5, 8);
        const trunkMat = new THREE.MeshStandardMaterial({ color: 0x8B5A2B });
        const topMat = new THREE.MeshStandardMaterial({ color: 0x2E7D32 });
        
        const treePositions = [
            [6, 0, 6], [-6, 0, -6], [8, 0, -4], [-8, 0, 5], [5, 0, -7], [-5, 0, 8]
        ];
        
        treePositions.forEach(pos => {
            const trunk = new THREE.Mesh(treeTrunkGeo, trunkMat);
            trunk.position.set(pos[0], 1, pos[2]);
            trunk.castShadow = true;
            trunk.receiveShadow = true;
            scene.add(trunk);
            
            const top = new THREE.Mesh(treeTopGeo, topMat);
            top.position.set(pos[0], 2.5, pos[2]);
            top.castShadow = true;
            top.receiveShadow = true;
            scene.add(top);
        });

        // --- Variáveis do personagem ---
        let character = null;
        let mixer = null;
        let clock = new THREE.Clock();
        
        // Estado do personagem
        const characterState = {
            position: new THREE.Vector3(0, 0, 0),
            rotation: 0,
            speed: 2.0,
            isMoving: false,
            moveDirection: new THREE.Vector3(0, 0, 0),
            // Teclas pressionadas
            keys: {
                w: false, a: false, s: false, d: false,
                q: false, e: false,
                shift: false
            }
        };

        // Elementos DOM
        const loadingEl = document.getElementById('loading');
        const statusEl = document.getElementById('status');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        const resetBtn = document.getElementById('reset-pos');

        // Speed slider
        speedSlider.addEventListener('input', (e) => {
            characterState.speed = parseFloat(e.target.value);
            speedValue.textContent = `Velocidade: ${characterState.speed.toFixed(1)}x`;
        });

        // Reset position
        resetBtn.addEventListener('click', () => {
            if (character) {
                character.position.set(0, 0, 0);
                character.rotation.y = 0;
                characterState.position.set(0, 0, 0);
                characterState.rotation = 0;
            }
        });

        // --- Sistema de teclado (segura para andar, solta para parar) ---
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': characterState.keys.w = true; e.preventDefault(); break;
                case 'KeyS': characterState.keys.s = true; e.preventDefault(); break;
                case 'KeyA': characterState.keys.a = true; e.preventDefault(); break;
                case 'KeyD': characterState.keys.d = true; e.preventDefault(); break;
                case 'KeyQ': characterState.keys.q = true; e.preventDefault(); break;
                case 'KeyE': characterState.keys.e = true; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    characterState.keys.shift = true;
                    characterState.speed = 3.5;
                    speedSlider.value = 3.5;
                    speedValue.textContent = 'Velocidade: 3.5x';
                    e.preventDefault();
                    break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': characterState.keys.w = false; e.preventDefault(); break;
                case 'KeyS': characterState.keys.s = false; e.preventDefault(); break;
                case 'KeyA': characterState.keys.a = false; e.preventDefault(); break;
                case 'KeyD': characterState.keys.d = false; e.preventDefault(); break;
                case 'KeyQ': characterState.keys.q = false; e.preventDefault(); break;
                case 'KeyE': characterState.keys.e = false; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    characterState.keys.shift = false;
                    characterState.speed = parseFloat(speedSlider.value);
                    e.preventDefault();
                    break;
            }
        });

        // Prevenir rolagem da página com as setas
        window.addEventListener('keydown', (e) => {
            if (e.code.startsWith('Key') || e.code.startsWith('Shift')) {
                e.preventDefault();
            }
        }, { passive: false });

        // --- Carregar o modelo GLB ---
        const loader = new GLTFLoader();
        
        loader.load(
            'novo.glb',
            (gltf) => {
                character = gltf.scene;
                
                character.position.set(0, 0, 0);
                character.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                scene.add(character);
                
                // Configurar animações
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(character);
                    
                    gltf.animations.forEach((clip) => {
                        const action = mixer.clipAction(clip);
                        action.play();
                    });
                    
                    // Inicialmente pausar a animação (personagem parado)
                    if (mixer) {
                        mixer.timeScale = 0; // Começa parado
                    }
                }
                
                loadingEl.classList.add('hidden');
                console.log('Personagem carregado!');
            },
            (xhr) => {
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                loadingEl.innerHTML = `<span class="spinner"></span> Carregando... ${percent}%`;
            },
            (error) => {
                console.error('Erro:', error);
                loadingEl.innerHTML = '❌ Erro ao carregar. Criando placeholder...';
                
                // Placeholder com formato humanoide
                const group = new THREE.Group();
                
                // Corpo
                const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.5);
                const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4CAF50 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.75;
                body.castShadow = true;
                body.receiveShadow = true;
                group.add(body);
                
                // Cabeça
                const headGeo = new THREE.SphereGeometry(0.3);
                const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.65;
                head.castShadow = true;
                head.receiveShadow = true;
                group.add(head);
                
                character = group;
                character.position.set(0, 0, 0);
                scene.add(character);
                
                loadingEl.classList.add('hidden');
            }
        );

        // --- Sistema de movimento estilo Zelda ---
        function updateMovement(delta) {
            if (!character) return;
            
            // Calcular direção do movimento baseado nas teclas pressionadas
            const moveX = (characterState.keys.d ? 1 : 0) - (characterState.keys.a ? 1 : 0);
            const moveZ = (characterState.keys.s ? 1 : 0) - (characterState.keys.w ? 1 : 0);
            
            // Rotação (Q/E)
            if (characterState.keys.q) {
                characterState.rotation += 2 * delta;
            }
            if (characterState.keys.e) {
                characterState.rotation -= 2 * delta;
            }
            
            // Aplicar rotação ao personagem
            character.rotation.y = characterState.rotation;
            
            // Verificar se está se movendo
            const isMoving = moveX !== 0 || moveZ !== 0;
            characterState.isMoving = isMoving;
            
            // Controlar animação (andar quando move, parar quando não move)
            if (mixer) {
                // Se estiver se movendo, velocidade normal, senão para a animação
                mixer.timeScale = isMoving ? 1 : 0;
            }
            
            // Se não estiver se movendo, não atualiza posição
            if (!isMoving) {
                // Atualizar status
                statusEl.innerHTML = `🚶 Parado | Posição: ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;
                return;
            }
            
            // Calcular movimento baseado na rotação do personagem
            const speed = characterState.speed * delta * 3;
            
            // Direção no espaço local do personagem
            if (moveZ !== 0 || moveX !== 0) {
                // Vetor de movimento na direção da câmera (estilo Zelda - movimento relativo à câmera)
                // Mas por enquanto, vamos usar movimento relativo ao personagem
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterState.rotation);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterState.rotation);
                
                const movement = new THREE.Vector3()
                    .addScaledVector(forward, -moveZ * speed)  // Invertido porque Z negativo é frente
                    .addScaledVector(right, moveX * speed);
                
                character.position.x += movement.x;
                character.position.z += movement.z;
                
                // Atualizar estado
                characterState.position.copy(character.position);
            }
            
            // Atualizar status
            statusEl.innerHTML = `🚶 Andando | Posição: ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)} | Ângulo: ${(characterState.rotation * 180 / Math.PI).toFixed(0)}°`;
        }

        // --- Sistema de câmera estilo Zelda (terceira pessoa fixa) ---
        function updateCamera() {
            if (!character) return;
            
            // Posição da câmera relativa ao personagem
            // Distância, altura e ângulo fixes (estilo Zelda clássico)
            const distance = 8;
            const height = 4;
            const lookAtHeight = 1.5; // Altura para olhar (peito do personagem)
            
            // Ângulo fixo da câmera (ligeiramente acima e atrás)
            // Em Zelda, a câmera geralmente está atrás do personagem, mas com ângulo fixo
            const cameraAngle = characterState.rotation + Math.PI / 4; // 45° atrás do personagem
            
            // Calcular posição da câmera baseada na rotação do personagem
            const cameraX = character.position.x + Math.sin(cameraAngle) * distance;
            const cameraZ = character.position.z + Math.cos(cameraAngle) * distance;
            const cameraY = character.position.y + height;
            
            camera.position.set(cameraX, cameraY, cameraZ);
            camera.lookAt(
                character.position.x,
                character.position.y + lookAtHeight,
                character.position.z
            );
        }

        // --- Animação principal ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); // Limitar delta máximo

            // Atualizar animação do personagem
            if (mixer) {
                mixer.update(delta);
            }

            // Atualizar movimento
            updateMovement(delta);
            
            // Atualizar câmera (sempre após o movimento)
            updateCamera();

            renderer.render(scene, camera);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Prevenir menu de contexto ---
        window.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
