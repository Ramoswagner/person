<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 VOXEL ENGINE 3D - Gerador de Modelos Pixelados</title>
    
    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>
    
    <!-- Estilos -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P', cursive;
            background: #1a1a2e;
            color: white;
            overflow: hidden;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        /* Fundo com gradiente pixelado */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #0f0f1f 0px,
                #0f0f1f 4px,
                #1a1a2e 4px,
                #1a1a2e 8px
            );
            z-index: -2;
        }

        /* Overlay de grade */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: -1;
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 20px;
            gap: 20px;
        }

        /* Painel Esquerdo - Controles */
        .left-panel {
            width: 380px;
            background: rgba(10, 10, 20, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid #00ffff;
            border-radius: 0px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.3);
            image-rendering: pixelated;
        }

        /* Título Pixel */
        .pixel-title {
            font-family: 'Press Start 2P', cursive;
            font-size: 16px;
            color: #ffff00;
            text-shadow: 
                3px 3px 0 #ff00ff,
                6px 6px 0 rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Área de Upload Pixelada */
        .pixel-upload {
            background: #0f0f1f;
            border: 4px solid #00ffff;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s step-end;
            position: relative;
            image-rendering: pixelated;
        }

        .pixel-upload:hover {
            border-color: #ffff00;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #ff00ff;
        }

        .pixel-upload i {
            font-size: 48px;
            color: #00ffff;
            margin-bottom: 15px;
            display: block;
        }

        .pixel-upload p {
            font-size: 12px;
            color: white;
            margin-bottom: 10px;
        }

        .pixel-upload small {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #888;
        }

        #file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Preview Pixel */
        .pixel-preview {
            border: 4px solid #ff00ff;
            background: #0f0f1f;
            padding: 10px;
            display: none;
        }

        .pixel-preview.active {
            display: block;
        }

        .pixel-preview img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            border: 2px solid #00ffff;
        }

        .preview-info {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            font-size: 10px;
            color: #ffff00;
        }

        /* Controles de Voxel */
        .voxel-controls {
            background: #0f0f1f;
            border: 4px solid #ffff00;
            padding: 15px;
        }

        .control-group {
            margin-bottom: 20px;
        }

        .control-label {
            font-size: 10px;
            color: #ff00ff;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
        }

        /* Slider Estilo Pixel */
        .pixel-slider {
            width: 100%;
            height: 20px;
            background: #1a1a2e;
            border: 2px solid #00ffff;
            -webkit-appearance: none;
            appearance: none;
        }

        .pixel-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 30px;
            background: #ffff00;
            border: 2px solid #ff00ff;
            cursor: pointer;
            image-rendering: pixelated;
        }

        .pixel-slider::-webkit-slider-thumb:hover {
            background: #ff00ff;
            border-color: #00ffff;
        }

        /* Select Pixel */
        .pixel-select {
            width: 100%;
            padding: 12px;
            background: #1a1a2e;
            border: 2px solid #ff00ff;
            color: white;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            appearance: none;
            cursor: pointer;
        }

        /* Botão Gerar Pixel */
        .pixel-button {
            background: #ff00ff;
            border: 4px solid #00ffff;
            padding: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 14px;
            color: white;
            cursor: pointer;
            transition: all 0.1s step-end;
            text-shadow: 2px 2px 0 #000;
            width: 100%;
        }

        .pixel-button:hover:not(:disabled) {
            background: #ffff00;
            border-color: #ff00ff;
            transform: translate(-2px, -2px);
            box-shadow: 5px 5px 0 #00ffff;
        }

        .pixel-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Barra de Progresso Pixel */
        .pixel-progress {
            width: 100%;
            height: 30px;
            background: #0f0f1f;
            border: 4px solid #00ffff;
            margin: 10px 0;
            display: none;
        }

        .pixel-progress.active {
            display: block;
        }

        .pixel-progress-fill {
            height: 100%;
            background: repeating-linear-gradient(
                45deg,
                #ffff00 0px,
                #ffff00 10px,
                #ff00ff 10px,
                #ff00ff 20px
            );
            width: 0%;
            transition: width 0.3s steps(10);
        }

        /* Stats Pixel */
        .pixel-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .pixel-stat {
            background: #0f0f1f;
            border: 2px solid #ff00ff;
            padding: 10px;
            text-align: center;
        }

        .pixel-stat .label {
            font-size: 8px;
            color: #00ffff;
            margin-bottom: 5px;
        }

        .pixel-stat .value {
            font-size: 14px;
            color: #ffff00;
            font-weight: bold;
        }

        /* Painel Direito - Visualizador */
        .right-panel {
            flex: 1;
            background: rgba(10, 10, 20, 0.9);
            border: 4px solid #ff00ff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.3);
        }

        #canvas-container {
            flex: 1;
            background: #0a0a14;
            border: 4px solid #00ffff;
            position: relative;
            overflow: hidden;
            image-rendering: pixelated;
        }

        /* Grid Overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 10;
        }

        /* Loading Overlay Pixel */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 20, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 20;
            display: none;
            backdrop-filter: blur(4px);
        }

        .loading-overlay.active {
            display: flex;
        }

        .pixel-loader {
            width: 80px;
            height: 80px;
            background: repeating-linear-gradient(
                45deg,
                #ffff00 0px,
                #ffff00 8px,
                #ff00ff 8px,
                #ff00ff 16px
            );
            animation: pixelSpin 0.5s steps(8) infinite;
            border: 4px solid #00ffff;
        }

        @keyframes pixelSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: 'Press Start 2P', cursive;
            font-size: 12px;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff00ff;
        }

        /* Ações */
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .pixel-button-small {
            flex: 1;
            padding: 12px;
            background: #0f0f1f;
            border: 2px solid #00ffff;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: white;
            cursor: pointer;
            transition: all 0.1s step-end;
        }

        .pixel-button-small:hover:not(:disabled) {
            background: #ffff00;
            border-color: #ff00ff;
            color: black;
        }

        .pixel-button-small:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* Hint Bar */
        .hint-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f0f1f;
            border: 2px solid #ff00ff;
            padding: 8px 16px;
            display: flex;
            gap: 20px;
            z-index: 30;
            display: none;
        }

        .hint-bar.show {
            display: flex;
        }

        .hint-item {
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #00ffff;
        }

        .hint-item span {
            background: #1a1a2e;
            padding: 3px 6px;
            border: 1px solid #ffff00;
            margin-right: 5px;
        }

        /* Mouse Tracking */
        .mouse-pos {
            position: absolute;
            top: 10px;
            right: 10px;
            font-family: 'Press Start 2P', cursive;
            font-size: 8px;
            color: #ff00ff;
            background: rgba(0, 0, 0, 0.5);
            padding: 5px;
            border: 1px solid #00ffff;
            z-index: 40;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Painel Esquerdo -->
        <div class="left-panel">
            <div class="pixel-title">
                🔷 VOXEL ENGINE 3D 🔷
                <div style="font-size: 8px; margin-top: 10px; color: #00ffff;">PIXEL EDITION</div>
            </div>

            <!-- Upload -->
            <div class="pixel-upload" id="upload-area">
                <i>🖼️</i>
                <p>CARREGAR IMAGEM</p>
                <small>PNG / JPG / GIF</small>
                <input type="file" id="file-input" accept="image/*">
            </div>

            <!-- Preview -->
            <div class="pixel-preview" id="image-preview">
                <img id="preview-img" src="" alt="preview">
                <div class="preview-info">
                    <span id="img-name">—</span>
                    <span id="img-size">0x0</span>
                </div>
            </div>

            <!-- Controles Voxel -->
            <div class="voxel-controls">
                <div class="control-group">
                    <div class="control-label">
                        <span>RESOLUÇÃO VOXEL</span>
                        <span id="resolution-value">32³</span>
                    </div>
                    <input type="range" class="pixel-slider" id="voxel-resolution" min="8" max="64" value="32" step="8">
                </div>

                <div class="control-group">
                    <div class="control-label">
                        <span>PROFUNDIDADE</span>
                        <span id="depth-value">16</span>
                    </div>
                    <input type="range" class="pixel-slider" id="voxel-depth" min="4" max="32" value="16" step="2">
                </div>

                <div class="control-group">
                    <div class="control-label">ESTILO PIXEL</div>
                    <select class="pixel-select" id="pixel-style">
                        <option value="minecraft">🎮 Minecraft</option>
                        <option value="fortnite" selected>⚡ Fortnite</option>
                        <option value="retro">🕹️ Retro 8-bit</option>
                        <option value="rgb">🌈 RGB Wave</option>
                    </select>
                </div>
            </div>

            <!-- Botão Gerar -->
            <button class="pixel-button" id="generate-btn" disabled>
                🧱 GERAR VOXEL 3D 🧱
            </button>

            <!-- Progresso -->
            <div class="pixel-progress" id="progress-bar">
                <div class="pixel-progress-fill" id="progress-fill"></div>
            </div>

            <!-- Stats -->
            <div class="pixel-stats">
                <div class="pixel-stat">
                    <div class="label">VOXELS</div>
                    <div class="value" id="stat-voxels">0</div>
                </div>
                <div class="pixel-stat">
                    <div class="label">TAMANHO</div>
                    <div class="value" id="stat-size">32³</div>
                </div>
                <div class="pixel-stat">
                    <div class="label">CORES</div>
                    <div class="value" id="stat-colors">0</div>
                </div>
                <div class="pixel-stat">
                    <div class="label">POLIGONOS</div>
                    <div class="value" id="stat-poly">0</div>
                </div>
            </div>

            <!-- Ações -->
            <div class="action-buttons">
                <button class="pixel-button-small" id="download-btn" disabled>
                    ⬇️ GLB
                </button>
                <button class="pixel-button-small" id="export-obj" disabled>
                    📦 OBJ
                </button>
                <button class="pixel-button-small" id="reset-btn">
                    🔄 RESET
                </button>
            </div>
        </div>

        <!-- Painel Direito -->
        <div class="right-panel">
            <div id="canvas-container">
                <div class="grid-overlay"></div>
                <div class="mouse-pos" id="mouse-pos">X: 0 Y: 0 Z: 0</div>
                
                <!-- Loading -->
                <div class="loading-overlay" id="loading-overlay">
                    <div class="pixel-loader"></div>
                    <div class="loading-text" id="generation-status">GERANDO VOXELS...</div>
                </div>

                <!-- Hint Bar -->
                <div class="hint-bar" id="hint-bar">
                    <div class="hint-item"><span>🖱️</span> ROTACIONAR</div>
                    <div class="hint-item"><span>⚡</span> ZOOM</div>
                    <div class="hint-item"><span>🎮</span> MODO PIXEL</div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFExporter } from 'three/addons/exporters/GLTFExporter.js';

        // ==================== CONFIGURAÇÃO THREE.JS ====================
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a14);

        // Câmera estilo voxel (isométrica)
        const camera = new THREE.OrthographicCamera(-5, 5, 5, -5, 0.1, 1000);
        camera.position.set(8, 6, 8);
        camera.lookAt(0, 0, 0);
        camera.zoom = 1.5;

        // Renderizador com configurações pixeladas
        const renderer = new THREE.WebGLRenderer({ 
            antialias: false,
            powerPreference: "high-performance"
        });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(1); // Sem anti-aliasing para efeito pixel
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // Controles (mais lentos para sensação pixel)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.1;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.0;
        controls.enableZoom = true;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 1, 0);

        // Iluminação estilo Minecraft
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal com sombras pixeladas
        const mainLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 1;
        mainLight.shadow.camera.far = 20;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        mainLight.shadow.bias = -0.0005;
        scene.add(mainLight);

        // Grid pixelado
        const gridHelper = new THREE.GridHelper(10, 20, 0x00ffff, 0xff00ff);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // Cubos de luz coloridos
        const lightColors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00];
        lightColors.forEach((color, i) => {
            const lightCube = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.2, 0.2),
                new THREE.MeshBasicMaterial({ color: color })
            );
            const angle = (i / lightColors.length) * Math.PI * 2;
            lightCube.position.set(Math.sin(angle) * 3, 1, Math.cos(angle) * 3);
            scene.add(lightCube);
        });

        // Partículas pixeladas
        const pixelParticles = new THREE.BufferGeometry();
        const particleCount = 500;
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        for (let i = 0; i < particleCount; i++) {
            positions[i*3] = (Math.random() - 0.5) * 20;
            positions[i*3+1] = (Math.random() - 0.5) * 10;
            positions[i*3+2] = (Math.random() - 0.5) * 20;
            
            // Cores vibrantes pixeladas
            const color = new THREE.Color().setHSL(Math.random(), 0.8, 0.6);
            colors[i*3] = color.r;
            colors[i*3+1] = color.g;
            colors[i*3+2] = color.b;
        }
        
        pixelParticles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        pixelParticles.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.1,
            vertexColors: true,
            sizeAttenuation: false // Tamanho fixo para efeito pixel
        });
        
        const particles = new THREE.Points(pixelParticles, particleMaterial);
        scene.add(particles);

        // ==================== VARIÁVEIS GLOBAIS ====================
        let currentModel = null;
        let uploadedImage = null;
        let imageData = null;
        
        // Elementos DOM
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const imagePreview = document.getElementById('image-preview');
        const previewImg = document.getElementById('preview-img');
        const imgName = document.getElementById('img-name');
        const imgSize = document.getElementById('img-size');
        const generateBtn = document.getElementById('generate-btn');
        const downloadBtn = document.getElementById('download-btn');
        const exportObj = document.getElementById('export-obj');
        const resetBtn = document.getElementById('reset-btn');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        const loadingOverlay = document.getElementById('loading-overlay');
        const generationStatus = document.getElementById('generation-status');
        const hintBar = document.getElementById('hint-bar');
        const mousePos = document.getElementById('mouse-pos');
        
        // Stats elements
        const statVoxels = document.getElementById('stat-voxels');
        const statSize = document.getElementById('stat-size');
        const statColors = document.getElementById('stat-colors');
        const statPoly = document.getElementById('stat-poly');
        
        // Sliders
        const resolutionSlider = document.getElementById('voxel-resolution');
        const resolutionValue = document.getElementById('resolution-value');
        const depthSlider = document.getElementById('voxel-depth');
        const depthValue = document.getElementById('depth-value');
        const pixelStyle = document.getElementById('pixel-style');

        // ==================== UTILITÁRIOS ====================
        resolutionSlider.addEventListener('input', (e) => {
            resolutionValue.textContent = e.target.value + '³';
        });
        
        depthSlider.addEventListener('input', (e) => {
            depthValue.textContent = e.target.value;
        });

        // Mouse tracking
        renderer.domElement.addEventListener('mousemove', (e) => {
            const rect = renderer.domElement.getBoundingClientRect();
            const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            
            // Raycaster para pegar posição 3D
            const raycaster = new THREE.Raycaster();
            raycaster.setFromCamera({x, y}, camera);
            
            // Posição aproximada no grid
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const point = new THREE.Vector3();
            raycaster.ray.intersectPlane(plane, point);
            
            if (point) {
                mousePos.textContent = `X: ${Math.round(point.x)} Y: ${Math.round(point.y)} Z: ${Math.round(point.z)}`;
            }
        });

        // ==================== UPLOAD DE IMAGEM ====================
        uploadArea.addEventListener('click', () => fileInput.click());
        
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    previewImg.src = e.target.result;
                    imagePreview.classList.add('active');
                    uploadedImage = e.target.result;
                    imgName.textContent = file.name.substring(0, 15) + '...';
                    
                    // Carregar imagem para análise
                    const img = new Image();
                    img.onload = () => {
                        imgSize.textContent = img.width + 'x' + img.height;
                        analyzeImage(img);
                    };
                    img.src = e.target.result;
                    
                    generateBtn.disabled = false;
                };
                reader.readAsDataURL(file);
            }
        });

        // Analisar cores da imagem
        function analyzeImage(img) {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, 64, 64);
            imageData = ctx.getImageData(0, 0, 64, 64);
            
            // Contar cores únicas (aproximado)
            const colors = new Set();
            for (let i = 0; i < imageData.data.length; i += 4) {
                const r = Math.floor(imageData.data[i] / 16) * 16;
                const g = Math.floor(imageData.data[i+1] / 16) * 16;
                const b = Math.floor(imageData.data[i+2] / 16) * 16;
                colors.add(`${r},${g},${b}`);
            }
            statColors.textContent = Math.min(colors.size, 64);
        }

        // ==================== GERAR VOXELS ====================
        generateBtn.addEventListener('click', async () => {
            if (!uploadedImage || !imageData) return;
            
            generateBtn.disabled = true;
            downloadBtn.disabled = true;
            exportObj.disabled = true;
            progressBar.classList.add('active');
            loadingOverlay.classList.add('active');
            hintBar.classList.remove('show');
            
            const resolution = parseInt(resolutionSlider.value);
            const depth = parseInt(depthSlider.value);
            const style = pixelStyle.value;
            
            // Simular progresso
            let progress = 0;
            const interval = setInterval(() => {
                progress += 5;
                if (progress <= 90) {
                    progressFill.style.width = progress + '%';
                    generationStatus.textContent = `GERANDO VOXELS... ${progress}%`;
                }
            }, 100);
            
            try {
                // Pequeno delay para efeito
                await new Promise(resolve => setTimeout(resolve, 2000));
                
                // Remover modelo anterior
                if (currentModel) {
                    scene.remove(currentModel);
                }
                
                // Gerar voxels
                const voxelModel = generateVoxels(imageData, resolution, depth, style);
                scene.add(voxelModel);
                currentModel = voxelModel;
                
                // Atualizar stats
                const voxelCount = resolution * resolution * depth;
                statVoxels.textContent = voxelCount.toLocaleString();
                statSize.textContent = resolution + '³';
                statPoly.textContent = (voxelCount * 6).toLocaleString();
                
                clearInterval(interval);
                progressFill.style.width = '100%';
                generationStatus.textContent = 'VOXELS GERADOS!';
                
                setTimeout(() => {
                    progressBar.classList.remove('active');
                    loadingOverlay.classList.remove('active');
                    generateBtn.disabled = false;
                    downloadBtn.disabled = false;
                    exportObj.disabled = false;
                    hintBar.classList.add('show');
                    controls.autoRotate = true;
                }, 500);
                
            } catch (error) {
                console.error('Erro:', error);
                clearInterval(interval);
                progressBar.classList.remove('active');
                loadingOverlay.classList.remove('active');
                generateBtn.disabled = false;
            }
        });

        // Função principal de geração de voxels
        function generateVoxels(imageData, resolution, depth, style) {
            const group = new THREE.Group();
            const step = 64 / resolution;
            const colors = [];
            
            // Mapear cores baseado no estilo
            for (let y = 0; y < resolution; y++) {
                for (let x = 0; x < resolution; x++) {
                    const ix = Math.floor(x * step);
                    const iy = Math.floor(y * step);
                    const idx = (iy * 64 + ix) * 4;
                    
                    const r = imageData.data[idx];
                    const g = imageData.data[idx + 1];
                    const b = imageData.data[idx + 2];
                    const a = imageData.data[idx + 3];
                    
                    // Pular pixels transparentes
                    if (a < 128) continue;
                    
                    // Calcular altura baseada na cor
                    let height = Math.floor((r + g + b) / (3 * 8));
                    
                    // Ajustar altura baseada no estilo
                    switch(style) {
                        case 'fortnite':
                            height = Math.floor(height * 1.5);
                            break;
                        case 'retro':
                            height = Math.floor(height / 2);
                            break;
                        case 'rgb':
                            height = Math.floor((r + g + b) / 3 / 8);
                            break;
                        default: // minecraft
                            height = Math.floor(height * 1.2);
                    }
                    
                    // Limitar profundidade
                    height = Math.min(height, depth);
                    
                    // Gerar voxels empilhados
                    for (let z = 0; z < height; z++) {
                        // Calcular cor com base no estilo
                        let color;
                        switch(style) {
                            case 'fortnite':
                                // Cores vibrantes
                                color = new THREE.Color(
                                    Math.min(1, r / 128 + 0.5),
                                    Math.min(1, g / 128 + 0.5),
                                    Math.min(1, b / 128 + 0.5)
                                );
                                break;
                            case 'rgb':
                                // Gradiente RGB baseado em altura
                                const hue = (z / depth) * 0.8 + 0.2;
                                color = new THREE.Color().setHSL(hue, 0.9, 0.6);
                                break;
                            case 'retro':
                                // Cores reduzidas (16 bits)
                                color = new THREE.Color(
                                    Math.floor(r / 64) / 4,
                                    Math.floor(g / 64) / 4,
                                    Math.floor(b / 64) / 4
                                );
                                break;
                            default: // minecraft
                                color = new THREE.Color(r / 255, g / 255, b / 255);
                        }
                        
                        // Criar cubo voxel
                        const geometry = new THREE.BoxGeometry(0.9, 0.9, 0.9);
                        const material = new THREE.MeshStandardMaterial({
                            color: color,
                            emissive: style === 'rgb' ? color : 0x000000,
                            roughness: 0.3,
                            metalness: 0.1
                        });
                        
                        const cube = new THREE.Mesh(geometry, material);
                        
                        // Posicionar voxel
                        const offsetX = (x - resolution/2) * 1.0;
                        const offsetY = z * 1.0;
                        const offsetZ = (y - resolution/2) * 1.0;
                        
                        cube.position.set(offsetX, offsetY, offsetZ);
                        cube.castShadow = true;
                        cube.receiveShadow = true;
                        
                        group.add(cube);
                    }
                }
            }
            
            return group;
        }

        // ==================== DOWNLOAD ====================
        downloadBtn.addEventListener('click', async () => {
            if (!currentModel) return;
            
            const exporter = new GLTFExporter();
            const options = {
                binary: true,
                trs: false,
                onlyVisible: true,
                includeCustomExtensions: false
            };
            
            exporter.parse(
                currentModel,
                (result) => {
                    const blob = new Blob([result], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `voxel-model-${Date.now()}.glb`;
                    a.click();
                    URL.revokeObjectURL(url);
                },
                options
            );
        });

        // ==================== RESET ====================
        resetBtn.addEventListener('click', () => {
            fileInput.value = '';
            imagePreview.classList.remove('active');
            previewImg.src = '';
            uploadedImage = null;
            imageData = null;
            generateBtn.disabled = true;
            downloadBtn.disabled = true;
            exportObj.disabled = true;
            progressBar.classList.remove('active');
            progressFill.style.width = '0%';
            
            if (currentModel) {
                scene.remove(currentModel);
                currentModel = null;
            }
            
            // Reset stats
            statVoxels.textContent = '0';
            statColors.textContent = '0';
            statPoly.textContent = '0';
            
            controls.autoRotate = true;
            hintBar.classList.remove('show');
        });

        // ==================== ANIMAÇÃO ====================
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update();
            
            // Animar partículas
            particles.rotation.y += 0.001;
            
            renderer.render(scene, camera);
        }
        
        animate();

        // ==================== RESIZE ====================
        window.addEventListener('resize', () => {
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            renderer.setSize(width, height);
            
            // Ajustar câmera ortográfica
            const aspect = width / height;
            const frustumSize = 10;
            
            camera.left = -frustumSize * aspect / 2;
            camera.right = frustumSize * aspect / 2;
            camera.top = frustumSize / 2;
            camera.bottom = -frustumSize / 2;
            camera.updateProjectionMatrix();
        });
    </script>
</body>
