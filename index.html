<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Walker - Controle de Movimento 360°</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border-left: 4px solid #ff3366;
        }

        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 40, 0.9);
            backdrop-filter: blur(10px);
            color: white;
            padding: 20px 30px;
            border-radius: 60px;
            display: flex;
            gap: 30px;
            z-index: 20;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-group {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .control-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            font-weight: bold;
            transition: all 0.2s ease;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .control-btn:hover {
            background: #ff3366;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(255,51,102,0.4);
        }

        .control-btn.active {
            background: #ff3366;
            color: white;
        }

        #speed-control {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 5px 15px;
            border-radius: 30px;
        }

        #speed-value {
            min-width: 45px;
            text-align: center;
            color: #ff3366;
            font-weight: bold;
        }

        #joystick-area {
            position: absolute;
            bottom: 150px;
            right: 30px;
            width: 120px;
            height: 120px;
            background: rgba(30,30,40,0.6);
            backdrop-filter: blur(5px);
            border-radius: 60px;
            border: 2px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 25;
            cursor: pointer;
            user-select: none;
        }

        #joystick {
            width: 50px;
            height: 50px;
            background: #ff3366;
            border-radius: 50%;
            box-shadow: 0 0 20px rgba(255,51,102,0.5);
            transition: transform 0.1s ease;
        }

        #status {
            position: absolute;
            bottom: 180px;
            left: 30px;
            color: white;
            background: rgba(0,0,0,0.5);
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            z-index: 15;
            border-left: 3px solid #ff3366;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.8);
            padding: 20px 40px;
            border-radius: 60px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid #ff3366;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,51,102,0.3);
            border-radius: 50%;
            border-top-color: #ff3366;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .key-hint {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            color: rgba(255,255,255,0.7);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            z-index: 10;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .key-hint span {
            color: #ff3366;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🚶 Controle de Personagem 360°</h2>
        <p>Modelo: novo.glb | Use WASD ou Joystick para mover</p>
    </div>

    <div id="status">
        🎮 Posição: X:0.00, Y:0.00, Z:0.00 | Ângulo: 0°
    </div>

    <div id="controls-panel">
        <div class="control-group">
            <button class="control-btn" id="move-fwd" title="Frente (W)">▲</button>
            <button class="control-btn" id="move-left" title="Esquerda (A)">◀</button>
            <button class="control-btn" id="move-bwd" title="Trás (S)">▼</button>
            <button class="control-btn" id="move-right" title="Direita (D)">▶</button>
        </div>
        
        <div class="control-group">
            <button class="control-btn" id="rotate-left" title="Rotacionar Esquerda (Q)">↺</button>
            <button class="control-btn" id="rotate-right" title="Rotacionar Direita (E)">↻</button>
        </div>

        <div id="speed-control">
            <span>🐢</span>
            <input type="range" id="speed-slider" min="0.5" max="3" step="0.1" value="1.5">
            <span id="speed-value">1.5x</span>
            <span>🐇</span>
        </div>

        <div class="control-group">
            <button class="control-btn" id="reset-pos" title="Resetar Posição">⟲</button>
            <button class="control-btn" id="grid-btn" title="Toggle Grid">⬚</button>
        </div>
    </div>

    <div id="joystick-area">
        <div id="joystick"></div>
    </div>

    <div class="key-hint">
        <span>WASD</span> Mover | <span>Q/E</span> Rotacionar | <span>Shift</span> Correr | <span>Espaço</span> Pular? (em breve)
    </div>

    <div id="loading">
        <span class="spinner"></span> Carregando modelo...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Configuração inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        scene.fog = new THREE.Fog(0x111122, 10, 30);

        // Câmera que segue o personagem
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles da câmera (agora em modo "seguir")
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.2;
        controls.minDistance = 3;
        controls.maxDistance = 15;
        controls.target.set(0, 1, 0);

        // --- Iluminação (igual ao anterior) ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 15;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 20;
        scene.add(dirLight);

        // Luzes coloridas
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-5, 3, 5);
        scene.add(fillLight);
        
        const colorLight1 = new THREE.PointLight(0xff3366, 0.4);
        colorLight1.position.set(3, 1, 3);
        scene.add(colorLight1);

        // --- Cenário ---
        // Chão com grade
        const gridHelper = new THREE.GridHelper(30, 30, 0xff3366, 0x444466);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // Chão sólido
        const groundGeometry = new THREE.CircleGeometry(20, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, roughness: 0.6, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Adicionar alguns objetos de referência
        const cubeMat = new THREE.MeshStandardMaterial({ color: 0x33ccff, emissive: 0x113355 });
        const cubePositions = [
            [3, 0.5, 3], [-3, 0.5, -3], [4, 0.5, -2], [-4, 0.5, 2], [2, 0.5, -4]
        ];
        
        cubePositions.forEach(pos => {
            const cube = new THREE.Mesh(new THREE.BoxGeometry(1, 1, 1), cubeMat);
            cube.position.set(pos[0], pos[1], pos[2]);
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            
            // Pequeno pino embaixo
            const pin = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2), new THREE.MeshStandardMaterial({ color: 0xffaa00 }));
            pin.position.set(pos[0], 0.1, pos[2]);
            scene.add(pin);
        });

        // Algumas colunas
        const pillarGeo = new THREE.CylinderGeometry(0.3, 0.3, 2);
        const pillarMat = new THREE.MeshStandardMaterial({ color: 0x8866ff });
        for (let i = -5; i <= 5; i+=2.5) {
            for (let j = -5; j <= 5; j+=2.5) {
                if (Math.random() > 0.7) {
                    const pillar = new THREE.Mesh(pillarGeo, pillarMat);
                    pillar.position.set(i, 1, j);
                    pillar.castShadow = true;
                    pillar.receiveShadow = true;
                    scene.add(pillar);
                }
            }
        }

        // --- Variáveis do personagem ---
        let character = null;
        let mixer = null;
        let clock = new THREE.Clock();
        
        // Posição e rotação
        const characterState = {
            position: new THREE.Vector3(0, 0, 0),
            rotation: 0, // em radianos
            speed: 1.5,
            moveFwd: false,
            moveBwd: false,
            moveLeft: false,
            moveRight: false,
            rotateLeft: false,
            rotateRight: false
        };

        // Elementos DOM
        const loadingEl = document.getElementById('loading');
        const statusEl = document.getElementById('status');
        const speedSlider = document.getElementById('speed-slider');
        const speedValue = document.getElementById('speed-value');
        const gridBtn = document.getElementById('grid-btn');
        
        // Controles de movimento
        document.getElementById('move-fwd').addEventListener('mousedown', () => characterState.moveFwd = true);
        document.getElementById('move-fwd').addEventListener('mouseup', () => characterState.moveFwd = false);
        document.getElementById('move-fwd').addEventListener('mouseleave', () => characterState.moveFwd = false);
        
        document.getElementById('move-bwd').addEventListener('mousedown', () => characterState.moveBwd = true);
        document.getElementById('move-bwd').addEventListener('mouseup', () => characterState.moveBwd = false);
        document.getElementById('move-bwd').addEventListener('mouseleave', () => characterState.moveBwd = false);
        
        document.getElementById('move-left').addEventListener('mousedown', () => characterState.moveLeft = true);
        document.getElementById('move-left').addEventListener('mouseup', () => characterState.moveLeft = false);
        document.getElementById('move-left').addEventListener('mouseleave', () => characterState.moveLeft = false);
        
        document.getElementById('move-right').addEventListener('mousedown', () => characterState.moveRight = true);
        document.getElementById('move-right').addEventListener('mouseup', () => characterState.moveRight = false);
        document.getElementById('move-right').addEventListener('mouseleave', () => characterState.moveRight = false);
        
        document.getElementById('rotate-left').addEventListener('mousedown', () => characterState.rotateLeft = true);
        document.getElementById('rotate-left').addEventListener('mouseup', () => characterState.rotateLeft = false);
        document.getElementById('rotate-left').addEventListener('mouseleave', () => characterState.rotateLeft = false);
        
        document.getElementById('rotate-right').addEventListener('mousedown', () => characterState.rotateRight = true);
        document.getElementById('rotate-right').addEventListener('mouseup', () => characterState.rotateRight = false);
        document.getElementById('rotate-right').addEventListener('mouseleave', () => characterState.rotateRight = false);
        
        document.getElementById('reset-pos').addEventListener('click', () => {
            if (character) {
                character.position.set(0, 0, 0);
                character.rotation.y = 0;
                characterState.position.set(0, 0, 0);
                characterState.rotation = 0;
                controls.target.set(0, 1, 0);
            }
        });

        // Speed slider
        speedSlider.addEventListener('input', (e) => {
            characterState.speed = parseFloat(e.target.value);
            speedValue.textContent = characterState.speed.toFixed(1) + 'x';
        });

        // Grid toggle
        let gridVisible = true;
        gridBtn.addEventListener('click', () => {
            gridVisible = !gridVisible;
            gridHelper.visible = gridVisible;
            gridBtn.classList.toggle('active', gridVisible);
            gridBtn.innerHTML = gridVisible ? '⬚' : '◻';
        });

        // --- Teclado ---
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': characterState.moveFwd = true; e.preventDefault(); break;
                case 'KeyS': characterState.moveBwd = true; e.preventDefault(); break;
                case 'KeyA': characterState.moveLeft = true; e.preventDefault(); break;
                case 'KeyD': characterState.moveRight = true; e.preventDefault(); break;
                case 'KeyQ': characterState.rotateLeft = true; e.preventDefault(); break;
                case 'KeyE': characterState.rotateRight = true; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    characterState.speed = 2.5;
                    speedSlider.value = 2.5;
                    speedValue.textContent = '2.5x';
                    e.preventDefault();
                    break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': characterState.moveFwd = false; e.preventDefault(); break;
                case 'KeyS': characterState.moveBwd = false; e.preventDefault(); break;
                case 'KeyA': characterState.moveLeft = false; e.preventDefault(); break;
                case 'KeyD': characterState.moveRight = false; e.preventDefault(); break;
                case 'KeyQ': characterState.rotateLeft = false; e.preventDefault(); break;
                case 'KeyE': characterState.rotateRight = false; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    characterState.speed = parseFloat(speedSlider.value);
                    e.preventDefault();
                    break;
            }
        });

        // --- Joystick simples (toque/mouse) ---
        const joystickArea = document.getElementById('joystick-area');
        const joystick = document.getElementById('joystick');
        let joystickActive = false;
        const joystickCenter = { x: 0, y: 0 };

        joystickArea.addEventListener('mousedown', (e) => {
            joystickActive = true;
            updateJoystick(e);
        });

        window.addEventListener('mousemove', (e) => {
            if (joystickActive) updateJoystick(e);
        });

        window.addEventListener('mouseup', () => {
            joystickActive = false;
            joystick.style.transform = 'translate(0px, 0px)';
            characterState.moveFwd = false;
            characterState.moveBwd = false;
            characterState.moveLeft = false;
            characterState.moveRight = false;
        });

        function updateJoystick(e) {
            const rect = joystickArea.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dx = e.clientX - centerX;
            let dy = e.clientY - centerY;
            
            // Limitar ao raio do joystick
            const distance = Math.sqrt(dx*dx + dy*dy);
            const maxDistance = 40;
            
            if (distance > maxDistance) {
                dx = (dx / distance) * maxDistance;
                dy = (dy / distance) * maxDistance;
            }
            
            joystick.style.transform = `translate(${dx}px, ${dy}px)`;
            
            // Converter para direções
            const threshold = 15;
            characterState.moveFwd = dy < -threshold;
            characterState.moveBwd = dy > threshold;
            characterState.moveLeft = dx < -threshold;
            characterState.moveRight = dx > threshold;
        }

        // --- Carregar o modelo ---
        const loader = new GLTFLoader();
        
        loader.load(
            'novo.glb',
            (gltf) => {
                character = gltf.scene;
                
                character.position.set(0, 0, 0);
                character.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                scene.add(character);
                
                // Configurar animações
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(character);
                    
                    gltf.animations.forEach((clip) => {
                        const action = mixer.clipAction(clip);
                        action.play();
                    });
                }
                
                loadingEl.classList.add('hidden');
                console.log('Personagem carregado!');
            },
            (xhr) => {
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                loadingEl.innerHTML = `<span class="spinner"></span> Carregando... ${percent}%`;
            },
            (error) => {
                console.error('Erro:', error);
                loadingEl.innerHTML = '❌ Erro ao carregar. Criando placeholder...';
                
                // Placeholder
                const geometry = new THREE.BoxGeometry(0.8, 1.8, 0.8);
                const material = new THREE.MeshStandardMaterial({ color: 0xff3366 });
                character = new THREE.Mesh(geometry, material);
                character.position.set(0, 0.9, 0);
                character.castShadow = true;
                character.receiveShadow = true;
                scene.add(character);
                
                loadingEl.classList.add('hidden');
            }
        );

        // --- Atualização do movimento ---
        function updateMovement(delta) {
            if (!character) return;
            
            const moveSpeed = characterState.speed * delta * 2;
            const rotateSpeed = 2 * delta;
            
            // Rotação
            if (characterState.rotateLeft) {
                characterState.rotation += rotateSpeed;
            }
            if (characterState.rotateRight) {
                characterState.rotation -= rotateSpeed;
            }
            
            // Aplicar rotação ao personagem
            character.rotation.y = characterState.rotation;
            
            // Movimento baseado na direção atual
            let moveX = 0;
            let moveZ = 0;
            
            if (characterState.moveFwd) {
                moveZ -= moveSpeed;
            }
            if (characterState.moveBwd) {
                moveZ += moveSpeed;
            }
            if (characterState.moveLeft) {
                moveX -= moveSpeed;
            }
            if (characterState.moveRight) {
                moveX += moveSpeed;
            }
            
            // Ajustar movimento baseado na rotação do personagem
            if (moveX !== 0 || moveZ !== 0) {
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterState.rotation);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterState.rotation);
                
                const movement = new THREE.Vector3()
                    .addScaledVector(forward, moveZ)
                    .addScaledVector(right, moveX);
                
                character.position.x += movement.x;
                character.position.z += movement.z;
                
                // Atualizar estado
                characterState.position.copy(character.position);
            }
            
            // Atualizar alvo da câmera para seguir o personagem
            controls.target.copy(character.position.clone().add(new THREE.Vector3(0, 1, 0)));
            
            // Atualizar status
            statusEl.innerHTML = `🎮 Posição: X:${character.position.x.toFixed(2)}, Z:${character.position.z.toFixed(2)} | Ângulo: ${(characterState.rotation * 180 / Math.PI).toFixed(0)}°`;
        }

        // --- Animação ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            if (mixer) {
                mixer.update(delta);
            }

            updateMovement(delta);

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
