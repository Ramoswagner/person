<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050810;
    color: #e0e8ff;
    font-family: 'Rajdhani', sans-serif;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas { display: block; }

  #hud {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    pointer-events: none;
  }

  .hud-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a7aff;
    text-transform: uppercase;
    opacity: 0.7;
  }

  .keys-grid {
    display: grid;
    grid-template-columns: repeat(3, 44px);
    grid-template-rows: repeat(2, 44px);
    gap: 6px;
  }

  .key {
    width: 44px;
    height: 44px;
    border: 1px solid rgba(74, 122, 255, 0.3);
    border-radius: 8px;
    background: rgba(10, 15, 40, 0.7);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: rgba(180, 200, 255, 0.5);
    transition: all 0.1s;
    pointer-events: none;
  }

  .key.active {
    border-color: #4a7aff;
    color: #fff;
    background: rgba(74, 122, 255, 0.2);
    box-shadow: 0 0 16px rgba(74,122,255,0.4);
  }

  .key-w { grid-column: 2; grid-row: 1; }
  .key-a { grid-column: 1; grid-row: 2; }
  .key-s { grid-column: 2; grid-row: 2; }
  .key-d { grid-column: 3; grid-row: 2; }

  #status {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(74,122,255,0.6);
    line-height: 2;
    pointer-events: none;
  }

  #status span { color: #8ab4ff; }

  #grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      linear-gradient(rgba(74,122,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,122,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 100%, black 30%, transparent 100%);
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #050810;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    transition: opacity 0.8s;
  }

  #loading.hidden { opacity: 0; pointer-events: none; }

  .loader-bar-wrap {
    width: 200px;
    height: 2px;
    background: rgba(74,122,255,0.15);
    border-radius: 2px;
    overflow: hidden;
  }

  .loader-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4a7aff, #a0c0ff);
    border-radius: 2px;
    transition: width 0.3s;
  }

  .loader-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: #4a7aff;
  }

  #vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(5,8,16,0.7) 100%);
  }

  #cam-tip {
    position: fixed;
    top: 24px;
    right: 24px;
    z-index: 10;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(74,122,255,0.4);
    text-align: right;
    line-height: 2;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-text">CARREGANDO...</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-text" id="loader-pct">0%</div>
</div>

<div id="canvas-container"></div>
<div id="grid-overlay"></div>
<div id="vignette"></div>

<div id="status">
  POS &nbsp;<span id="st-pos">0.0 / 0.0</span><br>
  DIR &nbsp;<span id="st-dir">NORTE</span><br>
  VEL &nbsp;<span id="st-vel">0.00</span>
</div>

<div id="cam-tip">
  ARRASTAR → ORBITAR<br>
  SCROLL &nbsp;→ ZOOM
</div>

<div id="hud">
  <div class="hud-label">movimento</div>
  <div class="keys-grid">
    <div class="key key-w" id="k-w">W</div>
    <div class="key key-a" id="k-a">A</div>
    <div class="key key-s" id="k-s">S</div>
    <div class="key key-d" id="k-d">D</div>
  </div>
  <div class="hud-label" style="margin-top:6px">ESPAÇO — ação</div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'https://unpkg.com/three@0.128.0/examples/jsm/loaders/GLTFLoader.js';

// ─── Configuração básica ───────────────────────────────────────────────────
const container = document.getElementById('canvas-container');
const W = () => window.innerWidth;
const H = () => window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W(), H());
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);

// ─── Câmera com zoom NORMAL ─────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.1, 1000);
camera.position.set(5, 3, 8); // Distância confortável
camera.lookAt(0, 1.5, 0);

// ─── Iluminação ─────────────────────────────────────────────────────────────
const ambLight = new THREE.AmbientLight(0x404060);
scene.add(ambLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 10, 7);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);

const backLight = new THREE.DirectionalLight(0x4a7aff, 0.5);
backLight.position.set(-5, 0, -5);
scene.add(backLight);

// ─── Chão com grade visível ─────────────────────────────────────────────────
const gridHelper = new THREE.GridHelper(30, 30, 0x4a7aff, 0x1a2a6a);
gridHelper.position.y = 0;
scene.add(gridHelper);

const groundMat = new THREE.MeshStandardMaterial({ color: 0x0a0f28, roughness: 0.8, metalness: 0.2 });
const ground = new THREE.Mesh(new THREE.PlaneGeometry(30, 30), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.01;
ground.receiveShadow = true;
scene.add(ground);

// ─── Esfera de referência para ver escala ─────────────────────────────────
const esferaRef = new THREE.Mesh(
  new THREE.SphereGeometry(0.2),
  new THREE.MeshStandardMaterial({ color: 0xffaa00 })
);
esferaRef.position.set(2, 0.2, 2);
scene.add(esferaRef);

// ─── Controles de órbita simples ──────────────────────────────────────────
let orbitState = { 
  active: false, 
  startX: 0, 
  startY: 0, 
  theta: 0.5, 
  phi: 0.4, 
  radius: 8, 
  targetTheta: 0.5, 
  targetPhi: 0.4, 
  targetRadius: 8 
};

renderer.domElement.addEventListener('mousedown', e => {
  orbitState.active = true;
  orbitState.startX = e.clientX;
  orbitState.startY = e.clientY;
});

window.addEventListener('mouseup', () => orbitState.active = false);

window.addEventListener('mousemove', e => {
  if (!orbitState.active) return;
  const dx = (e.clientX - orbitState.startX) * 0.005;
  const dy = (e.clientY - orbitState.startY) * 0.005;
  orbitState.targetTheta -= dx;
  orbitState.targetPhi = Math.max(0.2, Math.min(1.0, orbitState.targetPhi + dy));
  orbitState.startX = e.clientX;
  orbitState.startY = e.clientY;
});

renderer.domElement.addEventListener('wheel', e => {
  orbitState.targetRadius = Math.max(4, Math.min(15, orbitState.targetRadius + e.deltaY * 0.01));
  e.preventDefault();
}, { passive: false });

function updateCamera(targetPos) {
  orbitState.theta += (orbitState.targetTheta - orbitState.theta) * 0.1;
  orbitState.phi += (orbitState.targetPhi - orbitState.phi) * 0.1;
  orbitState.radius += (orbitState.targetRadius - orbitState.radius) * 0.1;

  const center = targetPos.clone().add(new THREE.Vector3(0, 1.2, 0));
  
  camera.position.x = center.x + orbitState.radius * Math.sin(orbitState.theta) * Math.cos(orbitState.phi);
  camera.position.y = center.y + orbitState.radius * Math.sin(orbitState.phi);
  camera.position.z = center.z + orbitState.radius * Math.cos(orbitState.theta) * Math.cos(orbitState.phi);
  camera.lookAt(center);
}

// ─── Teclado ────────────────────────────────────────────────────────────────
const teclas = {};
window.addEventListener('keydown', e => { 
  teclas[e.code] = true;  
  if (e.code === 'Space') e.preventDefault();
});
window.addEventListener('keyup', e => { teclas[e.code] = false; });

// ─── Status ─────────────────────────────────────────────────────────────
const stPos = document.getElementById('st-pos');
const stDir = document.getElementById('st-dir');
const stVel = document.getElementById('st-vel');
const DIRS = ['NORTE', 'NOROESTE', 'OESTE', 'SUDOESTE', 'SUL', 'SUDESTE', 'LESTE', 'NORDESTE'];

function updateStatus(model, vel) {
  stPos.textContent = `${model.position.x.toFixed(1)} / ${model.position.z.toFixed(1)}`;
  const angle = ((model.rotation.y % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  stDir.textContent = DIRS[Math.round(angle / (Math.PI/4)) % 8];
  stVel.textContent = vel.toFixed(2);
}

// ─── Cria um personagem em escala HUMANA ─────────────────────────────────
function criarPersonagem() {
  const grupo = new THREE.Group();

  // Corpo (altura ~1.8m em escala)
  const corpoGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.6);
  const corpoMat = new THREE.MeshStandardMaterial({ color: 0x4a7aff, emissive: 0x1a2a6a });
  const corpo = new THREE.Mesh(corpoGeo, corpoMat);
  corpo.castShadow = true;
  corpo.receiveShadow = true;
  corpo.position.y = 0.8;
  grupo.add(corpo);

  // Cabeça
  const cabecaGeo = new THREE.SphereGeometry(0.25);
  const cabecaMat = new THREE.MeshStandardMaterial({ color: 0xffaa88 });
  const cabeca = new THREE.Mesh(cabecaGeo, cabecaMat);
  cabeca.castShadow = true;
  cabeca.receiveShadow = true;
  cabeca.position.y = 1.7;
  grupo.add(cabeca);

  // Braços
  const bracoGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
  const bracoMat = new THREE.MeshStandardMaterial({ color: 0x3a5fcc });
  
  const bracoEsq = new THREE.Mesh(bracoGeo, bracoMat);
  bracoEsq.castShadow = true;
  bracoEsq.receiveShadow = true;
  bracoEsq.position.set(-0.4, 1.1, 0);
  grupo.add(bracoEsq);
  
  const bracoDir = new THREE.Mesh(bracoGeo, bracoMat);
  bracoDir.castShadow = true;
  bracoDir.receiveShadow = true;
  bracoDir.position.set(0.4, 1.1, 0);
  grupo.add(bracoDir);

  // Pernas
  const pernaGeo = new THREE.BoxGeometry(0.2, 0.8, 0.2);
  const pernaMat = new THREE.MeshStandardMaterial({ color: 0x2a4a9a });
  
  const pernaEsq = new THREE.Mesh(pernaGeo, pernaMat);
  pernaEsq.castShadow = true;
  pernaEsq.receiveShadow = true;
  pernaEsq.position.set(-0.15, 0.4, 0);
  grupo.add(pernaEsq);
  
  const pernaDir = new THREE.Mesh(pernaGeo, pernaMat);
  pernaDir.castShadow = true;
  pernaDir.receiveShadow = true;
  pernaDir.position.set(0.15, 0.4, 0);
  grupo.add(pernaDir);

  return grupo;
}

// ─── Variáveis principais ─────────────────────────────────────────────────
let personagem = null;
let mixer = null;
const loaderBar = document.getElementById('loader-bar');
const loaderPct = document.getElementById('loader-pct');
const loadingEl = document.getElementById('loading');

// Auto-foco
renderer.domElement.setAttribute('tabindex', '0');
renderer.domElement.style.outline = 'none';
renderer.domElement.focus();

// Tenta carregar o GLB, se falhar usa personagem simples
const loader = new GLTFLoader();

loader.load(
  'novo.glb',
  function(gltf) {
    console.log('GLB carregado!');
    personagem = gltf.scene;
    
    // Ajusta escala para tamanho HUMANO (1.8m de altura)
    const box = new THREE.Box3().setFromObject(personagem);
    const altura = box.max.y - box.min.y;
    const escalaDesejada = 1.8 / altura; // 1.8 metros de altura
    personagem.scale.setScalar(escalaDesejada);
    
    // Centraliza na base (pés no chão)
    box.setFromObject(personagem);
    const minY = box.min.y;
    personagem.position.y = -minY;
    
    scene.add(personagem);
    console.log('Escala aplicada:', escalaDesejada, 'Altura final:', box.max.y - box.min.y);

    // Animações
    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(personagem);
      mixer.clipAction(gltf.animations[0]).play();
    }

    loaderBar.style.width = '100%';
    loaderPct.textContent = '100%';
    setTimeout(() => loadingEl.classList.add('hidden'), 600);
    
    animate();
  },
  function(xhr) {
    if (xhr.lengthComputable) {
      const pct = Math.round(xhr.loaded / xhr.total * 100);
      loaderBar.style.width = pct + '%';
      loaderPct.textContent = pct + '%';
    }
  },
  function(error) {
    console.log('Usando personagem simples');
    personagem = criarPersonagem();
    personagem.position.y = 0; // Pés no chão
    scene.add(personagem);
    
    loaderBar.style.width = '100%';
    loaderPct.textContent = 'MODO SIMPLES';
    setTimeout(() => loadingEl.classList.add('hidden'), 600);
    
    animate();
  }
);

// ─── Animação de caminhada ────────────────────────────────────────────────
let tempoPasso = 0;
const VELOCIDADE = 2.5;
const ROTACAO = 1.8;

function animarCaminhada(delta, movendo) {
  if (!personagem || mixer) return; // Se tem mixer, deixa as animações do GLB
  
  if (movendo) {
    tempoPasso += delta * 6;
    // Balanço dos braços
    personagem.children.forEach(child => {
      if (child.position.x < -0.3) { // Braço esquerdo
        child.rotation.x = Math.sin(tempoPasso) * 0.6;
      }
      if (child.position.x > 0.3) { // Braço direito
        child.rotation.x = Math.sin(tempoPasso + Math.PI) * 0.6;
      }
      if (Math.abs(child.position.x) < 0.2 && child.position.y < 0.6) { // Pernas
        if (child.position.x < 0) { // Perna esquerda
          child.rotation.x = Math.sin(tempoPasso) * 0.5;
        } else { // Perna direita
          child.rotation.x = Math.sin(tempoPasso + Math.PI) * 0.5;
        }
      }
    });
  } else {
    // Volta ao neutro
    personagem.children.forEach(child => {
      child.rotation.x = 0;
    });
    tempoPasso = 0;
  }
}

// ─── Loop principal ───────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const delta = Math.min(clock.getDelta(), 0.05);

  if (mixer) mixer.update(delta);

  if (personagem) {
    let movendo = false;
    const posAnt = personagem.position.clone();

    // Movimento
    if (teclas['KeyW'] || teclas['ArrowUp']) {
      personagem.translateZ(-VELOCIDADE * delta);
      movendo = true;
    }
    if (teclas['KeyS'] || teclas['ArrowDown']) {
      personagem.translateZ(VELOCIDADE * delta * 0.6);
      movendo = true;
    }
    if (teclas['KeyA'] || teclas['ArrowLeft']) {
      personagem.rotation.y += ROTACAO * delta;
      movendo = true;
    }
    if (teclas['KeyD'] || teclas['ArrowRight']) {
      personagem.rotation.y -= ROTACAO * delta;
      movendo = true;
    }

    // Limites
    personagem.position.x = Math.max(-12, Math.min(12, personagem.position.x));
    personagem.position.z = Math.max(-12, Math.min(12, personagem.position.z));

    // Mantém Y no chão
    personagem.position.y = 0;

    // Animação de caminhada
    animarCaminhada(delta, movendo);

    // Atualiza câmera e HUD
    updateCamera(personagem.position);
    updateStatus(personagem, movendo ? VELOCIDADE : 0);
  }

  renderer.render(scene, camera);
}

// ─── Resize ───────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(), H());
});
</script>
</body>
</html>
