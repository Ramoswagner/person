<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ... (Configuração de Cena, Luz e Câmera igual ao anterior) ...

    let model, mixer;
    let acoes = {}; // Guardará as animações: flying, opening, jumping
    let acaoAtual;
    const teclas = {};

    const loader = new GLTFLoader();
    loader.load('IronMan.glb', (gltf) => {
        model = gltf.scene;
        scene.add(model);

        mixer = new THREE.AnimationMixer(model);

        // Mapeia as animações pelo nome exato que você definiu
        gltf.animations.forEach((clip) => {
            const nome = clip.name.toLowerCase();
            acoes[nome] = mixer.clipAction(clip);
            console.log("Animação carregada:", nome);
        });

        // Define 'flying' como animação padrão (Idle/Andar)
        if (acoes['flying']) {
            acaoAtual = acoes['flying'];
            acaoAtual.play();
        }

        animate();
    });

    // Detectar Teclas
    window.addEventListener('keydown', (e) => teclas[e.code] = true);
    window.addEventListener('keyup', (e) => teclas[e.code] = false);

    // Função para trocar de animação suavemente (Crossfade)
    function transicaoPara(novaAnimacao, loop = true) {
        const proxima = acoes[novaAnimacao];
        if (!proxima || proxima === acaoAtual) return;

        proxima.reset();
        proxima.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce);
        proxima.clampWhenFinished = true; // Para no último frame se não for loop
        
        proxima.play();
        acaoAtual.crossFadeTo(proxima, 0.2, true);
        acaoAtual = proxima;
    }

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const delta = clock.getDelta();
        if (mixer) mixer.update(delta);

        if (model) {
            // MOVIMENTAÇÃO (W, A, S, D)
            let movendo = false;

            if (teclas['KeyW']) { model.translateZ(0.1); movendo = true; }
            if (teclas['KeyS']) { model.translateZ(-0.1); movendo = true; }
            if (teclas['KeyA']) { model.rotation.y += 0.05; movendo = true; }
            if (teclas['KeyD']) { model.rotation.y -= 0.05; movendo = true; }

            // LÓGICA DE TROCA DE ANIMAÇÃO
            if (teclas['Space']) {
                transicaoPara('jumping', false); // Pular (uma vez)
            } else if (teclas['KeyE']) { // E para abrir porta
                transicaoPara('opening', false);
            } else if (movendo) {
                transicaoPara('flying'); // Voar/Andar enquanto move
            } else {
                // Se quiser uma animação de parado (Idle), coloque aqui. 
                // Se não, ele continuará em 'flying' (flutuando parado).
            }
        }

        renderer.render(scene, camera);
    }
</script>
