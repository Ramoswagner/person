<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Personagem 3D</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; }
        /* Estilizando o container do modelo com CSS */
        model-viewer {
            width: 100%;
            height: 100vh;
            --poster-color: transparent;
        }
    </style>
</head>
<body>

    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

    <model-viewer 
        src="IronMan.glb" 
        alt="Modelo 3D do Iron Man" 
        auto-rotate 
        camera-controls 
        shadow-intensity="1"
        exposure="1">
    </model-viewer>

</body>
</html>
