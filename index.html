<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador LEGO 3D</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd966;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 2px solid #ffd966;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #4caf50;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid #4caf50;
            z-index: 100;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            display: flex;
            gap: 20px;
        }
        
        .key {
            background: #ffd966;
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            margin: 0 5px;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 1000;
            display: none;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffd966;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.9);
            color: white;
            padding: 20px;
            border-radius: 10px;
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div id="info">🧱 LEGO® Gerente - Terno Azul Marinho</div>
    <div id="status">✅ Modelo: avatar.glb</div>
    
    <div id="controls">
        <span><span class="key">🖱️</span> Arrastar para rotacionar</span>
        <span><span class="key">⏫⏬</span> Scroll para zoom</span>
        <span><span class="key">⏺️</span> Auto-rotação</span>
    </div>
    
    <div id="loading">
        <div class="spinner"></div>
        <div>Carregando modelo 3D...</div>
    </div>
    
    <div id="error"></div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // Configuração da Cena
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Azul escuro
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        renderer.toneMappingExposure = 1.2;
        document.body.appendChild(renderer.domElement);

        // ============================================================
        // Controles
        // ============================================================
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.enableZoom = true;
        controls.enablePan = true;
        controls.maxPolarAngle = Math.PI / 2; // Não ir abaixo do chão
        controls.target.set(0, 1, 0);

        // ============================================================
        // Iluminação
        // ============================================================
        
        // Luz ambiente
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        // Luz principal (direcional)
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
        mainLight.position.set(5, 8, 7);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 20;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        // Luz de preenchimento
        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        fillLight.position.set(-5, 3, 5);
        scene.add(fillLight);
        
        // Luz de fundo
        const backLight = new THREE.DirectionalLight(0xffeedd, 0.5);
        backLight.position.set(-2, 1, -8);
        scene.add(backLight);

        // ============================================================
        // Ambiente (chão, grade, etc)
        // ============================================================
        
        // Grade
        const gridHelper = new THREE.GridHelper(10, 20, 0x4a9eff, 0x333344);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);
        
        // Chão circular
        const groundGeometry = new THREE.CircleGeometry(5, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.8, metalness: 0.1, emissive: 0x050510 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);
        
        // Luzes pontuais decorativas
        const pointLight1 = new THREE.PointLight(0x4466aa, 0.5);
        pointLight1.position.set(2, 2, 2);
        scene.add(pointLight1);
        
        const pointLight2 = new THREE.PointLight(0xaa4466, 0.3);
        pointLight2.position.set(-2, 1, -2);
        scene.add(pointLight2);

        // ============================================================
        // Carregar modelo GLB (avatar.glb)
        // ============================================================
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const statusDiv = document.getElementById('status');
        
        // Mostrar loading
        loadingDiv.style.display = 'block';
        
        // Tentar carregar o arquivo
        loader.load(
            'avatar.glb', // Nome do arquivo (deve estar na mesma pasta)
            
            // Sucesso
            (gltf) => {
                const model = gltf.scene;
                
                // Escala automática
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim > 2.5) {
                    model.scale.setScalar(2.5 / maxDim);
                }
                
                // Centralizar
                const center = box.getCenter(new THREE.Vector3());
                model.position.sub(center);
                model.position.y += 0.5; // Ajuste fino
                
                // Ativar sombras
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                    }
                });
                
                scene.add(model);
                
                // Atualizar status
                loadingDiv.style.display = 'none';
                statusDiv.innerHTML = '✅ Modelo: avatar.glb carregado!';
                statusDiv.style.color = '#4caf50';
                
                console.log('✅ Modelo carregado com sucesso!');
            },
            
            // Progresso
            (xhr) => {
                const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                loadingDiv.innerHTML = `<div class="spinner"></div><div>Carregando... ${percent}%</div>`;
            },
            
            // Erro
            (error) => {
                loadingDiv.style.display = 'none';
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ Erro: ${error.message}<br><br>👉 Coloque o arquivo <strong>avatar.glb</strong> na mesma pasta do HTML`;
                console.error('Erro:', error);
            }
        );

        // ============================================================
        // Animação
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            
            controls.update(); // Atualiza auto-rotação
            
            renderer.render(scene, camera);
        }
        
        animate();

        // ============================================================
        // Redimensionamento
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // Teclas de atalho
        // ============================================================
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                controls.autoRotate = !controls.autoRotate;
            }
        });
    </script>
</body>
</html>
