<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO® Executive Suite - Kanban & Charts</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            z-index: 100;
            display: flex;
            gap: 20px;
        }
        .key {
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        <strong>LEGO® Executive Suite</strong> | Gerente de Terno Azul | Quadro Kanban | Gráficos de Gestão
    </div>
    <div id="controls">
        <span><span class="key">WASD</span> mover câmera</span>
        <span><span class="key">Clique + Arraste</span> rotacionar</span>
        <span><span class="key">Scroll</span> zoom</span>
    </div>

    <!-- Importação do Three.js via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

        // ============================================================
        // MÓDULO: Personagem Gerente LEGO (careca, terno azul, barba)
        // ============================================================
        function createLegoManager() {
            const g = new THREE.Group();

            const skin = new THREE.MeshStandardMaterial({ color: 0x8d5524 }); // pele morena
            const suit = new THREE.MeshStandardMaterial({ color: 0x0a1f44 }); // azul marinho
            const shirt = new THREE.MeshStandardMaterial({ color: 0xffffff }); // camisa branca
            const black = new THREE.MeshStandardMaterial({ color: 0x111111 }); // barba

            // Cabeça (cilindro LEGO)
            const head = new THREE.Mesh(
                new THREE.CylinderGeometry(0.28, 0.28, 0.35, 32),
                skin
            );
            head.position.y = 2.3;
            g.add(head);

            // Stud do cabelo (careca, então só um pequeno topo)
            const stud = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.12, 0.08, 32),
                skin
            );
            stud.position.y = 2.52;
            g.add(stud);

            // Barba (caixa preta)
            const beard = new THREE.Mesh(
                new THREE.BoxGeometry(0.36, 0.18, 0.15),
                black
            );
            beard.position.set(0, 2.15, 0.28);
            g.add(beard);

            // Corpo (paletó)
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 1, 0.4),
                suit
            );
            body.position.y = 1.6;
            g.add(body);

            // Frente da camisa
            const shirtFront = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.7, 0.02),
                shirt
            );
            shirtFront.position.set(0, 1.6, 0.21);
            g.add(shirtFront);

            // Pernas
            const leg1 = new THREE.Mesh(
                new THREE.BoxGeometry(0.35, 0.9, 0.35),
                suit
            );
            leg1.position.set(-0.2, 0.7, 0);
            g.add(leg1);

            const leg2 = leg1.clone();
            leg2.position.x = 0.2;
            g.add(leg2);

            // Olhos simples (botões LEGO)
            const eyeWhite = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const eyePupil = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            [-1, 1].forEach(side => {
                const eyeBase = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.05, 0.05, 0.02, 8),
                    eyeWhite
                );
                eyeBase.rotation.x = Math.PI / 2;
                eyeBase.position.set(side * 0.12, 2.4, 0.32);
                g.add(eyeBase);
                
                const pupil = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.025, 0.025, 0.03, 6),
                    eyePupil
                );
                pupil.rotation.x = Math.PI / 2;
                pupil.position.set(side * 0.12, 2.4, 0.34);
                g.add(pupil);
            });

            return g;
        }

        // ============================================================
        // MÓDULO: Escritório LEGO
        // ============================================================
        function createLegoOffice() {
            const office = new THREE.Group();

            // Piso
            const floor = new THREE.Mesh(
                new THREE.BoxGeometry(10, 0.3, 10),
                new THREE.MeshStandardMaterial({ color: 0xd9d9d9 })
            );
            floor.position.y = -0.15;
            office.add(floor);

            // Mesa principal
            const deskTop = new THREE.Mesh(
                new THREE.BoxGeometry(2, 0.2, 1),
                new THREE.MeshStandardMaterial({ color: 0x8b4513 })
            );
            deskTop.position.set(0, 1, 1);
            office.add(deskTop);

            // Pernas da mesa
            for (let x of [-0.9, 0.9]) {
                for (let z of [-0.4, 0.4]) {
                    const leg = new THREE.Mesh(
                        new THREE.BoxGeometry(0.1, 1, 0.1),
                        new THREE.MeshStandardMaterial({ color: 0x333333 })
                    );
                    leg.position.set(x, 0.5, z + 1);
                    office.add(leg);
                }
            }

            // Cadeira simples
            const chairSeat = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.1, 0.6),
                new THREE.MeshStandardMaterial({ color: 0x4a4a4a })
            );
            chairSeat.position.set(0, 0.55, 2);
            office.add(chairSeat);

            const chairBack = new THREE.Mesh(
                new THREE.BoxGeometry(0.6, 0.6, 0.1),
                new THREE.MeshStandardMaterial({ color: 0x4a4a4a })
            );
            chairBack.position.set(0, 0.9, 2.3);
            office.add(chairBack);

            // Parede decorativa (opcional)
            const wall = new THREE.Mesh(
                new THREE.BoxGeometry(10, 3, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xcccccc })
            );
            wall.position.set(0, 1.5, -5);
            office.add(wall);

            return office;
        }

        // ============================================================
        // MÓDULO: Quadro Kanban LEGO
        // ============================================================
        function createKanbanBoard() {
            const board = new THREE.Group();

            // Base do quadro
            const base = new THREE.Mesh(
                new THREE.BoxGeometry(3, 2, 0.1),
                new THREE.MeshStandardMaterial({ color: 0xffffff })
            );
            base.position.y = 1;
            board.add(base);

            // Função para criar colunas
            function column(x, color) {
                const col = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 1.5, 0.05),
                    new THREE.MeshStandardMaterial({ color })
                );
                col.position.set(x, 1, 0.06);
                return col;
            }

            // Colunas: Backlog, Doing, Done
            board.add(column(-1, 0xffcc00)); // amarelo
            board.add(column(0, 0x00ccff));  // azul
            board.add(column(1, 0x00cc66));  // verde

            // Títulos das colunas (pequenos blocos)
            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
            const blackMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const titles = ['BACKLOG', 'DOING', 'DONE'];
            [-1, 0, 1].forEach((x, i) => {
                const titleBg = new THREE.Mesh(
                    new THREE.BoxGeometry(0.7, 0.2, 0.02),
                    whiteMat
                );
                titleBg.position.set(x, 1.8, 0.07);
                board.add(titleBg);
            });

            return board;
        }

        // ============================================================
        // MÓDULO: Gráficos LEGO (Barras e Pizza)
        // ============================================================
        function createLegoCharts() {
            const charts = new THREE.Group();

            // Base dos gráficos
            const basePlate = new THREE.Mesh(
                new THREE.BoxGeometry(3, 0.1, 1.5),
                new THREE.MeshStandardMaterial({ color: 0xcccccc })
            );
            basePlate.position.set(0, 0.05, 0);
            charts.add(basePlate);

            // GRÁFICO DE BARRAS (lado esquerdo)
            const barGroup = new THREE.Group();
            barGroup.position.set(-0.8, 0.15, 0);
            
            const barColors = [0xff6b6b, 0x4ecdc4, 0x45b7d1, 0x96ceb4];
            const barHeights = [0.8, 1.2, 0.6, 1.0];
            
            barHeights.forEach((height, i) => {
                const bar = new THREE.Mesh(
                    new THREE.BoxGeometry(0.25, height, 0.25),
                    new THREE.MeshStandardMaterial({ color: barColors[i % barColors.length] })
                );
                bar.position.set(i * 0.35 - 0.5, height/2, 0);
                barGroup.add(bar);
                
                // Topo arredondado (stud)
                const stud = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.1, 0.1, 0.05, 8),
                    new THREE.MeshStandardMaterial({ color: barColors[i % barColors.length] })
                );
                stud.position.set(i * 0.35 - 0.5, height, 0);
                barGroup.add(stud);
            });
            
            charts.add(barGroup);

            // GRÁFICO DE PIZZA (lado direito)
            const pieGroup = new THREE.Group();
            pieGroup.position.set(0.8, 0.15, 0);
            
            const pieColors = [0xff6b6b, 0x4ecdc4, 0x45b7d1];
            const segments = [0.5, 0.3, 0.2]; // proporções
            
            let angleStart = 0;
            segments.forEach((seg, i) => {
                const angleEnd = angleStart + seg * Math.PI * 2;
                
                // Criar fatia usando um cilindro com geometria de segmento (simplificado com caixas)
                // Para simplicidade, usaremos pequenos blocos formando um círculo
                const slice = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.4, 0.1, 32, 1),
                    new THREE.MeshStandardMaterial({ color: pieColors[i] })
                );
                slice.position.set(0, 0.05, 0);
                pieGroup.add(slice);
                
                // Adicionar studs decorativos nas fatias (simulação)
                for (let j = 0; j < 3; j++) {
                    const stud = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.05, 0.05, 0.05, 6),
                        new THREE.MeshStandardMaterial({ color: 0xffdd44 })
                    );
                    stud.position.set(
                        Math.cos(angleStart + seg * Math.PI) * 0.2,
                        0.1,
                        Math.sin(angleStart + seg * Math.PI) * 0.2
                    );
                    pieGroup.add(stud);
                }
                
                angleStart = angleEnd;
            });
            
            charts.add(pieGroup);

            return charts;
        }

        // ============================================================
        // CENA PRINCIPAL (main.js)
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf0f0f0);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(6, 5, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2;
        controls.target.set(0, 2, 0);

        // Iluminação
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(5, 10, 5);
        light.castShadow = true;
        light.shadow.mapSize.width = 1024;
        light.shadow.mapSize.height = 1024;
        const d = 10;
        light.shadow.camera.left = -d;
        light.shadow.camera.right = d;
        light.shadow.camera.top = d;
        light.shadow.camera.bottom = -d;
        light.shadow.camera.near = 1;
        light.shadow.camera.far = 15;
        scene.add(light);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        // Luz de preenchimento
        const fillLight = new THREE.DirectionalLight(0xccddff, 0.5);
        fillLight.position.set(-5, 5, 5);
        scene.add(fillLight);

        // Adicionar uma grade no chão para referência
        const gridHelper = new THREE.GridHelper(10, 20, 0x888888, 0x444444);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // ============================================================
        // MONTAGEM DA CENA
        // ============================================================
        
        // Escritório
        const office = createLegoOffice();
        office.position.set(0, 0, 0);
        scene.add(office);

        // Gerente
        const manager = createLegoManager();
        manager.position.set(0, 0.15, 0.5); // ajuste para ficar atrás da mesa
        manager.rotation.y = Math.PI / 4; // olhando para o quadro
        scene.add(manager);

        // Quadro Kanban (posicionado na parede)
        const kanban = createKanbanBoard();
        kanban.position.set(0, 1.5, -3.5);
        scene.add(kanban);

        // Gráficos LEGO (sobre a mesa)
        const charts = createLegoCharts();
        charts.position.set(0, 1.2, 1.2); // em cima da mesa
        charts.rotation.y = 0.2;
        scene.add(charts);

        // Adicionar alguns elementos decorativos: bloquinhos extras no chão
        const blockMat = new THREE.MeshStandardMaterial({ color: 0xffaa00 });
        for (let i = 0; i < 5; i++) {
            const block = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.3, 0.3),
                blockMat
            );
            block.position.set(2 + i * 0.4, 0.15, 2);
            scene.add(block);
        }

        // ============================================================
        // ANIMAÇÃO
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            // Pequena animação no gerente (respiração)
            const time = Date.now() * 0.002;
            manager.position.y = 0.15 + Math.sin(time) * 0.01;
            
            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // Ajuste de resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
