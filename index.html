<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Open3D — IA Generativa Gratuita</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
        "@gradio/client": "https://cdn.jsdelivr.net/npm/@gradio/client@0.1.4/dist/index.min.js"
      }
    }
  </script>
  <style>
    :root {
      --bg: #05070a;
      --surface: #0f1117;
      --surface2: #161922;
      --border: rgba(255,255,255,0.08);
      --accent: #00f2ff;
      --accent2: #7000ff;
      --text: #e8eaf0;
      --muted: #8b949e;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Space Grotesk', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: grid;
      grid-template-columns: 360px 1fr;
    }

    /* --- SIDEBAR --- */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 10;
      overflow-y: auto;
    }
    .logo { font-weight: 700; font-size: 20px; letter-spacing: -1px; display: flex; align-items: center; gap: 10px; }
    .logo span { color: var(--accent); }

    .upload-box {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 40px 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.3s;
      background: var(--surface2);
    }
    .upload-box:hover { border-color: var(--accent); background: rgba(0, 242, 255, 0.05); }
    
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      border: none;
      padding: 16px;
      border-radius: var(--radius);
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn-primary:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(112, 0, 255, 0.3); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

    /* --- VIEWPORT --- */
    .viewport-container { position: relative; background: #000; }
    #canvas-3d { width: 100%; height: 100%; outline: none; }

    .loader-overlay {
      position: absolute; inset: 0;
      background: rgba(5, 7, 10, 0.8);
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 5;
    }
    .loader-overlay.active { display: flex; }

    .status-badge {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      background: rgba(0, 242, 255, 0.1);
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--accent);
    }

    .preview-img {
      width: 100%; border-radius: 8px; margin-top: 10px; display: none;
      border: 1px solid var(--border);
    }
  </style>
</head>
<body>

  <aside class="sidebar">
    <div class="logo"><span>⬢</span> OPEN 3D </div>
    
    <div>
      <p style="font-size: 12px; color: var(--muted); margin-bottom: 8px;">ENTRADA</p>
      <div class="upload-box" id="drop-area">
        <input type="file" id="file-input" hidden accept="image/*">
        <div style="font-size: 24px;">☁️</div>
        <p style="font-size: 14px; margin-top: 10px;">Arraste uma imagem</p>
      </div>
      <img id="img-preview" class="preview-img">
    </div>

    <div>
      <p style="font-size: 12px; color: var(--muted); margin-bottom: 8px;">CONFIGURAÇÕES</p>
      <select id="model-quality" style="width:100%; background: var(--surface2); color:white; border: 1px solid var(--border); padding: 10px; border-radius: 8px;">
        <option value="sf3d">Stable Fast 3D (Mais Rápido)</option>
        <option value="instantmesh">InstantMesh (Alta Qualidade)</option>
      </select>
    </div>

    <button class="btn-primary" id="gen-button" disabled>GERAR MODELO GRATUITO</button>

    <div id="info-panel" style="display:none; font-size: 13px; border-top: 1px solid var(--border); pt-20">
        <p style="color: var(--muted)">Status: <span id="status-text" style="color: var(--accent)">Pronto</span></p>
        <button id="download-glb" class="btn-primary" style="margin-top: 10px; width: 100%; background: var(--surface2); border: 1px solid var(--border);">Baixar GLB</button>
    </div>
  </aside>

  <main class="viewport-container">
    <div class="loader-overlay" id="loader">
        <div style="width: 40px; height: 40px; border: 3px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p style="margin-top: 20px; font-weight: 500;" id="loader-text">Processando Geometria...</p>
        <p style="font-size: 12px; color: var(--muted); margin-top: 8px;">Isso pode levar até 60s em servidores gratuitos</p>
    </div>
    <canvas id="canvas-3d"></canvas>
  </main>

  <style> @keyframes spin { to { transform: rotate(360deg); } } </style>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
import { client } from "@gradio/client";

// --- STATE ---
let selectedFile = null;
let currentGLBUrl = null;

// --- THREE.JS ENGINE ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-3d'), antialias: true });
renderer.setSize(window.innerWidth - 360, window.innerHeight);
renderer.toneMapping = THREE.ReinhardToneMapping;

// Post Processing (O toque "avançado")
const composer = new EffectComposer(renderer);
composer.addPass(new RenderPass(scene, camera));
const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 0.4, 0.4, 0.85);
composer.addPass(bloomPass);

// Lights
const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
scene.add(ambientLight);
const spotLight = new THREE.SpotLight(0xffffff, 50);
spotLight.position.set(5, 5, 5);
scene.add(spotLight);

camera.position.set(2, 2, 2);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    composer.render();
}
animate();

// --- LOGICA DE UI ---
const fileInput = document.getElementById('file-input');
const dropArea = document.getElementById('drop-area');
const genButton = document.getElementById('gen-button');
const imgPreview = document.getElementById('img-preview');
const loader = document.getElementById('loader');

dropArea.onclick = () => fileInput.click();
fileInput.onchange = (e) => handleFile(e.target.files[0]);

function handleFile(file) {
    if (!file) return;
    selectedFile = file;
    const reader = new FileReader();
    reader.onload = (e) => {
        imgPreview.src = e.target.result;
        imgPreview.style.display = 'block';
        genButton.disabled = false;
    };
    reader.readAsDataURL(file);
}

// --- INTEGRAÇÃO COM MODELO OPEN SOURCE (SF3D) ---
genButton.onclick = async () => {
    loader.classList.add('active');
    genButton.disabled = true;
    document.getElementById('loader-text').innerText = "Conectando ao Hugging Face...";

    try {
        // Conecta ao espaço Stable Fast 3D oficial do Hugging Face (Gratuito)
        const app = await client("https://zyclv-stable-fast-3d.hf.space/");
        
        // Converte o arquivo para Blob
        const blob = new Blob([selectedFile], { type: selectedFile.type });
        
        document.getElementById('loader-text').innerText = "Gerando Malha 3D...";
        
        // Chama a predição (SF3D processa em ~1 segundo após subir)
        const result = await app.predict("/process", [
            blob,   // input_image
            true,   // rembg (remover fundo automaticamente)
            0.85    // threshold
        ]);

        // O resultado do SF3D é um vídeo e um arquivo GLB
        const glbFile = result.data[1]; // O índice do GLB no output do SF3D
        currentGLBUrl = glbFile.url;

        loadModel(currentGLBUrl);
        
        document.getElementById('info-panel').style.display = 'block';
        document.getElementById('status-text').innerText = "Sucesso!";
    } catch (error) {
        console.error(error);
        alert("Erro na fila do servidor. Tente novamente em alguns segundos.");
    } finally {
        loader.classList.remove('active');
        genButton.disabled = false;
    }
};

function loadModel(url) {
    // Limpar modelos antigos
    scene.children.filter(c => c.isGroup).forEach(c => scene.remove(c));

    const loader = new GLTFLoader();
    loader.load(url, (gltf) => {
        const model = gltf.scene;
        
        // Centralização Automática
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.sub(center);
        
        scene.add(model);
        
        // Zoom automático
        const size = box.getSize(new THREE.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);
        camera.position.set(maxDim * 1.5, maxDim * 1.5, maxDim * 1.5);
        controls.target.set(0, 0, 0);
    });
}

document.getElementById('download-glb').onclick = () => {
    if(currentGLBUrl) {
        const a = document.createElement('a');
        a.href = currentGLBUrl;
        a.download = "modelo_3d_gratuito.glb";
        a.click();
    }
};

window.onresize = () => {
    camera.aspect = (window.innerWidth - 360) / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth - 360, window.innerHeight);
    composer.setSize(window.innerWidth - 360, window.innerHeight);
};
</script>
</body>
</html>
