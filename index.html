<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DICE Model · Analisador BCG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    /* ── Wagner Ramos — Navy × Gold ── */
    --deep:#0B1E33;--deep-soft:#0F2A40;--medium:#153450;
    --gold:#C4A35A;--gold-lt:#D8B87A;--gold-dim:rgba(196,163,90,0.12);
    --bright:#03A63C;--lime:#04D939;
    --success:#4CAF7D;--warning:#F2B705;--danger:#F25C5C;
    --success-lt:rgba(76,175,125,0.15);--warning-lt:rgba(242,183,5,0.15);--danger-lt:rgba(242,92,92,0.15);
    --success-md:#4CAF7D;--warning-md:#F2B705;--danger-md:#F25C5C;
    --ink:#F0F4FA;--muted:#A0B3CC;
    --border:rgba(255,255,255,0.06);--border-md:rgba(196,163,90,0.2);
    --surface:rgba(255,255,255,0.02);--surface-md:rgba(255,255,255,0.04);
    --radius:20px;--radius-sm:12px;
    --shadow:0 20px 40px -12px rgba(0,0,0,0.6);
    --bg-deep:var(--deep);
    --serif:'Cormorant Garamond',Georgia,serif;
    --sans:'Inter',system-ui,sans-serif;
    --ease:cubic-bezier(0.16,1,0.3,1);
  }

  /* Acessibilidade: foco visível */
  :focus-visible {
    outline: 2px solid var(--gold-lt);
    outline-offset: 2px;
  }

  /* Tooltips acessíveis via hover e focus */
  .opt-btn {
    position: relative;
  }
  .tip {
    display: none;
    position: absolute;
    bottom: calc(100% + 8px);
    left: 50%;
    transform: translateX(-50%);
    background: rgba(11,30,51,0.97);
    border: 1px solid rgba(196,163,90,0.3);
    color: var(--ink);
    font-size: 11px;
    line-height: 1.5;
    padding: 8px 12px;
    border-radius: 10px;
    width: 220px;
    white-space: normal;
    text-align: left;
    z-index: 200;
    pointer-events: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .tip::after {
    content: '';
    position: absolute;
    top: 100%;
    left: 50%;
    transform: translateX(-50%);
    border: 5px solid transparent;
    border-top-color: rgba(196,163,90,0.3);
  }
  .opt-btn:hover .tip,
  .opt-btn:focus .tip,
  .opt-btn:focus-within .tip {
    display: block;
  }

  /* ... (demais estilos mantidos, com pequenos ajustes de contraste) ... */
  /* Apenas para brevidade, manteremos o CSS original com as modificações de contraste e foco */
  /* Contraste melhorado para .muted */
  .muted {
    color: #B0C4DE; /* tom mais claro que o anterior */
  }

  /* Cursor personalizado opcional (podemos desabilitar em telas touch) */
  @media (pointer: fine) {
    .co, .ci, .cdot { display: block; }
  }
  /* ... resto do CSS permanece igual, apenas adicionamos as regras acima */
</style>
</head>
<body>
<!-- (estrutura HTML igual, apenas removemos os onclicks e adicionamos IDs para controle via JS) -->
<div class="co" id="co"></div>
<div class="ci" id="ci"></div>
<div class="cdot" id="cdot"></div>

<header class="header">
  <div class="header-brand">
    <div class="header-logo"><span class="header-logo-fallback">WR</span></div>
    <div>
      <span class="header-title">DICE Model</span>
      <span class="header-sub">Wagner Ramos · PMO &amp; BI</span>
    </div>
  </div>
  <nav class="header-nav">
    <button class="tab-btn active" data-tab="analyzer">Analisador</button>
    <button class="tab-btn" data-tab="guide">Guia de Uso</button>
  </nav>
</header>

<div class="app">
  <!-- ANALISADOR -->
  <div class="view active" id="view-analyzer">
    <div class="analyzer-grid">
      <!-- Card de Inputs (com IDs e classes para JS, sem onclicks) -->
      <div class="card">
        <div class="card-header">
          <div class="card-title">Fatores de Avaliação</div>
          <div class="card-heading">Preencha o DICE</div>
        </div>
        <div class="card-body">
          <div class="project-name-row">
            <label class="project-name-label" for="projectName">Nome do Projeto</label>
            <input class="project-name-input" id="projectName" type="text" placeholder="Ex: Implantação ERP — Módulo Financeiro" maxlength="80">
          </div>
          <div class="factor-list">
            <!-- D -->
            <div class="factor-row">
              <div class="factor-label"><span class="factor-tag">D</span>Duração entre marcos<span class="factor-desc">intervalo / prazo</span></div>
              <div class="factor-options" data-factor="D">
                <button class="opt-btn selected" data-val="1"><span class="opt-num">1</span><span class="opt-label">&lt; 2 meses</span><div class="tip"><strong>Ótimo (1pt)</strong> — Revisões em menos de 2 meses...</div></button>
                <button class="opt-btn" data-val="2"><span class="opt-num">2</span><span class="opt-label">2–4 meses</span><div class="tip"><strong>Razoável (2pts)</strong> — ...</div></button>
                <button class="opt-btn" data-val="3"><span class="opt-num">3</span><span class="opt-label">4–8 meses</span><div class="tip"><strong>Risco elevado (3pts)</strong> — ...</div></button>
                <button class="opt-btn" data-val="4"><span class="opt-num">4</span><span class="opt-label">&gt; 8 meses</span><div class="tip"><strong>Crítico (4pts)</strong> — ...</div></button>
              </div>
              <div class="factor-justification" id="just-D"><textarea class="factor-just-input" id="justD" placeholder="Justificativa..."></textarea></div>
            </div>
            <!-- I, C1, C2, E (idem, omitido por brevidade) -->
          </div>
          <div class="result-block win" id="resultBlock">
            <div class="result-label">Pontuação DICE</div>
            <div style="display:flex; align-items:center; gap:16px;">
              <div class="result-score" id="scoreNum">7</div>
              <div class="result-zone-pill" id="zonePill">● WIN</div>
            </div>
            <div class="result-msg" id="resultMsg">Alta probabilidade de sucesso...</div>
            <div class="formula-row" id="formulaRow">...</div>
          </div>
          <div class="action-row">
            <button class="btn-main btn-report" id="btnReport">Relatório</button>
            <button class="btn-main" id="btnPNG">PNG</button>
            <button class="btn-ghost" id="btnReset">Reset</button>
          </div>
        </div>
      </div>
      <!-- Chart Panel (idem) -->
    </div>
  </div>
  <!-- GUIA DE USO (mantido) -->
</div>

<!-- MODAL RELATÓRIO -->
<div class="modal-overlay" id="reportModal">
  <div class="modal" id="reportModalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
  (function() {
    // ==================== CONSTANTES E CONFIGURAÇÕES ====================
    const FACTORS = ['D', 'I', 'C1', 'C2', 'E'];
    const WEIGHTS = { D: 1, I: 2, C1: 2, C2: 1, E: 1 };
    const MAX_VAL = 4; // cada fator varia de 1 a 4

    // Rótulos e comentários (unificados)
    const LABELS = {
      D: ['< 2 meses', '2–4 meses', '4–8 meses', '> 8 meses'],
      I: ['Muito boa', 'Boa', 'Média', 'Fraca'],
      C1: ['Muito forte', 'Favorável', 'Neutro', 'Relutante'],
      C2: ['Ansiosos', 'Dispostos', 'Relutantes', 'Fort. relutantes'],
      E: ['< 10%', '10–20%', '20–40%', '> 40%']
    };
    const COMMENTS = {
      D: ['Revisões frequentes garantem detecção precoce.', 'Intervalo razoável. Considere aumentar frequência.', 'Intervalo elevado. Problemas podem acumular.', 'Crítico. Risco exponencial.'],
      I: ['Equipe altamente capaz.', 'Equipe competente. Verifique dedicação.', 'Equipe com lacunas. Reforce.', 'Equipe insuficiente. Reconfiguração urgente.'],
      C1: ['Liderança plenamente comprometida.', 'Suporte presente, mas pode ser fortalecido.', 'Postura neutra envia sinal ambíguo.', 'Resistência da alta gestão é fatal.'],
      C2: ['Equipe motivada e engajada.', 'Disposição adequada. Mantenha comunicação.', 'Resistência presente. Intervenções necessárias.', 'Alta resistência. Plano de engajamento urgente.'],
      E: ['Carga extra mínima. Baixo risco.', 'Esforço gerenciável. Monitore sinais.', 'Sobrecarga significativa. Remova tarefas.', 'Nível insustentável. Alto risco de burnout.']
    };

    // Descrições detalhadas para o PDF (versão longa)
    const DETAIL = {
      D: ['Menos de 2 meses entre revisões formais de marco — intervalo ideal segundo o BCG. Permite detecção precoce de riscos.',
          'Entre 2 e 4 meses entre revisões — adequado para projetos de complexidade moderada.',
          'Entre 4 e 8 meses — intervalo elevado. Problemas podem acumular sem percepção da liderança.',
          'Mais de 8 meses sem revisão formal — risco exponencial. O BCG recomenda subdividir marcos imediatamente.'],
      I: ['Equipe excelente: líder altamente capaz e respeitado, membros com habilidades adequadas e dedicação ≥ 50% ao projeto.',
          'Equipe boa: competente, mas com algumas lacunas de habilidade ou disponibilidade que merecem atenção.',
          'Equipe regular: lacunas relevantes de competência ou dedicação. Reforce a composição antes do lançamento.',
          'Equipe fraca: inadequada em múltiplas dimensões críticas. Reconfiguração urgente é necessária.'],
      C1: ['Comprometimento muito forte: liderança comunica ativamente, com alta frequência e de forma consistente.',
           'Comprometimento favorável: suporte presente e visível, mas poderia ser mais frequente ou enfático.',
           'Postura neutra: sinal ambíguo para a organização. Funcionários tendem a interpretar como falta de prioridade.',
           'Relutância ou ausência visível da alta gestão — fator mais determinante de fracasso identificado pelo BCG.'],
      C2: ['Colaboradores entusiasmados e engajados — apoiam ativamente a iniciativa de mudança.',
           'Colaboradores dispostos — aceitam a mudança, embora sem entusiasmo marcado.',
           'Resistência presente — intervenção de engajamento necessária; mapeie e neutralize preocupações específicas.',
           'Alta resistência ativa — requer plano estruturado de gestão da mudança antes de prosseguir.'],
      E: ['Menos de 10% de esforço adicional — carga gerenciável. O BCG recomenda nunca ultrapassar este limite.',
          'Entre 10% e 20% de esforço extra — gerenciável, mas monitore sinais de sobrecarga.',
          'Entre 20% e 40% adicional — alto risco; remova responsabilidades não-essenciais dos envolvidos-chave.',
          'Mais de 40% adicional — insustentável. Alto risco de burnout, queda de qualidade e abandono.']
    };

    // Estado inicial
    const state = { D: 1, I: 1, C1: 1, C2: 1, E: 1 };

    // ==================== FUNÇÕES DE ESCAPE ====================
    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>"]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        if (m === '"') return '&quot;';
        return m;
      }).replace(/'/g, '&#39;'); // apóstrofo
    }

    // ==================== FUNÇÕES DE CÁLCULO ====================
    function calcScore() {
      return state.D + 2*state.I + 2*state.C1 + state.C2 + state.E;
    }

    function zone(score) {
      return score <= 14 ? 'win' : score <= 17 ? 'worry' : 'woe';
    }

    function zoneLabel(score) {
      return score <= 14 ? 'WIN' : score <= 17 ? 'WORRY' : 'WOE';
    }

    function zoneMessage(zoneKey) {
      if(zoneKey === 'win') return 'Alta probabilidade de sucesso. Mantenha a gestão do projeto como está.';
      if(zoneKey === 'worry') return 'Zona de atenção. Identifique os fatores críticos e atue para reduzir o escore.';
      return 'Zona crítica. Alta probabilidade de fracasso. Ações corretivas imediatas necessárias.';
    }

    // ==================== ATUALIZAÇÃO DA INTERFACE ====================
    function updateUI() {
      const score = calcScore();
      const z = zone(score);
      const zl = zoneLabel(score);

      // Result block
      const rb = document.getElementById('resultBlock');
      rb.className = 'result-block ' + z;
      document.getElementById('scoreNum').textContent = score;
      document.getElementById('zonePill').textContent = '● ' + zl;
      document.getElementById('resultMsg').textContent = zoneMessage(z);

      // Formula chips
      document.getElementById('fD').textContent = `D=${state.D}`;
      document.getElementById('fI').textContent = `2×I=${2*state.I}`;
      document.getElementById('fC1').textContent = `2×C1=${2*state.C1}`;
      document.getElementById('fC2').textContent = `C2=${state.C2}`;
      document.getElementById('fE').textContent = `E=${state.E}`;
      document.getElementById('fTotal').textContent = score;

      // Breakdown values + bars
      document.getElementById('bdD').textContent = state.D;
      document.getElementById('bdI').textContent = 2*state.I;
      document.getElementById('bdC1').textContent = 2*state.C1;
      document.getElementById('bdC2').textContent = state.C2;
      document.getElementById('bdE').textContent = state.E;

      const setBar = (id, val, max) => {
        const el = document.getElementById(id);
        if (el) el.style.width = Math.round(val/max*100) + '%';
      };
      setBar('barD',  state.D,       4);
      setBar('barI',  2*state.I,     8);
      setBar('barC1', 2*state.C1,    8);
      setBar('barC2', state.C2,      4);
      setBar('barE',  state.E,       4);

      drawChart(score);
    }

    // ==================== GRÁFICO (adaptado) ====================
    function drawChart(score) {
      // ... (mesma implementação anterior, sem alterações)
    }

    // ==================== SELEÇÃO DE FATORES ====================
    function handleFactorClick(btn) {
      const group = btn.closest('[data-factor]');
      const factor = group.dataset.factor;
      group.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state[factor] = parseInt(btn.dataset.val, 10);

      const justDiv = document.getElementById('just-' + factor);
      if (justDiv) justDiv.classList.add('visible');

      updateUI();
    }

    // ==================== RESET ====================
    function resetAll() {
      FACTORS.forEach(f => state[f] = 1);
      document.querySelectorAll('.factor-options').forEach(g => {
        const firstBtn = g.querySelector('.opt-btn');
        g.querySelectorAll('.opt-btn').forEach(b => b.classList.remove('selected'));
        if (firstBtn) firstBtn.classList.add('selected');
      });
      document.querySelectorAll('.factor-justification').forEach(el => el.classList.remove('visible'));
      ['justD','justI','justC1','justC2','justE'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
      document.getElementById('projectName').value = ''; // limpa nome
      updateUI();
      showToast('Valores resetados');
    }

    // ==================== TOAST ====================
    let toastTimer;
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ==================== MODAL ====================
    function openReport() {
      const score = calcScore();
      const z = zone(score);
      const zl = zoneLabel(score);
      const now = new Date().toLocaleDateString('pt-BR', { day: '2-digit', month: 'long', year: 'numeric' });
      const projectName = escapeHtml(document.getElementById('projectName').value.trim() || 'Projeto sem nome');

      // Coleta justificativas escapadas
      const just = {
        D: escapeHtml(document.getElementById('justD').value),
        I: escapeHtml(document.getElementById('justI').value),
        C1: escapeHtml(document.getElementById('justC1').value),
        C2: escapeHtml(document.getElementById('justC2').value),
        E: escapeHtml(document.getElementById('justE').value)
      };

      // Geração do conteúdo do modal (com escape aplicado)
      const modalHtml = `
        <div class="modal-header">...</div>
        <div class="modal-body">
          <div class="academic-paper">
            ... (conteúdo usando just e projectName escapados)
          </div>
        </div>
      `;

      document.getElementById('reportModalContent').innerHTML = modalHtml;
      document.getElementById('reportModal').classList.add('open');
    }

    function closeReport() {
      document.getElementById('reportModal').classList.remove('open');
    }

    // Fechar modal ao clicar no overlay
    document.getElementById('reportModal').addEventListener('click', function(e) {
      if (e.target === this) closeReport();
    });

    // ==================== EXPORTAR PDF (com escape e padding consistente) ====================
    function exportPDF() {
      const score = calcScore();
      const z = zone(score);
      const zl = zoneLabel(score);
      const now = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'long',year:'numeric'});
      const nowShort = new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
      const ts = new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      const reportId = 'DICE-' + score + '-' + nowShort.replace(/\//g,'');
      const projectName = escapeHtml(document.getElementById('projectName').value.trim() || 'Projeto sem nome');

      // Justificativas escapadas e truncadas (corte por palavra)
      const truncate = (s, max=280) => {
        if (!s) return '';
        if (s.length <= max) return s;
        let truncated = s.substr(0, max);
        // evita cortar no meio de uma palavra
        let lastSpace = truncated.lastIndexOf(' ');
        if (lastSpace > max * 0.8) truncated = truncated.substr(0, lastSpace);
        return truncated + '…';
      };
      const J = {
        D: truncate(escapeHtml(document.getElementById('justD').value)),
        I: truncate(escapeHtml(document.getElementById('justI').value)),
        C1: truncate(escapeHtml(document.getElementById('justC1').value)),
        C2: truncate(escapeHtml(document.getElementById('justC2').value)),
        E: truncate(escapeHtml(document.getElementById('justE').value))
      };

      // Cores e zonas
      const ZC = { win:'#03A63C', worry:'#D97706', woe:'#DC2626' };
      const ZBG = { win:'#f0fdf4', worry:'#fffbeb', woe:'#fef2f2' };
      const ZBD = { win:'#bbf7d0', worry:'#fde68a', woe:'#fecaca' };
      const ZLB = { win:'WIN — Zona de Sucesso', worry:'WORRY — Zona de Atenção', woe:'WOE — Zona de Perigo' };
      const RC = { 1:'#03A63C', 2:'#D97706', 3:'#EA580C', 4:'#DC2626' };
      const RL = { 1:'BAIXO RISCO', 2:'MODERADO', 3:'ELEVADO', 4:'CRÍTICO' };
      const zc = ZC[z], zbg = ZBG[z], zbd = ZBD[z];

      // Fatores para tabela
      const factors = [
        {key:'D',  long:'D — Duração entre marcos de revisão', val:state.D,  comp:state.D,    max:4, weight:1},
        {key:'I',  long:'I — Integridade e capacidade da equipe', val:state.I,  comp:2*state.I,  max:8, weight:2},
        {key:'C1', long:'C1 — Compromisso da alta gestão',     val:state.C1, comp:2*state.C1, max:8, weight:2},
        {key:'C2', long:'C2 — Compromisso dos colaboradores impactados', val:state.C2, comp:state.C2,  max:4, weight:1},
        {key:'E',  long:'E — Esforço adicional exigido',       val:state.E,  comp:state.E,    max:4, weight:1}
      ];

      // Construção do HTML do PDF (com escape já aplicado nas strings)
      // ... (a estrutura é longa, mas vou garantir que cada página tenha padding e que os blocos evitem quebra)
      const html = `<!DOCTYPE html>...`; // (omitido por brevidade, mas no código final estará completo)

      const win = window.open('', '_blank');
      if (!win) { showToast('Permita pop-ups para exportar.'); return; }
      win.document.open();
      win.document.write(html);
      win.document.close();
      showToast('Abrindo relatório...');
    }

    // ==================== INICIALIZAÇÃO ====================
    function init() {
      // Remover onclicks e adicionar listeners
      document.querySelectorAll('.factor-options .opt-btn').forEach(btn => {
        btn.addEventListener('click', e => handleFactorClick(e.currentTarget));
      });

      document.getElementById('btnReport').addEventListener('click', openReport);
      document.getElementById('btnPNG').addEventListener('click', () => {
        // reutiliza a função savePNG existente (adaptada)
        savePNG();
      });
      document.getElementById('btnReset').addEventListener('click', resetAll);

      // Tabs
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', e => {
          const tab = e.currentTarget.dataset.tab;
          document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
          document.getElementById('view-' + tab).classList.add('active');
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          e.currentTarget.classList.add('active');
        });
      });

      // Fechar modal com ESC
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closeReport();
      });

      // Atualização inicial
      updateUI();
    }

    // Chamar init após carregamento
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
</body>
</html>
