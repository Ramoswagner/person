<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLB Walker - Controle Fluido</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 15px 25px;
            border-radius: 8px;
            z-index: 10;
            backdrop-filter: blur(5px);
            border-left: 4px solid #ff6600;
        }

        #hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
            background: rgba(0,0,0,0.4);
            padding: 8px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            z-index: 15;
        }

        #status {
            position: absolute;
            bottom: 30px;
            right: 30px;
            color: white;
            background: rgba(0, 0, 0, 0.5);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            z-index: 15;
            border-right: 3px solid #ff6600;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0, 0, 0, 0.8);
            padding: 20px 40px;
            border-radius: 60px;
            z-index: 100;
            backdrop-filter: blur(10px);
            border: 1px solid #ff6600;
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,102,0,0.3);
            border-radius: 50%;
            border-top-color: #ff6600;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .key-box {
            display: inline-block;
            background: rgba(255,102,0,0.3);
            border: 1px solid #ff6600;
            border-radius: 5px;
            padding: 2px 8px;
            margin: 0 2px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>🎮 Controle Fluido - Walking Animation</h2>
        <p>Modelo: novo.glb | Movimento suave e responsivo</p>
    </div>

    <div id="hint">
        <span class="key-box">W</span> <span class="key-box">A</span> <span class="key-box">S</span> <span class="key-box">D</span> Mover | 
        <span class="key-box">Q</span> <span class="key-box">E</span> Rotacionar | 
        <span class="key-box">Shift</span> Correr
    </div>

    <div id="status">
        🚶 Parado
    </div>

    <div id="loading">
        <span class="spinner"></span> Carregando modelo...
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Configuração inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a2e);
        scene.fog = new THREE.Fog(0x1a1a2e, 15, 40);

        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles da câmera (OrbitControls para liberdade de visão)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2;
        controls.minDistance = 3;
        controls.maxDistance = 15;
        controls.target.set(0, 1, 0);

        // --- Iluminação ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -10;
        dirLight.shadow.camera.right = 10;
        dirLight.shadow.camera.top = 10;
        dirLight.shadow.camera.bottom = -10;
        scene.add(dirLight);

        // Luz de preenchimento
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-5, 3, 5);
        scene.add(fillLight);

        // --- Cenário simples mas com referências ---
        
        // Chão com grade
        const gridHelper = new THREE.GridHelper(20, 20, 0xff6600, 0x333344);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // Chão sólido semi-transparente
        const groundGeometry = new THREE.CircleGeometry(15, 32);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x1a1a2e, transparent: true, opacity: 0.6 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Pequenos marcadores coloridos para referência espacial
        const colors = [0xff3366, 0x33ccff, 0xffaa00, 0x66ff33];
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const radius = 5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            
            const marker = new THREE.Mesh(
                new THREE.ConeGeometry(0.3, 0.8, 8),
                new THREE.MeshStandardMaterial({ color: colors[i % colors.length], emissive: 0x222222 })
            );
            marker.position.set(x, 0.4, z);
            marker.castShadow = true;
            marker.receiveShadow = true;
            scene.add(marker);
        }

        // --- Variáveis do personagem ---
        let character = null;
        let mixer = null;
        let clock = new THREE.Clock();
        
        // Estado do personagem com smoothing
        const characterState = {
            position: new THREE.Vector3(0, 0, 0),
            targetPosition: new THREE.Vector3(0, 0, 0),
            rotation: 0,
            targetRotation: 0,
            speed: 2.5,
            isMoving: false,
            
            // Teclas pressionadas
            keys: {
                w: false, a: false, s: false, d: false,
                q: false, e: false,
                shift: false
            },
            
            // Velocidades de movimento
            moveSpeed: 3.0,
            rotateSpeed: 2.5,
            
            // Fatores de suavização (quanto menor, mais suave)
            smoothFactor: 0.15
        };

        // Elementos DOM
        const loadingEl = document.getElementById('loading');
        const statusEl = document.getElementById('status');

        // --- Sistema de teclado otimizado ---
        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': characterState.keys.w = true; e.preventDefault(); break;
                case 'KeyS': characterState.keys.s = true; e.preventDefault(); break;
                case 'KeyA': characterState.keys.a = true; e.preventDefault(); break;
                case 'KeyD': characterState.keys.d = true; e.preventDefault(); break;
                case 'KeyQ': characterState.keys.q = true; e.preventDefault(); break;
                case 'KeyE': characterState.keys.e = true; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    characterState.keys.shift = true;
                    characterState.moveSpeed = 5.0; // Mais rápido com shift
                    e.preventDefault();
                    break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': characterState.keys.w = false; e.preventDefault(); break;
                case 'KeyS': characterState.keys.s = false; e.preventDefault(); break;
                case 'KeyA': characterState.keys.a = false; e.preventDefault(); break;
                case 'KeyD': characterState.keys.d = false; e.preventDefault(); break;
                case 'KeyQ': characterState.keys.q = false; e.preventDefault(); break;
                case 'KeyE': characterState.keys.e = false; e.preventDefault(); break;
                case 'ShiftLeft':
                case 'ShiftRight':
                    characterState.keys.shift = false;
                    characterState.moveSpeed = 3.0; // Volta à velocidade normal
                    e.preventDefault();
                    break;
            }
        });

        // Prevenir rolagem da página
        window.addEventListener('keydown', (e) => {
            if (e.code.startsWith('Key') || e.code.startsWith('Shift') || e.code === 'Space') {
                e.preventDefault();
            }
        }, { passive: false });

        // --- Carregar o modelo GLB ---
        const loader = new GLTFLoader();
        
        loader.load(
            'novo.glb',
            (gltf) => {
                character = gltf.scene;
                
                character.position.set(0, 0, 0);
                character.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        
                        // Melhorar aparência dos materiais
                        if (node.material) {
                            if (Array.isArray(node.material)) {
                                node.material.forEach(m => {
                                    m.roughness = 0.4;
                                    m.metalness = 0.1;
                                });
                            } else {
                                node.material.roughness = 0.4;
                                node.material.metalness = 0.1;
                            }
                        }
                    }
                });
                
                scene.add(character);
                
                // Configurar animações
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(character);
                    
                    gltf.animations.forEach((clip) => {
                        const action = mixer.clipAction(clip);
                        action.play();
                    });
                    
                    // Inicialmente pausar a animação
                    if (mixer) {
                        mixer.timeScale = 0;
                    }
                    
                    console.log('Animações carregadas:', gltf.animations.length);
                }
                
                loadingEl.classList.add('hidden');
                console.log('Personagem carregado!');
            },
            (xhr) => {
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                loadingEl.innerHTML = `<span class="spinner"></span> Carregando... ${percent}%`;
            },
            (error) => {
                console.error('Erro:', error);
                loadingEl.innerHTML = '❌ Erro ao carregar modelo';
                
                // Placeholder simples
                const geometry = new THREE.BoxGeometry(0.8, 1.8, 0.8);
                const material = new THREE.MeshStandardMaterial({ color: 0xff6600 });
                character = new THREE.Mesh(geometry, material);
                character.position.set(0, 0.9, 0);
                character.castShadow = true;
                character.receiveShadow = true;
                scene.add(character);
                
                loadingEl.classList.add('hidden');
            }
        );

        // --- Sistema de movimento fluido ---
        function updateMovement(delta) {
            if (!character) return;
            
            // Calcular direção do movimento baseado nas teclas
            const moveX = (characterState.keys.d ? 1 : 0) - (characterState.keys.a ? 1 : 0);
            const moveZ = (characterState.keys.s ? 1 : 0) - (characterState.keys.w ? 1 : 0);
            
            // Calcular rotação (Q/E)
            let rotDelta = 0;
            if (characterState.keys.q) rotDelta += 1;
            if (characterState.keys.e) rotDelta -= 1;
            
            // Atualizar rotação alvo
            if (rotDelta !== 0) {
                characterState.targetRotation += rotDelta * characterState.rotateSpeed * delta;
            }
            
            // Suavizar a rotação
            characterState.rotation += (characterState.targetRotation - characterState.rotation) * characterState.smoothFactor * 5;
            
            // Verificar se está se movendo
            const isMoving = moveX !== 0 || moveZ !== 0;
            characterState.isMoving = isMoving;
            
            // Controlar animação (transição suave)
            if (mixer) {
                // Transição suave entre andar e parar
                const targetTimeScale = isMoving ? 1.0 : 0.0;
                mixer.timeScale += (targetTimeScale - mixer.timeScale) * 0.1;
            }
            
            // Se estiver se movendo, calcular posição alvo
            if (isMoving) {
                // Vetores de direção baseados na rotação atual
                const forward = new THREE.Vector3(0, 0, -1).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterState.rotation);
                const right = new THREE.Vector3(1, 0, 0).applyAxisAngle(new THREE.Vector3(0, 1, 0), characterState.rotation);
                
                // Calcular movimento
                const movement = new THREE.Vector3()
                    .addScaledVector(forward, -moveZ * characterState.moveSpeed * delta)
                    .addScaledVector(right, moveX * characterState.moveSpeed * delta);
                
                // Atualizar posição alvo
                characterState.targetPosition.x += movement.x;
                characterState.targetPosition.z += movement.z;
            }
            
            // Suavizar a posição do personagem (movimento fluido)
            character.position.x += (characterState.targetPosition.x - character.position.x) * characterState.smoothFactor;
            character.position.z += (characterState.targetPosition.z - character.position.z) * characterState.smoothFactor;
            
            // Aplicar rotação suave ao personagem
            character.rotation.y = characterState.rotation;
            
            // Atualizar alvo da câmera para seguir o personagem
            controls.target.lerp(character.position.clone().add(new THREE.Vector3(0, 1, 0)), 0.1);
            
            // Atualizar status
            if (isMoving) {
                statusEl.innerHTML = `🚶 Andando | Vel: ${characterState.moveSpeed.toFixed(1)} | Pos: ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;
            } else {
                statusEl.innerHTML = `🚶 Parado | Pos: ${character.position.x.toFixed(1)}, ${character.position.z.toFixed(1)}`;
            }
        }

        // --- Animação principal ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = Math.min(clock.getDelta(), 0.1); // Limitar delta máximo para evitar saltos

            // Atualizar animação do personagem
            if (mixer) {
                mixer.update(delta);
            }

            // Atualizar movimento
            updateMovement(delta);
            
            // Atualizar controles da câmera
            controls.update();

            renderer.render(scene, camera);
        }

        animate();

        // --- Resize ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- Esconder loading após 3 segundos (fallback) ---
        setTimeout(() => {
            loadingEl.classList.add('hidden');
        }, 3000);
    </script>
</body>
</html>
