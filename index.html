<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO® Executivo - Movimento Completo</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #ffd966;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 2px solid #ffd966;
            z-index: 100;
            pointer-events: none;
        }
        #controls-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 16px;
            backdrop-filter: blur(5px);
            border: 1px solid #ffd966;
            z-index: 100;
            display: flex;
            gap: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .key {
            background: #ffd966;
            color: #000;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            margin: 0 5px;
        }
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: #0f0;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 14px;
            border: 1px solid #00ff00;
            z-index: 100;
        }
    </style>
</head>
<body>
    <div id="info">🧱 LEGO® EXECUTIVE | GERENTE DE TERNO AZUL</div>
    <div id="status">🚶 PARADO</div>
    <div id="controls-panel">
        <span><span class="key">W A S D</span> mover</span>
        <span><span class="key">SHIFT</span> correr</span>
        <span><span class="key">🖱️</span> arrastar câmera</span>
        <span><span class="key">⏫⏬</span> zoom</span>
    </div>

    <!-- Importação do Three.js e extensões -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ============================================================
        // CORES LEGO OFICIAIS
        // ============================================================
        const COLORS = {
            skin: 0x8B5A2B,      // Medium Brown
            suit: 0x0A1F44,      // Dark Blue
            suitLight: 0x1A2F54,
            white: 0xFFFFFF,
            black: 0x05131D,
            gray: 0xA0A5A9,      // Light Bluish Gray
            brown: 0x352100,      // Dark Brown
            yellow: 0xFFD966,
            red: 0xC91A09,
            green: 0x00852B,
            blue: 0x0055BF,
        };

        // ============================================================
        // UTILITÁRIOS PARA CRIAÇÃO DE PEÇAS LEGO
        // ============================================================
        function createStud(color, radius = 0.08, height = 0.04) {
            const geo = new THREE.CylinderGeometry(radius, radius, height, 16);
            const mat = new THREE.MeshStandardMaterial({ color, roughness: 0.3, metalness: 0.1 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            return mesh;
        }

        function createBrick(w, h, d, color, hasStuds = true, studColor = null) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.BoxGeometry(w, h, d);
            const bodyMat = new THREE.MeshStandardMaterial({ color, roughness: 0.4 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            body.receiveShadow = true;
            body.position.y = h/2;
            group.add(body);

            if (hasStuds) {
                const studCountX = Math.max(1, Math.floor(w / 0.4));
                const studCountZ = Math.max(1, Math.floor(d / 0.4));
                const startX = -w/2 + 0.2;
                const startZ = -d/2 + 0.2;
                for (let i = 0; i < studCountX; i++) {
                    for (let j = 0; j < studCountZ; j++) {
                        const stud = createStud(studColor || color, 0.07, 0.04);
                        stud.position.set(startX + i*0.4, h, startZ + j*0.4);
                        group.add(stud);
                    }
                }
            }
            return group;
        }

        function createHand(color) {
            const group = new THREE.Group();
            const base = new THREE.Mesh(
                new THREE.CylinderGeometry(0.08, 0.08, 0.1, 6),
                new THREE.MeshStandardMaterial({ color, roughness: 0.4 })
            );
            base.castShadow = true;
            base.receiveShadow = true;
            base.rotation.x = Math.PI/2;
            group.add(base);

            const hook = new THREE.Mesh(
                new THREE.TorusGeometry(0.06, 0.03, 4, 16, Math.PI/2),
                new THREE.MeshStandardMaterial({ color, roughness: 0.4 })
            );
            hook.castShadow = true;
            hook.receiveShadow = true;
            hook.rotation.z = Math.PI/2;
            hook.rotation.x = Math.PI/2;
            hook.position.set(0, 0, 0.06);
            group.add(hook);
            return group;
        }

        // ============================================================
        // CONSTRUÇÃO DO PERSONAGEM LEGO COM GRUPOS ARTICULADOS
        // ============================================================
        function createLegoManager() {
            const group = new THREE.Group();

            // Pernas (dois grupos separados para animação)
            const legLeftGroup = new THREE.Group();
            legLeftGroup.position.set(-0.15, 0.2, 0);
            const legLeft = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color: COLORS.suit, roughness: 0.4 })
            );
            legLeft.castShadow = true; legLeft.receiveShadow = true;
            legLeft.position.y = 0.2;
            legLeftGroup.add(legLeft);
            group.add(legLeftGroup);

            const legRightGroup = new THREE.Group();
            legRightGroup.position.set(0.15, 0.2, 0);
            const legRight = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color: COLORS.suit, roughness: 0.4 })
            );
            legRight.castShadow = true; legRight.receiveShadow = true;
            legRight.position.y = 0.2;
            legRightGroup.add(legRight);
            group.add(legRightGroup);

            // Quadril
            const hip = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.15, 0.25),
                new THREE.MeshStandardMaterial({ color: COLORS.suit, roughness: 0.4 })
            );
            hip.castShadow = true; hip.receiveShadow = true;
            hip.position.set(0, 0.45, 0);
            group.add(hip);

            // Tronco
            const torso = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.7, 0.25),
                new THREE.MeshStandardMaterial({ color: COLORS.suit, roughness: 0.4 })
            );
            torso.castShadow = true; torso.receiveShadow = true;
            torso.position.set(0, 0.95, 0);
            group.add(torso);

            // Camisa
            const shirt = new THREE.Mesh(
                new THREE.BoxGeometry(0.25, 0.4, 0.05),
                new THREE.MeshStandardMaterial({ color: COLORS.white, roughness: 0.6 })
            );
            shirt.castShadow = true; shirt.receiveShadow = true;
            shirt.position.set(0, 0.95, 0.13);
            group.add(shirt);

            // Gola
            const collar = new THREE.Mesh(
                new THREE.BoxGeometry(0.3, 0.1, 0.05),
                new THREE.MeshStandardMaterial({ color: COLORS.suitLight, roughness: 0.4 })
            );
            collar.castShadow = true; collar.receiveShadow = true;
            collar.position.set(0, 1.2, 0.13);
            group.add(collar);

            // Braços (grupos para animação)
            const armLeftGroup = new THREE.Group();
            armLeftGroup.position.set(-0.4, 0.95, 0);
            const armLeftUpper = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color: COLORS.suit, roughness: 0.4 })
            );
            armLeftUpper.castShadow = true; armLeftUpper.receiveShadow = true;
            armLeftUpper.position.y = -0.2;
            armLeftGroup.add(armLeftUpper);
            
            const armLeftLower = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.35, 0.18),
                new THREE.MeshStandardMaterial({ color: COLORS.suitLight, roughness: 0.4 })
            );
            armLeftLower.castShadow = true; armLeftLower.receiveShadow = true;
            armLeftLower.position.y = -0.5;
            armLeftGroup.add(armLeftLower);
            
            const handLeft = createHand(COLORS.gray);
            handLeft.position.set(0, -0.75, 0);
            handLeft.rotation.z = 0.2;
            armLeftGroup.add(handLeft);
            group.add(armLeftGroup);

            const armRightGroup = new THREE.Group();
            armRightGroup.position.set(0.4, 0.95, 0);
            const armRightUpper = new THREE.Mesh(
                new THREE.BoxGeometry(0.2, 0.4, 0.2),
                new THREE.MeshStandardMaterial({ color: COLORS.suit, roughness: 0.4 })
            );
            armRightUpper.castShadow = true; armRightUpper.receiveShadow = true;
            armRightUpper.position.y = -0.2;
            armRightGroup.add(armRightUpper);
            
            const armRightLower = new THREE.Mesh(
                new THREE.BoxGeometry(0.18, 0.35, 0.18),
                new THREE.MeshStandardMaterial({ color: COLORS.suitLight, roughness: 0.4 })
            );
            armRightLower.castShadow = true; armRightLower.receiveShadow = true;
            armRightLower.position.y = -0.5;
            armRightGroup.add(armRightLower);
            
            const handRight = createHand(COLORS.gray);
            handRight.position.set(0, -0.75, 0);
            handRight.rotation.z = -0.2;
            armRightGroup.add(handRight);
            group.add(armRightGroup);

            // Cabeça
            const headGroup = new THREE.Group();
            headGroup.position.set(0, 1.45, 0);
            const headGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.35, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: COLORS.skin, roughness: 0.3 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.castShadow = true; head.receiveShadow = true;
            head.position.y = 0.175;
            headGroup.add(head);
            
            const stud = new THREE.Mesh(
                new THREE.CylinderGeometry(0.12, 0.12, 0.06, 12),
                new THREE.MeshStandardMaterial({ color: COLORS.skin, roughness: 0.3 })
            );
            stud.castShadow = true; stud.receiveShadow = true;
            stud.position.y = 0.355;
            headGroup.add(stud);
            group.add(headGroup);

            // Barba
            const beard = new THREE.Mesh(
                new THREE.BoxGeometry(0.25, 0.12, 0.1),
                new THREE.MeshStandardMaterial({ color: COLORS.brown, roughness: 0.8 })
            );
            beard.castShadow = true; beard.receiveShadow = true;
            beard.position.set(0, 1.3, 0.2);
            group.add(beard);

            // Olhos
            const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
            const eyePupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            
            const eyeLeftWhite = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.02, 8), eyeWhiteMat);
            eyeLeftWhite.rotation.x = Math.PI/2;
            eyeLeftWhite.position.set(-0.1, 1.5, 0.25);
            group.add(eyeLeftWhite);
            const eyeLeftPupil = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.03, 6), eyePupilMat);
            eyeLeftPupil.rotation.x = Math.PI/2;
            eyeLeftPupil.position.set(-0.1, 1.5, 0.27);
            group.add(eyeLeftPupil);
            
            const eyeRightWhite = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.02, 8), eyeWhiteMat);
            eyeRightWhite.rotation.x = Math.PI/2;
            eyeRightWhite.position.set(0.1, 1.5, 0.25);
            group.add(eyeRightWhite);
            const eyeRightPupil = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.03, 6), eyePupilMat);
            eyeRightPupil.rotation.x = Math.PI/2;
            eyeRightPupil.position.set(0.1, 1.5, 0.27);
            group.add(eyeRightPupil);

            // Guardar referências para animação
            group.userData = {
                legLeft: legLeftGroup,
                legRight: legRightGroup,
                armLeft: armLeftGroup,
                armRight: armRightGroup,
                head: headGroup
            };

            return group;
        }

        // ============================================================
        // CENÁRIO: ESCRITÓRIO LEGO (simplificado para foco no movimento)
        // ============================================================
        function createOffice() {
            const office = new THREE.Group();

            // Chão com studs
            const floorBase = new THREE.Mesh(
                new THREE.BoxGeometry(20, 0.2, 20),
                new THREE.MeshStandardMaterial({ color: 0xCCCCCC, roughness: 0.7 })
            );
            floorBase.position.y = -0.1;
            floorBase.receiveShadow = true;
            office.add(floorBase);

            // Grade de studs
            for (let x = -9; x <= 9; x += 1) {
                for (let z = -9; z <= 9; z += 1) {
                    const stud = new THREE.Mesh(
                        new THREE.CylinderGeometry(0.1, 0.1, 0.05, 8),
                        new THREE.MeshStandardMaterial({ color: 0xAAAAAA, roughness: 0.5 })
                    );
                    stud.position.set(x, 0.05, z);
                    stud.receiveShadow = true;
                    office.add(stud);
                }
            }

            // Mesa
            const desk = createBrick(3, 0.2, 1.5, 0x8B4513, true, 0xFFD966);
            desk.position.set(2, 1, 3);
            office.add(desk);

            // Cadeira
            const chairSeat = createBrick(0.8, 0.15, 0.8, 0x4A4A4A, true, 0xAAAAAA);
            chairSeat.position.set(2, 0.6, 4.5);
            office.add(chairSeat);
            const chairBack = createBrick(0.8, 0.6, 0.15, 0x4A4A4A, false);
            chairBack.position.set(2, 0.9, 4.9);
            office.add(chairBack);

            // Quadro Kanban
            const kanban = new THREE.Group();
            const boardBase = new THREE.Mesh(
                new THREE.BoxGeometry(4, 2.5, 0.2),
                new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.5 })
            );
            boardBase.position.set(-3, 1.5, 2);
            boardBase.castShadow = true; boardBase.receiveShadow = true;
            kanban.add(boardBase);
            // Colunas coloridas
            const colPos = [-1.2, 0, 1.2];
            const colColors = [0xFFCC00, 0x00CCFF, 0x00CC66];
            colPos.forEach((x, i) => {
                const col = createBrick(1, 1.8, 0.1, colColors[i], true, 0xFFFFFF);
                col.position.set(x, 1.5, 2.1);
                kanban.add(col);
            });
            kanban.position.set(-3, 0, 2);
            office.add(kanban);

            return office;
        }

        // ============================================================
        // SETUP DA CENA
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xE0E0E0);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(5, 4, 8);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // OrbitControls - target será o personagem
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = false;
        controls.target.set(0, 1.5, 0);
        controls.maxPolarAngle = Math.PI / 2.2;

        // Iluminação
        const mainLight = new THREE.DirectionalLight(0xFFF5E6, 1.2);
        mainLight.position.set(5, 12, 8);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 25;
        mainLight.shadow.camera.left = -10;
        mainLight.shadow.camera.right = 10;
        mainLight.shadow.camera.top = 10;
        mainLight.shadow.camera.bottom = -10;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0xE0F0FF, 0.6);
        fillLight.position.set(-5, 5, 5);
        scene.add(fillLight);

        const ambientLight = new THREE.AmbientLight(0xFFFFFF, 0.5);
        scene.add(ambientLight);

        // Adicionar elementos
        const office = createOffice();
        scene.add(office);

        const manager = createLegoManager();
        manager.position.set(0, 0, 0);
        scene.add(manager);

        // Grid helper (opcional)
        const gridHelper = new THREE.GridHelper(20, 20, 0x888888, 0x444444);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // ============================================================
        // CONTROLES DE TECLADO E MOVIMENTO
        // ============================================================
        const keyState = {
            w: false, a: false, s: false, d: false, shift: false
        };

        window.addEventListener('keydown', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = true; e.preventDefault(); break;
                case 'KeyA': keyState.a = true; e.preventDefault(); break;
                case 'KeyS': keyState.s = true; e.preventDefault(); break;
                case 'KeyD': keyState.d = true; e.preventDefault(); break;
                case 'ShiftLeft': case 'ShiftRight': keyState.shift = true; e.preventDefault(); break;
            }
        });

        window.addEventListener('keyup', (e) => {
            switch(e.code) {
                case 'KeyW': keyState.w = false; e.preventDefault(); break;
                case 'KeyA': keyState.a = false; e.preventDefault(); break;
                case 'KeyS': keyState.s = false; e.preventDefault(); break;
                case 'KeyD': keyState.d = false; e.preventDefault(); break;
                case 'ShiftLeft': case 'ShiftRight': keyState.shift = false; e.preventDefault(); break;
            }
        });

        // Variáveis de movimento
        const moveSpeed = 0.1;
        const runMultiplier = 2.0;
        let walkPhase = 0; // para animação de passos

        // Atualizar status na tela
        const statusDiv = document.getElementById('status');

        // ============================================================
        // LOOP DE ANIMAÇÃO
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);

            // Movimentação do personagem
            if (keyState.w || keyState.a || keyState.s || keyState.d) {
                // Calcular direção baseada na câmera (horizontal)
                const cameraDir = new THREE.Vector3();
                camera.getWorldDirection(cameraDir);
                cameraDir.y = 0;
                cameraDir.normalize();

                const cameraRight = new THREE.Vector3().crossVectors(new THREE.Vector3(0,1,0), cameraDir).normalize();

                const moveDir = new THREE.Vector3(0,0,0);
                if (keyState.w) moveDir.add(cameraDir);
                if (keyState.s) moveDir.sub(cameraDir);
                if (keyState.a) moveDir.add(cameraRight);
                if (keyState.d) moveDir.sub(cameraRight);

                if (moveDir.lengthSq() > 0) {
                    moveDir.normalize();
                    const speed = keyState.shift ? moveSpeed * runMultiplier : moveSpeed;
                    manager.position.x += moveDir.x * speed;
                    manager.position.z += moveDir.z * speed;

                    // Rotacionar o personagem na direção do movimento
                    const targetAngle = Math.atan2(moveDir.x, moveDir.z);
                    // Suavizar rotação
                    let angleDiff = targetAngle - manager.rotation.y;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI*2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI*2;
                    manager.rotation.y += angleDiff * 0.1;

                    // Animação de caminhada (pernas e braços)
                    walkPhase += speed * 2;
                    const legAngle = Math.sin(walkPhase) * 0.3;
                    const armAngle = Math.sin(walkPhase) * 0.2;
                    if (manager.userData) {
                        manager.userData.legLeft.rotation.x = legAngle;
                        manager.userData.legRight.rotation.x = -legAngle;
                        manager.userData.armLeft.rotation.x = -armAngle;
                        manager.userData.armRight.rotation.x = armAngle;
                    }

                    statusDiv.innerHTML = '🚶 ANDANDO' + (keyState.shift ? ' (CORRENDO)' : '');
                }
            } else {
                // Parado: voltar pernas ao neutro
                if (manager.userData) {
                    manager.userData.legLeft.rotation.x *= 0.9;
                    manager.userData.legRight.rotation.x *= 0.9;
                    manager.userData.armLeft.rotation.x *= 0.9;
                    manager.userData.armRight.rotation.x *= 0.9;
                }
                statusDiv.innerHTML = '🚶 PARADO';
            }

            // Atualizar target da câmera para o personagem
            controls.target.copy(manager.position.clone().add(new THREE.Vector3(0, 1.5, 0)));

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // ============================================================
        // RESIZE
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
