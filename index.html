<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador LEGO 3D - Diagnóstico</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffd966;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            backdrop-filter: blur(5px);
            border: 2px solid #ffd966;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #status {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.8);
            color: #ffaa00;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid #ffaa00;
            z-index: 100;
            max-width: 300px;
            word-break: break-all;
        }
        
        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 100;
            display: flex;
            gap: 20px;
        }
        
        .key {
            background: #ffd966;
            color: #000;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            margin: 0 5px;
        }
        
        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9);
            color: white;
            padding: 20px 40px;
            border-radius: 10px;
            z-index: 1000;
            display: none;
        }
        
        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #ffd966;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        #error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255,0,0,0.9);
            color: white;
            padding: 30px;
            border-radius: 10px;
            z-index: 1000;
            display: none;
            max-width: 500px;
            text-align: center;
        }
        
        #debug {
            position: absolute;
            bottom: 100px;
            left: 20px;
            background: rgba(0,0,0,0.8);
            color: #00ff00;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 12px;
            z-index: 100;
            max-width: 400px;
        }
        
        button {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            margin: 5px;
        }
        
        button:hover {
            background: #2a7fff;
        }
    </style>
</head>
<body>
    <div id="info">🧱 LEGO® Gerente - Diagnóstico</div>
    <div id="status">🔍 Verificando arquivo avatar.glb...</div>
    
    <div id="debug">
        📁 Informações do arquivo:<br>
        <span id="file-info">Carregando...</span>
    </div>
    
    <div id="controls">
        <span><span class="key">🖱️</span> Arrastar</span>
        <span><span class="key">⏫⏬</span> Zoom</span>
        <span><span class="key">⏺️</span> Auto-rotação</span>
    </div>
    
    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Carregando modelo 3D...</div>
    </div>
    
    <div id="error"></div>

    <!-- Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ============================================================
        // Informações de debug
        // ============================================================
        const debugInfo = document.getElementById('file-info');
        const statusDiv = document.getElementById('status');
        
        // Mostrar caminho atual
        const currentPath = window.location.pathname;
        const currentFolder = currentPath.substring(0, currentPath.lastIndexOf('/') + 1);
        const fullPath = window.location.origin + currentFolder + 'avatar.glb';
        
        debugInfo.innerHTML = `
            Página: ${currentPath}<br>
            Pasta: ${currentFolder}<br>
            Arquivo esperado: avatar.glb<br>
            URL completa: ${fullPath}<br>
            Protocolo: ${window.location.protocol}
        `;

        // ============================================================
        // Configuração da Cena
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122);
        
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(3, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Controles
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 1.5;
        controls.target.set(0, 1, 0);

        // ============================================================
        // Iluminação
        // ============================================================
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e6, 1.5);
        mainLight.position.set(5, 8, 7);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.DirectionalLight(0xaaccff, 0.8);
        fillLight.position.set(-5, 3, 5);
        scene.add(fillLight);

        // ============================================================
        // Ambiente
        // ============================================================
        const gridHelper = new THREE.GridHelper(10, 20, 0x4a9eff, 0x333344);
        gridHelper.position.y = 0;
        scene.add(gridHelper);
        
        const ground = new THREE.Mesh(
            new THREE.CircleGeometry(5, 32),
            new THREE.MeshStandardMaterial({ color: 0x1a1a2a, roughness: 0.8, emissive: 0x050510 })
        );
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // ============================================================
        // Criar modelo LEGO de fallback (caso o GLB não carregue)
        // ============================================================
        function createLegoFallback() {
            const group = new THREE.Group();
            
            // Cores LEGO
            const skinColor = 0x8B5A2B;  // Moreno
            const suitColor = 0x0A1F44;  // Azul marinho
            const whiteColor = 0xFFFFFF; // Branco
            const brownColor = 0x352100; // Barba
            
            // Cabeça
            const headGeo = new THREE.CylinderGeometry(0.28, 0.28, 0.35, 16);
            const headMat = new THREE.MeshStandardMaterial({ color: skinColor });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.45;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Stud da cabeça
            const studGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.06, 12);
            const studMat = new THREE.MeshStandardMaterial({ color: skinColor });
            const stud = new THREE.Mesh(studGeo, studMat);
            stud.position.y = 1.63;
            stud.castShadow = true;
            group.add(stud);
            
            // Corpo
            const bodyGeo = new THREE.BoxGeometry(0.5, 0.7, 0.25);
            const bodyMat = new THREE.MeshStandardMaterial({ color: suitColor });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.95;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Camisa
            const shirtGeo = new THREE.BoxGeometry(0.25, 0.4, 0.05);
            const shirtMat = new THREE.MeshStandardMaterial({ color: whiteColor });
            const shirt = new THREE.Mesh(shirtGeo, shirtMat);
            shirt.position.set(0, 0.95, 0.13);
            shirt.castShadow = true;
            group.add(shirt);
            
            // Barba
            const beardGeo = new THREE.BoxGeometry(0.25, 0.12, 0.1);
            const beardMat = new THREE.MeshStandardMaterial({ color: brownColor });
            const beard = new THREE.Mesh(beardGeo, beardMat);
            beard.position.set(0, 1.3, 0.2);
            beard.castShadow = true;
            group.add(beard);
            
            // Olhos
            [-1, 1].forEach(side => {
                const eyeGeo = new THREE.CylinderGeometry(0.04, 0.04, 0.02, 8);
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0xFFFFFF });
                const eye = new THREE.Mesh(eyeGeo, eyeMat);
                eye.rotation.x = Math.PI / 2;
                eye.position.set(side * 0.1, 1.5, 0.26);
                eye.castShadow = true;
                group.add(eye);
                
                const pupilGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.03, 6);
                const pupilMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const pupil = new THREE.Mesh(pupilGeo, pupilMat);
                pupil.rotation.x = Math.PI / 2;
                pupil.position.set(side * 0.1, 1.5, 0.28);
                pupil.castShadow = true;
                group.add(pupil);
            });
            
            // Pernas
            [-0.15, 0.15].forEach(x => {
                const legGeo = new THREE.BoxGeometry(0.28, 0.4, 0.2);
                const legMat = new THREE.MeshStandardMaterial({ color: suitColor });
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(x, 0.4, 0);
                leg.castShadow = true;
                leg.receiveShadow = true;
                group.add(leg);
            });
            
            return group;
        }

        // ============================================================
        // Tentar carregar o GLB
        // ============================================================
        const loader = new GLTFLoader();
        const loadingDiv = document.getElementById('loading');
        const errorDiv = document.getElementById('error');
        const loadingText = document.getElementById('loading-text');
        
        // Mostrar loading
        loadingDiv.style.display = 'block';
        statusDiv.innerHTML = '⏳ Tentando carregar avatar.glb...';
        
        // Tentar carregar de diferentes formas
        const attempts = [
            'avatar.glb',
            './avatar.glb',
            '/avatar.glb',
            window.location.pathname.replace(/[^/]*$/, '') + 'avatar.glb'
        ];
        
        let attemptIndex = 0;
        
        function tryLoadNext() {
            if (attemptIndex >= attempts.length) {
                // Todas as tentativas falharam
                loadingDiv.style.display = 'none';
                statusDiv.innerHTML = '⚠️ Usando modelo fallback (LEGO simples)';
                statusDiv.style.color = '#ffaa00';
                
                // Criar modelo fallback
                const fallback = createLegoFallback();
                scene.add(fallback);
                
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `
                    <h3>❌ Não foi possível carregar avatar.glb</h3>
                    <p>Motivo: Arquivo não encontrado ou formato inválido</p>
                    <p><strong>Soluções:</strong></p>
                    <ul style="text-align: left;">
                        <li>Verifique se o arquivo se chama exatamente <strong>avatar.glb</strong></li>
                        <li>Coloque na mesma pasta do HTML</li>
                        <li>Use um servidor local (python -m http.server)</li>
                        <li>O arquivo pode estar corrompido</li>
                    </ul>
                    <p style="margin-top: 15px;">🔧 Mostrando modelo LEGO simples como fallback</p>
                    <button onclick="location.reload()">🔄 Tentar novamente</button>
                `;
                return;
            }
            
            const url = attempts[attemptIndex];
            loadingText.innerHTML = `Tentativa ${attemptIndex + 1}/${attempts.length}: ${url}`;
            
            loader.load(
                url,
                (gltf) => {
                    // Sucesso!
                    loadingDiv.style.display = 'none';
                    statusDiv.innerHTML = '✅ avatar.glb carregado com sucesso!';
                    statusDiv.style.color = '#4caf50';
                    
                    const model = gltf.scene;
                    
                    // Ajustar escala
                    const box = new THREE.Box3().setFromObject(model);
                    const size = box.getSize(new THREE.Vector3());
                    const maxDim = Math.max(size.x, size.y, size.z);
                    if (maxDim > 2.5) {
                        model.scale.setScalar(2.5 / maxDim);
                    }
                    
                    // Centralizar
                    const center = box.getCenter(new THREE.Vector3());
                    model.position.sub(center);
                    
                    scene.add(model);
                    
                    debugInfo.innerHTML += `<br><span style="color: #4caf50;">✅ Arquivo carregado: ${url}</span>`;
                },
                (xhr) => {
                    // Progresso
                    const percent = (xhr.loaded / xhr.total * 100).toFixed(0);
                    loadingText.innerHTML = `Carregando... ${percent}% (${url})`;
                },
                (error) => {
                    // Erro - tentar próximo
                    console.log(`Falha na tentativa ${attemptIndex + 1}: ${url}`, error);
                    attemptIndex++;
                    tryLoadNext();
                }
            );
        }
        
        // Iniciar tentativas
        tryLoadNext();

        // ============================================================
        // Animação
        // ============================================================
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        animate();

        // ============================================================
        // Redimensionamento
        // ============================================================
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // ============================================================
        // Teclas de atalho
        // ============================================================
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                controls.autoRotate = !controls.autoRotate;
            }
        });
    </script>
</body>
</html>
