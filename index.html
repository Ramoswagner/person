<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualizador GLB - Walking Animation</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            pointer-events: none;
            z-index: 10;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border-left: 4px solid #ff3366;
        }

        #info h1 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        #info p {
            margin: 5px 0 0;
            font-size: 0.9rem;
            opacity: 0.8;
        }

        #controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 30, 40, 0.8);
            backdrop-filter: blur(10px);
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            display: flex;
            gap: 20px;
            z-index: 20;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .control-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s ease;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .control-btn:hover {
            background: #ff3366;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,51,102,0.4);
        }

        .control-btn.active {
            background: #ff3366;
            color: white;
        }

        #status {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.8);
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            backdrop-filter: blur(5px);
            z-index: 15;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 1.2rem;
            background: rgba(0,0,0,0.6);
            padding: 15px 30px;
            border-radius: 50px;
            z-index: 100;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255,255,255,0.2);
            transition: opacity 0.5s;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>🚶 Novo.glb - Walking Animation</h1>
        <p>Modelo 3D com animação de caminhada do Adobe</p>
    </div>

    <div id="status">⚡ Animação: Walking</div>

    <div id="controls">
        <button class="control-btn active" id="playBtn">▶ Play</button>
        <button class="control-btn" id="pauseBtn">⏸ Pause</button>
        <button class="control-btn" id="resetBtn">⟲ Reset</button>
        <button class="control-btn" id="gridBtn">⬚ Grid</button>
    </div>

    <div id="loading">
        <span class="spinner"></span> Carregando modelo...
    </div>

    <!-- Importação das bibliotecas -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // --- Configuração inicial ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111122); // Cor de fundo escura
        
        // Câmera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 2, 8);
        camera.lookAt(0, 1, 0);

        // Renderizador
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Ativar sombras para melhor visualização
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // Controles de órbita
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = true;
        controls.maxPolarAngle = Math.PI / 2; // Impedir de ir abaixo do chão
        controls.minDistance = 3;
        controls.maxDistance = 20;
        controls.target.set(0, 1, 0);

        // --- Iluminação ---
        
        // Luz ambiente suave
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal (direcional) para sombras
        const dirLight = new THREE.DirectionalLight(0xffffff, 1);
        dirLight.position.set(5, 10, 7);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 10;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 15;
        scene.add(dirLight);

        // Luz de preenchimento
        const fillLight = new THREE.PointLight(0x4466cc, 0.5);
        fillLight.position.set(-5, 3, 5);
        scene.add(fillLight);

        // Luz de fundo
        const backLight = new THREE.PointLight(0xffaa33, 0.3);
        backLight.position.set(0, 2, -8);
        scene.add(backLight);

        // Luzes coloridas para efeito
        const colorLight1 = new THREE.PointLight(0xff3366, 0.4);
        colorLight1.position.set(3, 1, 3);
        scene.add(colorLight1);

        const colorLight2 = new THREE.PointLight(0x33ccff, 0.4);
        colorLight2.position.set(-3, 1, -3);
        scene.add(colorLight2);

        // --- Chão com grade e reflexo ---
        
        // Grade principal
        const gridHelper = new THREE.GridHelper(20, 20, 0xff3366, 0x444466);
        gridHelper.position.y = 0;
        scene.add(gridHelper);

        // Chão semi-transparente para reflexo
        const planeGeometry = new THREE.CircleGeometry(12, 32);
        const planeMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x1a1a2e, 
            transparent: true, 
            opacity: 0.25,
            side: THREE.DoubleSide
        });
        const plane = new THREE.Mesh(planeGeometry, planeMaterial);
        plane.rotation.x = -Math.PI / 2;
        plane.position.y = 0.01;
        plane.receiveShadow = true;
        scene.add(plane);

        // Eixos de referência (opcional, comentado para não poluir)
        // const axesHelper = new THREE.AxesHelper(5);
        // scene.add(axesHelper);

        // Pequenas esferas de referência no chão
        const sphereGeo = new THREE.SphereGeometry(0.1, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0xff3366 });
        for (let i = -4; i <= 4; i+=2) {
            for (let j = -4; j <= 4; j+=2) {
                const sphere = new THREE.Mesh(sphereGeo, sphereMat);
                sphere.position.set(i, 0.1, j);
                sphere.castShadow = true;
                sphere.receiveShadow = true;
                scene.add(sphere);
            }
        }

        // --- Variáveis do modelo ---
        let model = null;
        let mixer = null;
        let clock = new THREE.Clock();
        
        // Estado da animação
        let isPlaying = true;
        
        // Controles de grade
        let gridVisible = true;

        // Elementos DOM
        const loadingEl = document.getElementById('loading');
        const statusEl = document.getElementById('status');
        const playBtn = document.getElementById('playBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const gridBtn = document.getElementById('gridBtn');

        // --- Carregar o modelo GLB ---
        const loader = new GLTFLoader();
        
        // IMPORTANTE: Substitua 'novo.glb' pelo caminho correto do seu arquivo
        loader.load(
            'novo.glb',
            (gltf) => {
                model = gltf.scene;
                
                // Centralizar o modelo (ajustar posição se necessário)
                model.position.set(0, 0, 0);
                
                // Ajustar escala se necessário (descomente e ajuste se o modelo estiver muito grande/pequeno)
                // model.scale.set(1, 1, 1);
                
                // Habilitar sombras no modelo
                model.traverse((node) => {
                    if (node.isMesh) {
                        node.castShadow = true;
                        node.receiveShadow = true;
                        
                        // Otimizar materiais
                        if (node.material) {
                            if (Array.isArray(node.material)) {
                                node.material.forEach(m => {
                                    m.roughness = 0.4;
                                    m.metalness = 0.1;
                                    if (m.map) m.map.anisotropy = 16;
                                });
                            } else {
                                node.material.roughness = 0.4;
                                node.material.metalness = 0.1;
                                if (node.material.map) node.material.map.anisotropy = 16;
                            }
                        }
                    }
                });
                
                scene.add(model);
                
                // Configurar animações
                if (gltf.animations && gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(model);
                    
                    // Tocar todas as animações encontradas
                    gltf.animations.forEach((clip) => {
                        const action = mixer.clipAction(clip);
                        action.play();
                        
                        // Mostrar nome da animação no status
                        if (clip.name) {
                            statusEl.innerHTML = `🚶 Animação: ${clip.name}`;
                        }
                    });
                    
                    console.log('Animações carregadas:', gltf.animations);
                } else {
                    statusEl.innerHTML = '⚠️ Nenhuma animação encontrada';
                }
                
                // Esconder loading
                loadingEl.classList.add('hidden');
                
                console.log('Modelo carregado com sucesso!');
            },
            (xhr) => {
                // Progresso do carregamento
                const percent = Math.floor((xhr.loaded / xhr.total) * 100);
                loadingEl.innerHTML = `<span class="spinner"></span> Carregando modelo... ${percent}%`;
            },
            (error) => {
                console.error('Erro ao carregar modelo:', error);
                loadingEl.innerHTML = '❌ Erro ao carregar modelo. Verifique o console.';
                statusEl.innerHTML = '❌ Erro no carregamento';
                
                // Criar um cubo de placeholder para visualização
                const geometry = new THREE.BoxGeometry(1, 2, 1);
                const material = new THREE.MeshStandardMaterial({ color: 0xff3366, wireframe: true });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.set(0, 1, 0);
                cube.castShadow = true;
                cube.receiveShadow = true;
                scene.add(cube);
                
                // Adicionar texto de erro
                const canvas = document.createElement('canvas');
                canvas.width = 256;
                canvas.height = 128;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = '#ff3366';
                ctx.font = 'bold 20px Arial';
                ctx.fillText('Erro ao carregar', 10, 50);
                ctx.fillText('novo.glb', 10, 80);
                
                const texture = new THREE.CanvasTexture(canvas);
                const textMat = new THREE.SpriteMaterial({ map: texture });
                const textSprite = new THREE.Sprite(textMat);
                textSprite.scale.set(2, 1, 1);
                textSprite.position.set(0, 2.5, 0);
                scene.add(textSprite);
                
                loadingEl.classList.add('hidden');
            }
        );

        // --- Controles de animação ---
        playBtn.addEventListener('click', () => {
            if (mixer) {
                mixer.timeScale = 1;
                isPlaying = true;
                playBtn.classList.add('active');
                pauseBtn.classList.remove('active');
                statusEl.innerHTML = '▶ Animação: Playing';
            }
        });

        pauseBtn.addEventListener('click', () => {
            if (mixer) {
                mixer.timeScale = 0;
                isPlaying = false;
                pauseBtn.classList.add('active');
                playBtn.classList.remove('active');
                statusEl.innerHTML = '⏸ Animação: Paused';
            }
        });

        resetBtn.addEventListener('click', () => {
            if (mixer) {
                mixer.setTime(0);
                if (!isPlaying) {
                    // Se estiver pausado, continua pausado mas no frame 0
                    mixer.timeScale = 0;
                }
                statusEl.innerHTML = '⟲ Animação: Reset';
                setTimeout(() => {
                    statusEl.innerHTML = isPlaying ? '▶ Animação: Playing' : '⏸ Animação: Paused';
                }, 1000);
            }
        });

        gridBtn.addEventListener('click', () => {
            gridVisible = !gridVisible;
            gridHelper.visible = gridVisible;
            plane.visible = gridVisible;
            gridBtn.classList.toggle('active', gridVisible);
            gridBtn.innerHTML = gridVisible ? '⬚ Grid On' : '⬚ Grid Off';
        });

        // --- Estrelas de fundo (partículas) ---
        const starsGeometry = new THREE.BufferGeometry();
        const starsCount = 1000;
        const starsPositions = new Float32Array(starsCount * 3);
        
        for (let i = 0; i < starsCount * 3; i += 3) {
            starsPositions[i] = (Math.random() - 0.5) * 200;
            starsPositions[i+1] = (Math.random() - 0.5) * 200;
            starsPositions[i+2] = (Math.random() - 0.5) * 200;
        }
        
        starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
        
        const starsMaterial = new THREE.PointsMaterial({ color: 0x888888, size: 0.2, transparent: true });
        const stars = new THREE.Points(starsGeometry, starsMaterial);
        scene.add(stars);

        // --- Animação principal ---
        function animate() {
            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Atualizar animações do modelo
            if (mixer) {
                mixer.update(delta);
            }

            // Rotacionar estrelas lentamente
            stars.rotation.y += 0.0001;

            // Atualizar controles
            controls.update();

            // Renderizar cena
            renderer.render(scene, camera);
        }

        animate();

        // --- Ajuste de tamanho da tela ---
        window.addEventListener('resize', onWindowResize, false);
        
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // --- Teclado shortcuts (opcional) ---
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isPlaying) {
                    pauseBtn.click();
                } else {
                    playBtn.click();
                }
            } else if (e.code === 'KeyR') {
                resetBtn.click();
            } else if (e.code === 'KeyG') {
                gridBtn.click();
            }
        });

        console.log('Visualizador pronto!');
    </script>
</body>
</html>
