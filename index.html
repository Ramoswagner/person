<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050810; color: #e0e8ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; width: 100vw; height: 100vh; cursor: crosshair; }
  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  canvas { display: block; }
  #hud { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
  .hud-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #4a7aff; text-transform: uppercase; opacity: 0.7; }
  .keys-grid { display: grid; grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(2, 44px); gap: 6px; }
  .key { width: 44px; height: 44px; border: 1px solid rgba(74,122,255,0.3); border-radius: 8px; background: rgba(10,15,40,0.7); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: rgba(180,200,255,0.5); transition: all 0.1s; }
  .key.active { border-color: #4a7aff; color: #fff; background: rgba(74,122,255,0.2); box-shadow: 0 0 16px rgba(74,122,255,0.4); }
  .key-w { grid-column: 2; grid-row: 1; } .key-a { grid-column: 1; grid-row: 2; } .key-s { grid-column: 2; grid-row: 2; } .key-d { grid-column: 3; grid-row: 2; }
  #status { position: fixed; top: 24px; left: 24px; z-index: 10; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; color: rgba(74,122,255,0.6); line-height: 2; pointer-events: none; }
  #status span { color: #8ab4ff; }
  #cam-tip { position: fixed; top: 24px; right: 24px; z-index: 10; font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(74,122,255,0.4); text-align: right; line-height: 2; pointer-events: none; }
  #grid-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: linear-gradient(rgba(74,122,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(74,122,255,0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 80% 60% at 50% 100%, black 30%, transparent 100%); }
  #vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(ellipse at center, transparent 50%, rgba(5,8,16,0.7) 100%); }
  #loading { position: fixed; inset: 0; z-index: 100; background: #050810; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.8s; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-bar-wrap { width: 200px; height: 2px; background: rgba(74,122,255,0.15); border-radius: 2px; overflow: hidden; }
  .loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4a7aff, #a0c0ff); border-radius: 2px; transition: width 0.3s; box-shadow: 0 0 10px #4a7aff; }
  .loader-text { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #4a7aff; }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-text">CARREGANDO MODELO</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-text" id="loader-pct">0%</div>
</div>

<div id="canvas-container"></div>
<div id="grid-overlay"></div>
<div id="vignette"></div>

<div id="status">
  POS &nbsp;<span id="st-pos">0.0 / 0.0</span><br>
  DIR &nbsp;<span id="st-dir">NORTE</span><br>
  VEL &nbsp;<span id="st-vel">0.00</span>
</div>

<div id="cam-tip">
  ARRASTAR -> ORBITAR<br>
  SCROLL &nbsp;-> ZOOM
</div>

<div id="hud">
  <div class="hud-label">movimento</div>
  <div class="keys-grid">
    <div class="key key-w" id="k-w">W</div>
    <div class="key key-a" id="k-a">A</div>
    <div class="key key-s" id="k-s">S</div>
    <div class="key key-d" id="k-d">D</div>
  </div>
  <div class="hud-label" style="margin-top:6px">E &mdash; opening &nbsp;|&nbsp; WASD &mdash; andar</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// === CENA ===
var container = document.getElementById('canvas-container');
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputEncoding = THREE.sRGBEncoding;
container.appendChild(renderer.domElement);

var scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);
scene.fog = new THREE.FogExp2(0x050810, 0.04);

// === CAMERA ===
var camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 3, 7);
camera.lookAt(0, 1, 0);

// === LUZ ===
scene.add(new THREE.AmbientLight(0x8898cc, 0.6));
var dirLight = new THREE.DirectionalLight(0xffffff, 1.4);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048, 2048);
scene.add(dirLight);
var rimLight = new THREE.DirectionalLight(0x4a7aff, 0.8);
rimLight.position.set(-5, 3, -5);
scene.add(rimLight);

// === CHAO ===
var ground = new THREE.Mesh(
  new THREE.PlaneGeometry(40, 40),
  new THREE.MeshStandardMaterial({ color: 0x0a0f28, metalness: 0.1, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);
scene.add(new THREE.GridHelper(40, 40, 0x1a2a6a, 0x0d1535));

// Anel sob o avatar
var ringMat = new THREE.MeshBasicMaterial({ color: 0x4a7aff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
var ring = new THREE.Mesh(new THREE.RingGeometry(0.55, 0.65, 64), ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.005;
scene.add(ring);

// === ORBIT MANUAL ===
var orbit = { active: false, startX: 0, startY: 0, theta: 0.3, phi: 0.4, radius: 7, tTheta: 0.3, tPhi: 0.4, tRadius: 7 };
var camTarget = new THREE.Vector3(0, 1, 0);

renderer.domElement.addEventListener('mousedown', function(e) { orbit.active = true; orbit.startX = e.clientX; orbit.startY = e.clientY; });
window.addEventListener('mouseup', function() { orbit.active = false; });
window.addEventListener('mousemove', function(e) {
  if (!orbit.active) return;
  orbit.tTheta -= (e.clientX - orbit.startX) * 0.005;
  orbit.tPhi = Math.max(0.1, Math.min(1.4, orbit.tPhi + (e.clientY - orbit.startY) * 0.005));
  orbit.startX = e.clientX; orbit.startY = e.clientY;
});
renderer.domElement.addEventListener('wheel', function(e) {
  orbit.tRadius = Math.max(2, Math.min(18, orbit.tRadius + e.deltaY * 0.01));
}, { passive: true });

function updateCamera(pos) {
  orbit.theta  += (orbit.tTheta  - orbit.theta)  * 0.08;
  orbit.phi    += (orbit.tPhi    - orbit.phi)    * 0.08;
  orbit.radius += (orbit.tRadius - orbit.radius) * 0.08;
  camTarget.lerp(new THREE.Vector3(pos.x, pos.y + 1, pos.z), 0.1);
  camera.position.set(
    camTarget.x + orbit.radius * Math.sin(orbit.theta) * Math.cos(orbit.phi),
    camTarget.y + orbit.radius * Math.sin(orbit.phi),
    camTarget.z + orbit.radius * Math.cos(orbit.theta) * Math.cos(orbit.phi)
  );
  camera.lookAt(camTarget);
}

// === TECLADO ===
var teclas = {};
window.addEventListener('keydown', function(e) {
  teclas[e.code] = true;
  if (['KeyW','KeyS','KeyA','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  updateKeyUI();
});
window.addEventListener('keyup', function(e) { teclas[e.code] = false; updateKeyUI(); });

function updateKeyUI() {
  var map = { KeyW: 'k-w', KeyA: 'k-a', KeyS: 'k-s', KeyD: 'k-d' };
  for (var code in map) {
    document.getElementById(map[code]).classList.toggle('active', !!teclas[code]);
  }
}

// === STATUS HUD ===
var DIRS = ['NORTE','NOROESTE','OESTE','SUDOESTE','SUL','SUDESTE','LESTE','NORDESTE'];
function updateStatus(m, vel) {
  document.getElementById('st-pos').textContent = m.position.x.toFixed(1) + ' / ' + m.position.z.toFixed(1);
  var ang = ((m.rotation.y % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  document.getElementById('st-dir').textContent = DIRS[Math.round(ang / (Math.PI/4)) % 8];
  document.getElementById('st-vel').textContent = vel.toFixed(2);
}

// === CARREGA GLB ===
var model = null, mixer = null, acaoAtual = null, acoes = {}, modelBaseY = 0;
var loaderBar = document.getElementById('loader-bar');
var loaderPct = document.getElementById('loader-pct');
var loadingEl = document.getElementById('loading');

var loader = new THREE.GLTFLoader();
loader.load(
  'novo.glb',
  function(gltf) {
    model = gltf.scene;
    model.traverse(function(child) {
      if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
    });

    // Escala e posiciona com os pes no chao
    var box = new THREE.Box3().setFromObject(model);
    var size = box.getSize(new THREE.Vector3());
    var scale = 1.75 / size.y;
    model.scale.setScalar(scale);
    var box2 = new THREE.Box3().setFromObject(model);
    var center2 = box2.getCenter(new THREE.Vector3());
    modelBaseY = -box2.min.y;
    model.position.set(-center2.x, modelBaseY, -center2.z);
    scene.add(model);
    console.log('Animacoes no GLB:');

    // Animacoes
    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(function(clip) {
        var nome = clip.name.toLowerCase();
        acoes[nome] = mixer.clipAction(clip);
        console.log(' -', nome);
      });
      var primeira = Object.values(acoes)[0];
      if (primeira) { acaoAtual = primeira; acaoAtual.play(); }
    } else {
      console.log('Nenhuma animacao encontrada.');
    }

    loaderBar.style.width = '100%';
    loaderPct.textContent = '100%';
    setTimeout(function() { loadingEl.classList.add('hidden'); }, 600);
    animate();
  },
  function(xhr) {
    if (xhr.lengthComputable) {
      var pct = Math.round(xhr.loaded / xhr.total * 100);
      loaderBar.style.width = pct + '%';
      loaderPct.textContent = pct + '%';
    }
  },
  function(err) {
    console.error(err);
    loaderPct.textContent = 'ERRO - coloque novo.glb na mesma pasta';
  }
);

// === TROCA DE ANIMACAO ===
function transicaoPara(nome, loop) {
  var chave = Object.keys(acoes).find(function(k) { return k.includes(nome); });
  var proxima = chave ? acoes[chave] : null;
  if (!proxima || proxima === acaoAtual) return;
  proxima.reset();
  proxima.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce);
  proxima.clampWhenFinished = true;
  proxima.play();
  if (acaoAtual) acaoAtual.crossFadeTo(proxima, 0.25, true);
  acaoAtual = proxima;
}

// === LOOP ===
var clock = new THREE.Clock();
var VEL = 4.0, ROT = 2.2;

function animate() {
  requestAnimationFrame(animate);
  var delta = Math.min(clock.getDelta(), 0.05);

  if (mixer) mixer.update(delta);

  if (model) {
    var movendo = false;
    var vel = 0;

    if (teclas['KeyW'] || teclas['ArrowUp'])    { model.translateZ(-VEL * delta); movendo = true; vel = VEL; }
    if (teclas['KeyS'] || teclas['ArrowDown'])  { model.translateZ( VEL * delta * 0.6); movendo = true; vel = VEL * 0.6; }
    if (teclas['KeyA'] || teclas['ArrowLeft'])  { model.rotation.y += ROT * delta; movendo = true; }
    if (teclas['KeyD'] || teclas['ArrowRight']) { model.rotation.y -= ROT * delta; movendo = true; }

    // Limita ao plano
    model.position.x = Math.max(-18, Math.min(18, model.position.x));
    model.position.z = Math.max(-18, Math.min(18, model.position.z));
    model.position.y = modelBaseY;

    // Anel
    ring.position.x = model.position.x;
    ring.position.z = model.position.z;
    ringMat.opacity = movendo ? 0.6 : (0.2 + 0.3 * Math.abs(Math.sin(Date.now() * 0.003)));
    ring.scale.setScalar(movendo ? 1.15 : 1.0);

    // Animacao
    if (Object.keys(acoes).length > 0) {
      if (teclas['KeyE'])   transicaoPara('opening', false);
      else if (movendo)     transicaoPara('walking', true);
      else                  transicaoPara('opening', true);
    }

    updateCamera(model.position);
    updateStatus(model, vel);
  }

  renderer.render(scene, camera);
}

// === RESIZE ===
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
