<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avatar Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050810; color: #e0e8ff; font-family: 'Rajdhani', sans-serif; overflow: hidden; width: 100vw; height: 100vh; cursor: crosshair; }
  #canvas-container { position: fixed; inset: 0; z-index: 0; }
  canvas { display: block; }

  /* HUD teclas */
  #hud { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 10px; pointer-events: none; }
  .hud-label { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #4a7aff; text-transform: uppercase; opacity: 0.7; }
  .keys-grid { display: grid; grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(2, 44px); gap: 6px; }
  .key { width: 44px; height: 44px; border: 1px solid rgba(74,122,255,0.3); border-radius: 8px; background: rgba(10,15,40,0.7); display: flex; align-items: center; justify-content: center; font-family: 'Share Tech Mono', monospace; font-size: 13px; color: rgba(180,200,255,0.5); transition: all 0.1s; }
  .key.active { border-color: #4a7aff; color: #fff; background: rgba(74,122,255,0.25); box-shadow: 0 0 16px rgba(74,122,255,0.5); }
  .key-w { grid-column: 2; grid-row: 1; } .key-a { grid-column: 1; grid-row: 2; } .key-s { grid-column: 2; grid-row: 2; } .key-d { grid-column: 3; grid-row: 2; }

  /* Status */
  #status { position: fixed; top: 24px; left: 24px; z-index: 10; font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 2px; color: rgba(74,122,255,0.6); line-height: 2; pointer-events: none; }
  #status span { color: #8ab4ff; }
  #cam-tip { position: fixed; top: 24px; right: 24px; z-index: 10; font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; color: rgba(74,122,255,0.4); text-align: right; line-height: 2; pointer-events: none; }

  /* Overlay grade */
  #grid-overlay { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: linear-gradient(rgba(74,122,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(74,122,255,0.03) 1px, transparent 1px); background-size: 60px 60px; mask-image: radial-gradient(ellipse 80% 60% at 50% 100%, black 30%, transparent 100%); }
  #vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none; background: radial-gradient(ellipse at center, transparent 50%, rgba(5,8,16,0.7) 100%); }

  /* Loading */
  #loading { position: fixed; inset: 0; z-index: 100; background: #050810; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; transition: opacity 0.8s; }
  #loading.hidden { opacity: 0; pointer-events: none; }
  .loader-bar-wrap { width: 200px; height: 2px; background: rgba(74,122,255,0.15); border-radius: 2px; overflow: hidden; }
  .loader-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #4a7aff, #a0c0ff); border-radius: 2px; transition: width 0.3s; box-shadow: 0 0 10px #4a7aff; }
  .loader-text { font-family: 'Share Tech Mono', monospace; font-size: 11px; letter-spacing: 3px; color: #4a7aff; text-align: center; padding: 0 20px; }

  /* Debug overlay */
  #debug { position: fixed; bottom: 140px; left: 24px; z-index: 20; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: rgba(255,200,80,0.7); line-height: 1.8; pointer-events: none; }
</style>
</head>
<body>

<div id="loading">
  <div class="loader-text">CARREGANDO MODELO</div>
  <div class="loader-bar-wrap"><div class="loader-bar" id="loader-bar"></div></div>
  <div class="loader-text" id="loader-pct">aguarde...</div>
</div>

<div id="canvas-container"></div>
<div id="grid-overlay"></div>
<div id="vignette"></div>

<div id="status">
  POS &nbsp;<span id="st-pos">0.0 / 0.0</span><br>
  DIR &nbsp;<span id="st-dir">NORTE</span><br>
  VEL &nbsp;<span id="st-vel">0.00</span>
</div>
<div id="cam-tip">ARRASTAR &rarr; ORBITAR<br>SCROLL &rarr; ZOOM</div>
<div id="debug" id="debug"></div>

<div id="hud">
  <div class="hud-label">movimento</div>
  <div class="keys-grid">
    <div class="key key-w" id="k-w">W</div>
    <div class="key key-a" id="k-a">A</div>
    <div class="key key-s" id="k-s">S</div>
    <div class="key key-d" id="k-d">D</div>
  </div>
  <div class="hud-label" style="margin-top:4px">E &mdash; opening &nbsp;|&nbsp; WASD &mdash; andar</div>
</div>

<!-- Three.js + GLTFLoader via CDN clássico (sem modules) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
// ─── debug na tela ───────────────────────────────────────────────────────────
var dbg = document.getElementById('debug');
var logs = [];
function log(msg) {
  logs.push(msg);
  if (logs.length > 8) logs.shift();
  dbg.innerHTML = logs.join('<br>');
  console.log(msg);
}

log('Three.js: ' + (typeof THREE !== 'undefined' ? 'OK v' + THREE.REVISION : 'FALHOU'));
log('GLTFLoader: ' + (typeof THREE.GLTFLoader !== 'undefined' ? 'OK' : 'FALHOU'));

// ─── renderer ────────────────────────────────────────────────────────────────
var renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.outputEncoding = THREE.sRGBEncoding;
document.getElementById('canvas-container').appendChild(renderer.domElement);
log('Renderer: OK');

// ─── cena ────────────────────────────────────────────────────────────────────
var scene = new THREE.Scene();
scene.background = new THREE.Color(0x050810);
scene.fog = new THREE.FogExp2(0x050810, 0.035);

// ─── câmera ──────────────────────────────────────────────────────────────────
var camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.001, 1000);
camera.position.set(0, 2, 8);
camera.lookAt(0, 1, 0);

// ─── luzes ───────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
var dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight.position.set(5, 10, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
scene.add(dirLight);
scene.add(new THREE.DirectionalLight(0x4a7aff, 0.6)).position.set(-5, 3, -5);

// ─── chão ────────────────────────────────────────────────────────────────────
var groundMesh = new THREE.Mesh(
  new THREE.PlaneGeometry(60, 60),
  new THREE.MeshStandardMaterial({ color: 0x0a0f28, roughness: 0.9 })
);
groundMesh.rotation.x = -Math.PI / 2;
groundMesh.receiveShadow = true;
scene.add(groundMesh);
scene.add(new THREE.GridHelper(60, 60, 0x1a2a6a, 0x0d1535));

// anel sob avatar
var ringMat = new THREE.MeshBasicMaterial({ color: 0x4a7aff, side: THREE.DoubleSide, transparent: true, opacity: 0.5 });
var ring = new THREE.Mesh(new THREE.RingGeometry(0.4, 0.5, 48), ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = 0.01;
scene.add(ring);

// ─── orbit camera manual ─────────────────────────────────────────────────────
var orb = { on: false, sx: 0, sy: 0, th: 0.2, ph: 0.35, r: 8, tTh: 0.2, tPh: 0.35, tR: 8 };
var camTgt = new THREE.Vector3(0, 1, 0);

renderer.domElement.addEventListener('mousedown', function(e) { orb.on = true; orb.sx = e.clientX; orb.sy = e.clientY; });
window.addEventListener('mouseup',   function()  { orb.on = false; });
window.addEventListener('mousemove', function(e) {
  if (!orb.on) return;
  orb.tTh -= (e.clientX - orb.sx) * 0.005;
  orb.tPh  = Math.max(0.05, Math.min(1.45, orb.tPh + (e.clientY - orb.sy) * 0.005));
  orb.sx = e.clientX; orb.sy = e.clientY;
});
renderer.domElement.addEventListener('wheel', function(e) {
  orb.tR = Math.max(1.5, Math.min(50, orb.tR + e.deltaY * 0.02));
}, { passive: true });

// touch
var lt = null;
renderer.domElement.addEventListener('touchstart', function(e) { lt = e.touches[0]; }, { passive: true });
renderer.domElement.addEventListener('touchmove',  function(e) {
  if (!lt || e.touches.length !== 1) return;
  orb.tTh -= (e.touches[0].clientX - lt.clientX) * 0.007;
  lt = e.touches[0];
}, { passive: true });

function atualizaCamera(pos) {
  orb.th += (orb.tTh - orb.th) * 0.1;
  orb.ph += (orb.tPh - orb.ph) * 0.1;
  orb.r  += (orb.tR  - orb.r)  * 0.1;
  camTgt.lerp(new THREE.Vector3(pos.x, pos.y + 0.9, pos.z), 0.12);
  camera.position.set(
    camTgt.x + orb.r * Math.sin(orb.th) * Math.cos(orb.ph),
    camTgt.y + orb.r * Math.sin(orb.ph),
    camTgt.z + orb.r * Math.cos(orb.th) * Math.cos(orb.ph)
  );
  camera.lookAt(camTgt);
}

// ─── teclado ─────────────────────────────────────────────────────────────────
var keys = {};
window.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  if (['KeyW','KeyS','KeyA','KeyD','ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  ['KeyW','KeyA','KeyS','KeyD'].forEach(function(c) {
    var el = document.getElementById('k-' + c.slice(3).toLowerCase());
    if (el) el.classList.toggle('active', !!keys[c]);
  });
});
window.addEventListener('keyup', function(e) {
  keys[e.code] = false;
  ['KeyW','KeyA','KeyS','KeyD'].forEach(function(c) {
    var el = document.getElementById('k-' + c.slice(3).toLowerCase());
    if (el) el.classList.toggle('active', !!keys[c]);
  });
});

// ─── status hud ──────────────────────────────────────────────────────────────
var DIRS = ['N','NO','O','SO','S','SE','L','NE'];
function atualizaStatus(m, v) {
  document.getElementById('st-pos').textContent = m.position.x.toFixed(1) + ' / ' + m.position.z.toFixed(1);
  var a = ((m.rotation.y % (Math.PI*2)) + Math.PI*2) % (Math.PI*2);
  document.getElementById('st-dir').textContent = DIRS[Math.round(a / (Math.PI/4)) % 8];
  document.getElementById('st-vel').textContent = v.toFixed(2);
}

// ─── carrega GLB ─────────────────────────────────────────────────────────────
var model = null, mixer = null, acaoAtual = null, acoes = {}, baseY = 0;

log('Iniciando carregamento do GLB...');

var gltfLoader = new THREE.GLTFLoader();
gltfLoader.load(
  'novo.glb',
  function(gltf) {
    log('GLB carregado! Processando...');
    model = gltf.scene;

    // sombras
    model.traverse(function(c) {
      if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; }
    });

    // bounding box para escalar e posicionar
    var box = new THREE.Box3().setFromObject(model);
    var sz  = box.getSize(new THREE.Vector3());
    log('Tamanho bruto: ' + sz.x.toFixed(2) + ' x ' + sz.y.toFixed(2) + ' x ' + sz.z.toFixed(2));

    // Mixamo exporta em cm — detecta e corrige automaticamente
    var alturaRef = sz.y;
    var escala;
    if (alturaRef > 50) {
      // modelo em centimetros (tipico do Mixamo FBX->GLB)
      escala = 1.8 / alturaRef;
      log('Modelo em CM detectado. Escala: ' + escala.toFixed(5));
    } else if (alturaRef > 5) {
      // modelo em decimetros ou similar
      escala = 1.8 / alturaRef;
      log('Escala normal: ' + escala.toFixed(4));
    } else {
      // ja em metros, so ajusta fino
      escala = 1.8 / alturaRef;
      log('Modelo em metros. Escala: ' + escala.toFixed(4));
    }
    model.scale.setScalar(escala);

    // reposiciona com pes no chao, centrado em X/Z
    var box2   = new THREE.Box3().setFromObject(model);
    var ctr    = box2.getCenter(new THREE.Vector3());
    baseY      = -box2.min.y;
    model.position.set(-ctr.x, baseY, -ctr.z);
    scene.add(model);
    log('Modelo adicionado na cena. baseY=' + baseY.toFixed(3));

    // animacoes
    log('Animacoes encontradas: ' + gltf.animations.length);
    if (gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(model);
      gltf.animations.forEach(function(clip) {
        var n = clip.name.toLowerCase();
        acoes[n] = mixer.clipAction(clip);
        log('  anim: ' + n);
      });
      // toca a primeira como idle
      var idle = Object.values(acoes)[0];
      if (idle) { acaoAtual = idle; acaoAtual.play(); }
    }

    // esconde loading
    document.getElementById('loader-bar').style.width = '100%';
    document.getElementById('loader-pct').textContent = 'PRONTO';
    setTimeout(function() { document.getElementById('loading').classList.add('hidden'); }, 500);

    // inicia loop
    clock.start();
    loop();
  },
  function(xhr) {
    if (xhr.lengthComputable) {
      var p = Math.round(xhr.loaded / xhr.total * 100);
      document.getElementById('loader-bar').style.width = p + '%';
      document.getElementById('loader-pct').textContent = p + '%';
    }
  },
  function(err) {
    log('ERRO: ' + err.message);
    document.getElementById('loader-pct').textContent = 'ERRO - novo.glb nao encontrado na pasta';
    document.getElementById('loader-pct').style.color = '#ff4466';
  }
);

// ─── troca de animacao ────────────────────────────────────────────────────────
function ir(nome, loop) {
  var chave = Object.keys(acoes).find(function(k) { return k.indexOf(nome) >= 0; });
  if (!chave) return;
  var prox = acoes[chave];
  if (prox === acaoAtual) return;
  prox.reset();
  prox.setLoop(loop ? THREE.LoopRepeat : THREE.LoopOnce);
  prox.clampWhenFinished = true;
  prox.play();
  if (acaoAtual) acaoAtual.crossFadeTo(prox, 0.2, true);
  acaoAtual = prox;
}

// ─── loop principal ───────────────────────────────────────────────────────────
var clock = new THREE.Clock();
var VEL = 3.5, ROT = 2.0;

function loop() {
  requestAnimationFrame(loop);
  var dt = Math.min(clock.getDelta(), 0.05);
  if (mixer) mixer.update(dt);

  if (model) {
    var mv = false, v = 0;

    if (keys['KeyW'] || keys['ArrowUp'])    { model.translateZ(-VEL * dt); mv = true; v = VEL; }
    if (keys['KeyS'] || keys['ArrowDown'])  { model.translateZ( VEL * dt * 0.6); mv = true; v = VEL * 0.6; }
    if (keys['KeyA'] || keys['ArrowLeft'])  { model.rotation.y += ROT * dt; mv = true; }
    if (keys['KeyD'] || keys['ArrowRight']) { model.rotation.y -= ROT * dt; mv = true; }

    // mantém no plano
    model.position.x = Math.max(-28, Math.min(28, model.position.x));
    model.position.z = Math.max(-28, Math.min(28, model.position.z));
    model.position.y = baseY;

    // anel acompanha
    ring.position.x = model.position.x;
    ring.position.z = model.position.z;
    ringMat.opacity = mv ? 0.65 : (0.2 + 0.25 * Math.abs(Math.sin(Date.now() * 0.003)));

    // animacoes Mixamo
    var nomes = Object.keys(acoes);
    if (nomes.length > 0) {
      if (keys['KeyE'])  ir('opening', false);
      else if (mv)       ir('walking', true);
      else               ir(nomes[0], true); // idle = primeira anim
    }

    atualizaCamera(model.position);
    atualizaStatus(model, v);
  }

  renderer.render(scene, camera);
}

// ─── resize ───────────────────────────────────────────────────────────────────
window.addEventListener('resize', function() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
